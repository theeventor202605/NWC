<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>نموذج إدخال البيانات — التقرير الشهري</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;700;800&family=Tajawal:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root{
  --navy:#0E2A47;
  --navy-deep:#081B30;
  --grid-line:rgba(255,255,255,.07);
  --paper:#F4F7F5;
  --paper-dim:#E7ECEA;
  --ink:#16232F;
  --ink-soft:#4B5C6B;
  --orange:#E8590C;
  --orange-dark:#B8460A;
  --amber:#F5A623;
  --steel:#5C7A99;
  --teal:#127A5E;
  --red:#C23B22;
  --blue:#1D5FA0;
  --line:#D3DAD8;
}
*{box-sizing:border-box;}
html{overflow-x:hidden;overflow-x:clip;width:100%;overscroll-behavior-x:none;}
html,body{margin:0;padding:0;max-width:100%;}
body{overflow-x:hidden;overflow-x:clip;}
body{
  background:var(--navy);
  background-image:
    linear-gradient(var(--grid-line) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
  background-size:28px 28px;
  font-family:'Tajawal',sans-serif;
  color:var(--ink);
  min-height:100vh;
  padding:22px;
  overflow-x:hidden;
  overscroll-behavior-x:none;
  width:100%;
}
.wrap{max-width:1180px;width:100%;margin:0 auto;}
#sheets{max-width:100%;overflow-x:hidden;}
.login-gate{
  position:fixed;inset:0;background:var(--navy);
  background-image:linear-gradient(var(--grid-line) 1px, transparent 1px),linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
  background-size:28px 28px;
  display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;
}
.login-box{
  background:var(--paper);border-radius:10px;padding:38px 34px;max-width:380px;width:100%;text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.5);
}
.login-title{font-family:'Cairo',sans-serif;font-weight:800;font-size:19px;color:var(--ink);margin:0 0 6px;}
.login-sub{color:var(--ink-soft);font-size:13px;margin:0 0 20px;}
#googleSignInBtn{display:flex;justify-content:center;margin-bottom:14px;}
.login-status{font-size:12.5px;font-weight:600;min-height:16px;margin-bottom:10px;overflow-wrap:anywhere;}
.login-status.err{color:var(--red);}
.login-status.ok{color:var(--teal);}
.login-note{font-size:11px;color:var(--steel);margin:14px 0 0;}
.userbar{
  display:flex;align-items:center;gap:10px;background:var(--navy-deep);border:1px solid #1D3F5E;
  border-radius:6px;padding:8px 14px;margin-bottom:14px;
}
.userbar-pic{width:30px;height:30px;border-radius:50%;background:#1D3F5E;}
.userbar-info{flex:1;min-width:0;}
.userbar-name{font-size:13px;font-weight:700;color:#EAF2FF;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.userbar-email{font-size:11px;color:#8FB0CC;font-family:'JetBrains Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.role-badge{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;padding:3px 10px;border-radius:9px;white-space:nowrap;}
.role-badge.Admin{background:var(--orange);color:#fff;}
.role-badge.Supervisor{background:var(--amber);color:#3A2A00;}
.role-badge.Viewer{background:#1D3F5E;color:#CFE0EF;}
.btn.small{padding:7px 12px;font-size:12.5px;}
.titleblock{
  background:var(--navy-deep);
  border:1px solid #1D3F5E;
  border-radius:6px;
  padding:18px 22px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:14px;
  margin-bottom:16px;
}
.titleblock h1{
  font-family:'Cairo',sans-serif;
  font-weight:800;
  font-size:22px;
  color:#EAF2FF;
  margin:0 0 4px;
}
.titleblock .sub{
  color:#8FB0CC;
  font-size:13px;
  font-family:'JetBrains Mono',monospace;
  letter-spacing:.3px;
}
.stamp{
  border:2px solid var(--orange);
  border-radius:4px;
  padding:8px 16px;
  text-align:center;
  color:var(--orange);
  font-family:'JetBrains Mono',monospace;
}
.stamp .n{font-size:20px;font-weight:600;line-height:1;}
.stamp .l{font-size:10px;letter-spacing:1px;color:#F0A67C;margin-top:3px;}
.toolbar{
  display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center;position:relative;
}
.btn{
  font-family:'Tajawal',sans-serif;
  font-weight:700;
  font-size:14px;
  border-radius:5px;
  padding:10px 18px;
  border:none;
  cursor:pointer;
  transition:transform .08s ease;
}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--orange);color:#fff;}
.btn-primary:hover{background:var(--orange-dark);}
.btn-ghost{background:var(--navy-deep);color:#CFE0EF;border:1px solid #244A6B;}
.btn-ghost:hover{background:#12324C;}
.receipt-scan-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
.receipt-scan-row input[type="url"]{flex:1 1 220px;min-width:0;}
.receipt-scan-status{font-size:12.5px;flex-basis:100%;}
.receipt-scan-status.ok{color:#4CAF50;}
.receipt-scan-status.err{color:#E05555;}
.qw-stage-header{font-family:'Cairo',sans-serif;font-weight:800;font-size:13px;color:var(--steel);text-transform:uppercase;letter-spacing:.4px;margin:18px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--line);}
.qw-item{border:1px solid var(--line);border-radius:8px;padding:12px 14px;margin-bottom:10px;background:#fff;}
.qw-item.qw-done{border-color:#bfe3d3;background:#F3FBF8;}
.qw-item.qw-active{border-color:var(--orange);box-shadow:0 0 0 1px var(--orange) inset;}
.qw-item.qw-locked{opacity:.55;}
.qw-item-head{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
.qw-item-title{font-weight:700;font-size:13.5px;}
.qw-item-badges{display:flex;gap:6px;flex-wrap:wrap;}
.qw-badge{font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--paper-dim);color:var(--ink-soft);border-radius:9px;padding:2px 9px;}
.qw-item-done-info{margin-top:6px;font-size:12.5px;color:var(--teal);font-family:'JetBrains Mono',monospace;overflow-wrap:anywhere;}
.qw-item-locked-info{margin-top:6px;font-size:12.5px;color:var(--ink-soft);}
.qw-capture{margin-top:10px;display:flex;flex-direction:column;gap:8px;}
.qw-capture-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
.qw-capture-status{font-size:12.5px;}
.qw-capture-status.ok{color:#4CAF50;}
.qw-capture-status.err{color:#E05555;}
.qw-alldone{text-align:center;font-weight:700;color:var(--teal);padding:16px;}
.qw-locked-wrap{position:relative;}
.qw-geo-overlay{
  position:absolute;inset:0;z-index:60;
  background:rgba(244,247,245,.97);
  border:1px solid var(--red);border-radius:8px;
  display:none;align-items:center;justify-content:center;text-align:center;padding:22px;
}
.qw-geo-overlay-box{max-width:360px;}
.qw-geo-overlay-icon{font-size:32px;margin-bottom:8px;}
.qw-geo-overlay-title{font-family:'Cairo',sans-serif;font-weight:800;font-size:15px;color:var(--red);margin-bottom:8px;}
.qw-geo-overlay-text{font-size:13px;color:var(--ink-soft);line-height:1.65;}
button:disabled{opacity:.45;cursor:not-allowed;}
input[readonly]{opacity:.8;background:#0F2740;}
.savenote{color:#7C93A6;font-size:12px;font-family:'JetBrains Mono',monospace;overflow-wrap:anywhere;}
.menu-wrap{position:relative;}
.menubtn{
  background:var(--navy-deep);
  color:#CFE0EF;
  border:1px solid #244A6B;
  font-family:'Tajawal',sans-serif;
  font-weight:700;
  font-size:14px;
  border-radius:5px;
  padding:10px 16px;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:6px;
  white-space:nowrap;
}
.menubtn:hover{background:#12324C;}
.dropdown{
  position:absolute;
  top:calc(100% + 6px);
  right:0;
  background:var(--paper);
  border:1px solid var(--line);
  border-radius:8px;
  box-shadow:0 12px 32px rgba(0,0,0,.4);
  width:270px;
  max-width:calc(100vw - 24px);
  max-height:70vh;
  overflow-y:auto;
  display:none;
  z-index:60;
  padding:6px;
}
.dropdown.open{display:block;}
.dropdown-item{
  display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:5px;cursor:pointer;
  font-size:13px;color:var(--ink);
}
.dropdown-item:hover{background:var(--paper-dim);}
.dropdown-item.active{background:var(--orange);color:#fff;}
.dropdown-item .num{
  background:#12324C;color:var(--amber);border-radius:3px;padding:1px 7px;
  font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;
}
.dropdown-item.active .num{background:#fff;color:var(--orange-dark);}
.dropdown-item .cnt{
  margin-inline-start:auto;background:#1D3F5E;color:#EAF2FF;border-radius:9px;padding:0 7px;
  font-size:11px;min-width:16px;text-align:center;font-family:'JetBrains Mono',monospace;
}
.dropdown-item.active .cnt{background:rgba(255,255,255,.35);color:#fff;}
.dropdown.settings-dropdown.open{display:flex;flex-direction:column;gap:8px;width:290px;max-width:calc(100vw - 24px);}
.dropdown-action{width:100%;text-align:center;}
.dropdown-action.small{padding:8px 10px;font-size:12.5px;}
.gsheets-box{border-top:1px solid var(--line);margin-top:4px;padding-top:10px;display:flex;flex-direction:column;gap:7px;}
.gsheets-label{font-size:11.5px;color:var(--ink-soft);font-weight:600;}
.gsheets-box input{
  width:100%;height:34px;border:1px solid var(--line);border-radius:5px;padding:0 9px;
  font-family:'JetBrains Mono',monospace;font-size:11.5px;background:#fff;color:var(--ink);direction:ltr;text-align:left;
}
.gsheets-box input:focus{outline:2px solid var(--orange);outline-offset:1px;border-color:var(--orange);}
.gsheets-btnrow{display:flex;gap:6px;}
.gsheets-btnrow .dropdown-action{flex:1;}
.gsheets-status{font-size:11.5px;min-height:14px;font-weight:600;overflow-wrap:anywhere;}
.gsheets-status.ok{color:var(--teal);}
.gsheets-status.err{color:var(--red);}
.gsync-indicator{font-size:11.5px;font-family:'JetBrains Mono',monospace;min-height:14px;overflow-wrap:anywhere;}
.gsync-indicator.ok{color:var(--teal);}
.gsync-indicator.err{color:var(--red);}
.gsync-indicator.pending{color:var(--amber);}
.autosync-row{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--ink-soft);font-weight:600;}
.autosync-row input{width:auto;height:auto;}
.sheet{
  background:var(--paper);
  border-radius:8px;
  padding:22px;
  display:none;
  max-width:100%;
  overflow-x:hidden;
}
.sheet.active{display:block;}
.sheet h2{
  font-family:'Cairo',sans-serif;
  font-weight:700;
  font-size:18px;
  margin:0 0 3px;
  color:var(--ink);
}
.sheet .hint{color:var(--ink-soft);font-size:13px;margin:0 0 18px;}
.form-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
  gap:12px;
  margin-bottom:14px;
}
.client-search-field{
  background:#EFF6FF;
  border:1px dashed var(--blue);
  border-radius:6px;
  padding:10px 12px;
  margin-bottom:12px;
}
.client-search-field label{color:var(--blue);font-weight:700;}
.client-search-field input{background:#fff;}
.field label{
  display:block;font-size:12px;color:var(--ink-soft);margin-bottom:5px;font-weight:500;
}
.field input,.field select{
  width:100%;height:38px;border:1px solid var(--line);border-radius:5px;
  padding:0 10px;font-family:'Tajawal',sans-serif;font-size:14px;background:#fff;color:var(--ink);
}
.field input:focus,.field select:focus{outline:2px solid var(--orange);outline-offset:1px;border-color:var(--orange);}
.field input[type=number],.field input[list]{font-family:'JetBrains Mono',monospace;font-size:13px;}
.field input.auto-filled{background:#EDF3F0;color:var(--teal);font-family:'JetBrains Mono',monospace;font-weight:700;cursor:not-allowed;}
.ac-wrap{position:relative;}
.ac-list{
  position:absolute;top:100%;right:0;left:0;z-index:80;margin-top:4px;
  background:#fff;border:1px solid var(--line);border-radius:6px;
  max-height:220px;overflow-y:auto;box-shadow:0 10px 28px rgba(0,0,0,.18);
}
.ac-item{padding:10px 12px;font-size:13.5px;color:var(--ink);cursor:pointer;border-bottom:1px solid var(--paper-dim);}
.ac-item:last-child{border-bottom:none;}
.ac-item:hover,.ac-item:active{background:var(--paper-dim);}
.permit-banner{
  display:none;
  font-size:14px;
  font-weight:700;
  padding:11px 16px;
  border-radius:6px;
  margin-bottom:14px;
  border-inline-start:4px solid var(--teal);
  overflow-wrap:anywhere;
}
.permit-banner.show{display:block;}
.permit-banner.found{background:#E4F4EE;color:var(--teal);}
.permit-banner.notfound{background:#FBEAE6;color:var(--red);border-inline-start-color:var(--red);}
.autocalc-note{font-size:11px;color:var(--steel);margin-top:5px;}
.addrow{display:flex;justify-content:flex-start;gap:10px;margin-bottom:22px;align-items:center;}
.addbtn{background:var(--teal);color:#fff;font-family:'Tajawal',sans-serif;font-weight:700;font-size:14px;border:none;border-radius:5px;padding:10px 22px;cursor:pointer;}
.addbtn:hover{background:#0D6249;}
.addbtn.editing{background:var(--blue);}
.cancelbtn{background:transparent;color:var(--ink-soft);font-family:'Tajawal',sans-serif;font-size:13px;border:1px solid var(--line);border-radius:5px;padding:9px 16px;cursor:pointer;display:none;}
.cancelbtn.show{display:inline-block;}
.editnote{font-size:12px;color:var(--blue);display:none;margin-bottom:10px;font-weight:500;}
.editnote.show{display:block;}
.sectionlabel{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-soft);margin:22px 0 8px;letter-spacing:.4px;border-top:2px solid var(--ink);padding-top:14px;}
table.entries{width:100%;border-collapse:collapse;font-size:12.5px;display:block;overflow-x:auto;overscroll-behavior-x:contain;}
table.entries th{
  background:var(--navy);color:#D9E6F0;text-align:right;padding:7px 8px;font-weight:600;font-size:11.5px;position:sticky;top:0;
}
table.entries td{padding:7px 8px;border-bottom:1px solid var(--paper-dim);color:var(--ink);white-space:nowrap;}
table.entries tr:nth-child(even) td{background:#EDF1EF;}
table.entries a.linkcell{color:var(--blue);text-decoration:none;font-weight:600;white-space:nowrap;}
table.entries a.linkcell:hover{text-decoration:underline;color:var(--orange-dark);}
table.entries td.act{cursor:pointer;text-align:center;width:26px;font-weight:700;}
table.entries td.act.del{color:var(--red);}
table.entries td.act.edit{color:var(--blue);}
.empty{color:var(--ink-soft);font-size:13px;padding:14px 0;}
.tabletoggle{font-size:12px;color:var(--ink-soft);padding:10px 2px 0;}
.toggle-link{background:none;border:none;color:var(--blue);font-family:'Tajawal',sans-serif;font-weight:700;font-size:12.5px;cursor:pointer;padding:0;text-decoration:underline;}
.toggle-link:hover{color:var(--orange-dark);}
details.existing{border:1px solid var(--line);border-radius:6px;background:#fff;}
details.existing summary{
  cursor:pointer;padding:10px 14px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink-soft);font-weight:600;list-style:none;display:flex;align-items:center;gap:8px;
}
details.existing summary::-webkit-details-marker{display:none;}
details.existing summary::before{content:"▸";color:var(--steel);}
details.existing[open] summary::before{content:"▾";}
details.existing .inner{padding:0 14px 14px;}
@media (max-width:900px){
  body{padding:14px;}
  .sheet{padding:16px;}
  .titleblock{padding:14px 16px;}
  .titleblock h1{font-size:19px;}
  .toolbar{gap:8px;}
  table.entries{font-size:11.5px;}
}
@media (max-width:640px){
  body{padding:10px;}
  .sheet{padding:14px;}
}
</style>
</head>
<body>

<div class="login-gate" id="loginGate">
  <div class="login-box">
    <h1 class="login-title">نموذج إدخال البيانات</h1>
    <p class="login-sub">سجّل دخولك بحساب Google المسجّل بريده في 11 — معلومات الموظفين</p>
    <div id="googleSignInBtn"></div>
    <div class="login-status" id="loginStatus"></div>
    <p class="login-note">إعداد الدخول يحتاج Client ID من Google Cloud — راجعي المطوّر إذا ما ظهر زر الدخول.</p>
  </div>
</div>

<div class="wrap" id="appRoot" style="display:none;">

  <div class="titleblock">
    <div>
      <h1>نموذج إدخال البيانات — التقرير الشهري / تطوير</h1>
      <div class="sub">14 جدول بيانات · فريق عضماية · إضافة وتعديل وعرض السجلات</div>
    </div>
    <div class="stamp">
      <div class="n" id="stampCount">0</div>
      <div class="l">إجمالي السجلات</div>
    </div>
  </div>

  <div class="userbar" id="userBar">
    <img class="userbar-pic" id="userPic" src="" alt="">
    <div class="userbar-info">
      <div class="userbar-name" id="userName"></div>
      <div class="userbar-email" id="userEmail"></div>
    </div>
    <span class="role-badge" id="roleBadge"></span>
    <button class="btn btn-ghost small" id="signOutBtn">تسجيل الخروج</button>
  </div>

  <div class="toolbar">
    <div class="menu-wrap">
      <button class="menubtn" id="sheetMenuBtn">☰ الجداول</button>
      <div class="dropdown" id="sheetMenu"></div>
    </div>
    <div class="menu-wrap" id="settingsMenuWrap">
      <button class="menubtn" id="settingsMenuBtn">⚙ الإعدادات</button>
      <div class="dropdown settings-dropdown" id="settingsMenu">
        <button class="btn btn-primary dropdown-action" id="exportAllBtn">تصدير كل الجداول إلى Excel</button>
        <div class="gsheets-box" id="gsheetsBox">
          <label class="gsheets-label">ربط Google Sheets (رابط Apps Script Web App)</label>
          <input type="url" id="gsheetsUrl" placeholder="https://script.google.com/macros/s/.../exec" autocomplete="off">
          <div class="gsheets-btnrow">
            <button class="btn btn-ghost dropdown-action small" id="gsheetsSaveBtn">حفظ الرابط</button>
            <button class="btn btn-primary dropdown-action small" id="gsheetsSyncBtn">مزامنة الآن</button>
          </div>
          <div class="gsheets-status" id="gsheetsStatus"></div>
          <label class="autosync-row"><input type="checkbox" id="autoSyncToggle" checked> مزامنة تلقائية بعد كل إضافة / تعديل / حذف</label>
        </div>
      </div>
    </div>
    <span class="savenote" id="saveNote">جاهز</span>
    <span class="gsync-indicator" id="gsyncIndicator"></span>
  </div>

  <div id="sheets"></div>

</div>

<script>

// TODO: paste your Google Cloud OAuth Client ID here (see setup steps)
const GOOGLE_CLIENT_ID="126740848826-b423h0tk0om7fa5dnao5lf5qei3h3mos.apps.googleusercontent.com";

// ⚠️ Paste your Apps Script Web App URL here (ends in /exec). This makes it
// available on every device automatically, instead of each device needing
// it typed in manually under Settings.
const DEFAULT_GSHEETS_URL="https://script.google.com/macros/s/AKfycbzbMD0oes1iQebT3YpH4QFXDqzwHeFlTMWJAdYfVu6hj8rNFS-WovmzKYQIAs-YWHZmow/exec";

// This email always gets Admin, regardless of what's in 11 — معلومات
// الموظفين — a permanent safety net so you can never get locked out.

const CONTRACTORS=["TCC","Solutions"];
const CONNECTION_TYPES=["مياه","صرف","تركيب عداد"];
const CONTRACT_TYPES=["سنوي","شهري"];
const PIPE_DIAM=["25","150"];

function monthOptions(){
  const names=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const out=[];
  let y=26,m=4;
  for(let i=0;i<24;i++){
    out.push(names[m]+"-"+String(y));
    m++; if(m>11){m=0;y++;}
  }
  return out;
}
const MONTHS=monthOptions();

function escapeHtml(s){
  return String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// Native <datalist> suggestions are unreliable on mobile Chrome — tapping
// an option often fails to commit the value (no input/change event fires).
// This is a small custom dropdown that behaves the same everywhere: type
// to filter, tap/click an item to select it. getOptions() is called fresh
// each time the list opens/filters, so it always reflects current data
// with no separate refresh step needed. onSelect(value) fires after the
// input's value is set, so callers can run their existing "value changed"
// logic (e.g. updatePermitDisplay).
function attachAutocomplete(inputEl,getOptions,onSelect){
  if(!inputEl||inputEl.dataset.acAttached)return;
  inputEl.dataset.acAttached="1";
  let wrap=inputEl.parentNode;
  if(!wrap.classList.contains("ac-wrap")){
    wrap=document.createElement("div");
    wrap.className="ac-wrap";
    inputEl.parentNode.insertBefore(wrap,inputEl);
    wrap.appendChild(inputEl);
  }
  const listEl=document.createElement("div");
  listEl.className="ac-list";
  listEl.style.display="none";
  wrap.appendChild(listEl);
  function renderList(){
    const q=inputEl.value.trim().toLowerCase();
    const opts=(getOptions()||[]).filter(o=>o&&(!q||String(o).toLowerCase().includes(q)));
    if(!opts.length){listEl.style.display="none";listEl.innerHTML="";return;}
    listEl.innerHTML=opts.slice(0,30).map(o=>`<div class="ac-item">${escapeHtml(o)}</div>`).join("");
    listEl.style.display="";
    listEl.querySelectorAll(".ac-item").forEach(item=>{
      // mousedown (not click) fires BEFORE the input's blur — using it and
      // preventing default keeps focus in the input so the dropdown is
      // still open and the tap actually registers. This also fires for
      // touch taps on mobile Chrome/Safari, so no separate touch handler
      // is needed.
      item.addEventListener("mousedown",(e)=>{
        e.preventDefault();
        inputEl.value=item.textContent;
        listEl.style.display="none";
        onSelect(item.textContent);
      });
    });
  }
  inputEl.addEventListener("focus",renderList);
  inputEl.addEventListener("input",renderList);
  inputEl.addEventListener("blur",()=>{
    setTimeout(()=>{listEl.style.display="none";},150);
  });
}

function cellHTML(f,val){
  if(!val)return"";
  if(f.type==="url"){
    const safe=escapeHtml(val);
    return `<a href="${safe}" target="_blank" rel="noopener noreferrer" class="linkcell" title="${safe}">🔗 فتح الرابط</a>`;
  }
  return escapeHtml(val);
}

async function storageGet(key){
  if(typeof window.storage!=="undefined"&&window.storage){
    try{
      const r=await window.storage.get(key,false);
      return (r&&r.value!==undefined)?r.value:null;
    }catch(e){}
  }
  try{return localStorage.getItem(key);}catch(e){return null;}
}
async function storageSet(key,value){
  if(typeof window.storage!=="undefined"&&window.storage){
    try{await window.storage.set(key,value,false);return true;}catch(e){}
  }
  try{localStorage.setItem(key,value);return true;}catch(e){return false;}
}

function dynOptions(kind){
  if(kind==="employees"){
    return Array.from(new Set(store.employees.map(e=>e.name).filter(Boolean)));
  }
  if(kind==="teams"){
    return Array.from(new Set(store.teamsList.map(t=>t.team).filter(Boolean)));
  }
  return [];
}
function permitOptions(){
  const permits=store.client.map(c=>c.permit).filter(Boolean);
  const seen=new Set();
  const latestFirst=[];
  for(let i=permits.length-1;i>=0&&latestFirst.length<5;i--){
    const p=permits[i];
    if(!seen.has(p)){
      seen.add(p);
      latestFirst.push(p);
    }
  }
  return latestFirst;
}
function clientSearchOptions(){
  const seen=new Set();
  const out=[];
  // آخر 7 عملاء فقط — الأحدث أولاً
  for(let i=store.client.length-1;i>=0&&out.length<7;i--){
    const c=store.client[i];
    if(!c.permit)continue;
    const label=(c.name||"—")+" — "+c.permit;
    if(seen.has(label))continue;
    seen.add(label);
    out.push({label,permit:c.permit});
  }
  return out;
}

function todayISO(){
  return new Date().toLocaleDateString("en-CA");
}

function timestampYMDHM(){
  const d=new Date();
  const p=n=>String(n).padStart(2,"0");
  return ""+d.getFullYear()+p(d.getMonth()+1)+p(d.getDate())+p(d.getHours())+p(d.getMinutes());
}

function applyClientPermitMode(regenerate){
  const connEl=document.getElementById("f-client-connType");
  const permitEl=document.getElementById("f-client-permit");
  if(!connEl||!permitEl)return;
  const isMeter=connEl.value==="تركيب عداد";
  permitEl.readOnly=isMeter;
  permitEl.classList.toggle("auto-filled",isMeter);
  if(regenerate){
    if(isMeter){
      permitEl.value=timestampYMDHM();
    }else if(/^\d{12}$/.test(permitEl.value.trim())){
      permitEl.value="";
    }
  }
}

  const inputId=`f-${sheetId}-${f.key}`;
  if(sheetId==="purchases"&&f.key==="category"){
    return `<input id="${inputId}" type="text" readonly placeholder="يُملأ تلقائياً حسب Type" autocomplete="off">`;
  }
  if(sheetId==="purchases"&&f.key==="taxReturns"){
    return `<input id="${inputId}" type="text" readonly autocomplete="off">`;
  }
  if(sheetId==="employeeInfo"&&f.key==="empId"){
    return `<input id="${inputId}" type="text" readonly autocomplete="off">`;
  }
  if(sheetId==="employeeInfo"&&f.key==="endDate"){
    return `<input id="${inputId}" type="date" autocomplete="off">`;
  }
  if(f.type==="select"){
    const opts=f.options?f.options:dynOptions(f.optionsFrom);
    return `<select id="${inputId}"><option value="">—</option>${opts.map(o=>`<option value="${o}"${f.default===o?" selected":""}>${o}</option>`).join("")}</select>`;
  }
  if(f.list==="permits"){
    return `<input id="${inputId}" type="text" class="permit-autocomplete-input" data-sheet="${sheetId}" autocomplete="off">`;
  }
  if(f.list==="excStarts"){
    return `<input id="${inputId}" type="date" list="dl-excstarts" value="${todayISO()}" autocomplete="off">`;
  }
  if(f.type==="integer"){
    return `<input id="${inputId}" type="number" step="1" inputmode="numeric" autocomplete="off">`;
  }
  if(f.type==="date"){
    return `<input id="${inputId}" type="date" value="${todayISO()}" autocomplete="off">`;
  }
  const type=f.type==="url"?"url":(f.type==="number"?"number":"text");
  const defAttr=f.default!==undefined?` value="${f.default}"`:"";
  if(sheetId==="purchases"&&f.key==="folderLink"){
    return `<div class="receipt-scan-row">

}

function handleClientSearchInput(sheetId){
  const searchEl=document.getElementById(`cs-${sheetId}`);
  if(!searchEl)return;
  const val=searchEl.value.trim();
  if(!val)return;
  const match=clientSearchOptions().find(o=>o.label===val);
  if(!match)return;
  const s=SHEETS.find(x=>x.id===sheetId);
  if(sheetId==="purchases"){
    // تعبئة تاريخ الشراء من آخر تاريخ بدء في بيانات الحفرية لهذا العميل
    const starts=clientStartDates(match.permit);
    const dateEl=document.getElementById("f-purchases-date");
    const banner=document.getElementById("pc-purchases");
    if(starts.length&&dateEl){
      dateEl.value=starts[starts.length-1];
      const dayEl=document.getElementById("f-purchases-day");
      if(dayEl)dayEl.value=dayNameFromDate(dateEl.value);
      if(banner)banner.innerHTML=`📅 تاريخ البدء من بيانات الحفرية: <strong>${starts[starts.length-1]}</strong>`;
    }else if(banner){
      banner.innerHTML=`⚠️ لا يوجد تاريخ بدء مسجّل في بيانات الحفرية لهذا العميل.`;
    }
    searchEl.value="";
    return;
  }
  const f=s.fields.find(fl=>fl.list==="permits");
  if(!f)return;
  const permitEl=document.getElementById(`f-${sheetId}-${f.key}`);
  if(!permitEl)return;
  permitEl.value=match.permit;
  searchEl.value="";
  updatePermitDisplay(sheetId);
}

function clientForPermit(permit){
  if(!permit)return null;
  const match=store.client.slice().reverse().find(c=>String(c.permit).trim()===String(permit).trim());
  return match||null;
}

function excavationForPermit(permit){
  if(!permit)return null;
  const match=store.excavation.slice().reverse().find(c=>String(c.permit).trim()===String(permit).trim());
  return match||null;
}

function computeAsphaltTon(permit){
  const exc=excavationForPermit(permit);
  if(!exc)return null;
  const len=parseFloat(exc.excLen);
  const width=parseFloat(exc.width);
  const thickness=parseFloat(exc.asphaltThickness);
  if(isNaN(len)||isNaN(width)||isNaN(thickness))return null;
  return Math.round((len*width*thickness/100*2.1)*100)/100;
}

function updatePermitDisplay(sheetId,autoFillDefaults){
  if(autoFillDefaults===undefined)autoFillDefaults=true;
  const s=SHEETS.find(x=>x.id===sheetId);
  const f=s.fields.find(f=>f.list==="permits");
  if(!f)return;
  const el=document.getElementById(`f-${sheetId}-${f.key}`);
  const disp=document.getElementById(`pc-${sheetId}`);
  if(!el||!disp)return;
  const val=el.value.trim();
  if(sheetId==="dailyCosts"){
    const tonEl=document.getElementById("f-dailyCosts-asphaltTon");
    if(tonEl){
      const computed=computeAsphaltTon(val);
      if(computed!==null)tonEl.value=computed;
    }
  }
  const client=val?clientForPermit(val):null;
  if(sheetId==="excavation"){
    applyExcavationVisibility(client?client.connType:null);
    if(autoFillDefaults){
      const diamEl=document.getElementById("f-excavation-diam");
      if(diamEl&&client){
        if(client.connType==="مياه")diamEl.value="25";
        else if(client.connType==="صرف")diamEl.value="150";
      }
    }
  }
  if(!val){
    disp.textContent="";disp.className="permit-banner";
    if(sheetId==="qualityWork")syncQualityChecklist("");
    return;
  }
  if(client){
    const parts=["👤 اسم العميل: "+(client.name||"—")];
    if(client.connType)parts.push("🔧 نوع التوصيلة: "+client.connType);
    disp.textContent=parts.join("   —   ");
    disp.className="permit-banner show found";
  }else{
    disp.textContent="⚠ لا يوجد عميل بهذا التصريح في بيانات العميل";
    disp.className="permit-banner show notfound";
  }
  if(sheetId==="qualityWork")syncQualityChecklist(val);
}

const EXCAVATION_HIDE_RULES={
  "مياه":["inspectionRooms","cleanOut"],
  "صرف":["single","tree","connCount","remaining"]
};
const EXCAVATION_ALWAYS_VISIBLE=["permit","startDate","endDate"];
function applyExcavationVisibility(connType){
  const s=SHEETS.find(x=>x.id==="excavation");
  let hiddenKeys=[];
  if(connType==="مياه"||connType==="صرف"){
    hiddenKeys=EXCAVATION_HIDE_RULES[connType];
  }else if(connType==="تركيب عداد"){
    hiddenKeys=s.fields.map(fl=>fl.key).filter(k=>!EXCAVATION_ALWAYS_VISIBLE.includes(k));
  }
  s.fields.forEach(fl=>{
    const wrap=document.getElementById(`field-excavation-${fl.key}`);
    if(!wrap)return;
    const hide=hiddenKeys.includes(fl.key);
    wrap.style.display=hide?"none":"";
    if(hide){
      const input=document.getElementById(`f-excavation-${fl.key}`);
      if(input)input.value="";
    }
  });
}

function readFormValues(sheetId){
  const s=SHEETS.find(x=>x.id===sheetId);
  const entry={};
  let hasValue=false;
  s.fields.forEach(f=>{
    const el=document.getElementById(`f-${sheetId}-${f.key}`);
    let v=el.value.trim();
    if(f.type==="integer"&&v!=="")v=String(Math.round(parseFloat(v)));
    entry[f.key]=v;
    if(v)hasValue=true;
  });
  return {entry,hasValue};
}
function nextEmployeeId(){
  const nums=store.employeeInfo.map(e=>parseInt(e.empId,10)).filter(n=>!isNaN(n));
  const max=nums.length?Math.max.apply(null,nums):0;
  return String(max+1);
}

function clearForm(sheetId){
  const s=SHEETS.find(x=>x.id===sheetId);
  s.fields.forEach(f=>{
    let v="";
    if(sheetId==="employeeInfo"&&f.key==="endDate")v="";
    else if(sheetId==="employeeInfo"&&f.key==="empId")v=nextEmployeeId();
    else if(f.type==="date")v=todayISO();

    document.getElementById(`f-${sheetId}-${f.key}`).value=v;

function saveEntry(sheetId){
  if(!canCreateEdit(sheetId))return;
  const {entry,hasValue}=readFormValues(sheetId);
  if(!hasValue){
    document.getElementById("saveNote").textContent="أدخل بيانات قبل الإضافة";
    return;
  }
  const s=SHEETS.find(x=>x.id===sheetId);
  const isUpdate=editState[sheetId]!==null;
  if(isUpdate){
    store[sheetId][editState[sheetId]]=entry;
    cancelEdit(sheetId,true);
  }else{
    store[sheetId].push(entry);
  }
  logAudit(isUpdate?"تعديل":"إضافة",s.title,entry);
  clearForm(sheetId);
  refreshDynamicOptions();
  renderTable(sheetId);
  updateCounts();
  saveStore();
}

function editEntry(sheetId,idx){
  if(!canCreateEdit(sheetId))return;
  const s=SHEETS.find(x=>x.id===sheetId);
  const entry=store[sheetId][idx];
  s.fields.forEach(f=>{
    document.getElementById(`f-${sheetId}-${f.key}`).value=entry[f.key]||"";
  });
  editState[sheetId]=idx;
  updatePermitDisplay(sheetId,false);
  if(sheetId==="client")applyClientPermitMode(false);
  if(sheetId==="purchases"){
    purchaseScanCompleted=!!(entry.folderLink&&entry.folderLink.trim());

  btn.classList.add("editing");
  document.querySelector(`.cancelbtn[data-sheet="${sheetId}"]`).classList.add("show");
  document.getElementById(`editnote-${sheetId}`).classList.add("show");
  document.getElementById("sheet-"+sheetId).scrollIntoView({behavior:"smooth",block:"start"});

function cancelEdit(sheetId,skipClear){
  editState[sheetId]=null;
  const btn=document.querySelector(`.addbtn[data-sheet="${sheetId}"]`);
  btn.textContent="+ إضافة الصف";
  btn.classList.remove("editing");
  document.querySelector(`.cancelbtn[data-sheet="${sheetId}"]`).classList.remove("show");

function deleteEntry(sheetId,idx){
  if(!canDelete(sheetId))return;
  const input=prompt("للتأكيد على حذف هذا السجل، اكتبي الحرف d ثم اضغطي موافق:");
  if(input===null)return;
  if(input.trim().toLowerCase()!=="d"){
    alert("لم يتم الحذف — لازم تكتبين الحرف d بالضبط للتأكيد.");
    return;
  }
  const s=SHEETS.find(x=>x.id===sheetId);
  const removed=store[sheetId][idx];
  store[sheetId].splice(idx,1);
  logAudit("حذف",s.title,removed);
  if(editState[sheetId]===idx)cancelEdit(sheetId);
  refreshDynamicOptions();
  renderTable(sheetId);
  updateCounts();
  saveStore();
}

function excStartOptions(){
  const seen=new Set();
  const out=[];
  for(let i=store.excavation.length-1;i>=0&&out.length<7;i--){
    const d=normDate(store.excavation[i].startDate);
    if(!d||seen.has(d))continue;
    seen.add(d);
    out.push(d);
  }
  return out;
}

// Resizes an image file down to a reasonable max dimension and re-encodes
// as JPEG, so phone-camera photos (often several MB) upload quickly and
// reliably. This is a plain resize/compress only — no cropping or
// perspective correction. watermarkLines (optional) draws a bottom-right
// timestamp/location box, qrCanvas (optional) draws a bottom-left Maps QR
// code — both for جودة العمل photos, omitted entirely for other callers
// (e.g. receipt scans).
function resizeImageFile(file,maxDim,quality,watermarkLines,qrCanvas){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    const reader=new FileReader();
    reader.onerror=()=>reject(new Error("تعذّرت قراءة الملف"));
    reader.onload=()=>{
      img.onerror=()=>reject(new Error("تعذّر فتح الصورة"));
      img.onload=()=>{
        let w=img.width,h=img.height;
        if(w>maxDim||h>maxDim){
          if(w>=h){h=Math.round(h*maxDim/w);w=maxDim;}
          else{w=Math.round(w*maxDim/h);h=maxDim;}
        }
        const canvas=document.createElement("canvas");
        canvas.width=w;canvas.height=h;
        const ctx=canvas.getContext("2d");
        ctx.drawImage(img,0,0,w,h);
        if(watermarkLines&&watermarkLines.length)drawWatermark(ctx,w,h,watermarkLines);
        if(qrCanvas)drawQrOverlay(ctx,w,h,qrCanvas);
        const dataUrl=canvas.toDataURL("image/jpeg",quality);
        resolve(dataUrlToBase64(dataUrl));
      };
      img.src=reader.result;
    };
    reader.readAsDataURL(file);
  });
}

async function handleReceiptScan(fileInput){
  const file=fileInput.files&&fileInput.files[0];
  if(!file)return;
  const statusEl=document.getElementById("scanstatus-purchases-folderLink");
  const linkInput=document.getElementById("f-purchases-folderLink");
  const dateEl=document.getElementById("f-purchases-date");
  const amountEl=document.getElementById("f-purchases-amount");
  const purchaseDate=dateEl?dateEl.value:"";
  const amount=amountEl?amountEl.value.trim():"";
  purchaseScanCompleted=false;
  updatePurchaseFormState();
  statusEl.textContent="⏳ جارٍ تجهيز الصورة...";
  statusEl.className="receipt-scan-status";
  try{
    const base64=await resizeImageFile(file,1600,0.8);
    const url=await resolveGsheetsUrl();
    if(!url){statusEl.textContent="⛔ لم يتم إعداد رابط Google Sheets";statusEl.className="receipt-scan-status err";return;}
    statusEl.textContent="⏳ جارٍ رفع الإيصال...";
    const res=await fetch(url,{
      method:"POST",
      body:JSON.stringify({
        action:"uploadReceipt",
        idToken:currentUser&&currentUser.idToken,
        purchaseDate:purchaseDate,
        amount:amount,
        mimeType:"image/jpeg",
        base64:base64
      })
    });
    const data=await res.json();
    if(data.status==="ok"&&data.url){
      linkInput.value=data.url;
      purchaseScanCompleted=true;
      statusEl.textContent="✅ تم رفع الإيصال";
      statusEl.className="receipt-scan-status ok";
    }else{
      statusEl.textContent="⛔ "+(data.message||"فشل رفع الإيصال");
      statusEl.className="receipt-scan-status err";
    }
  }catch(err){
    statusEl.textContent="⛔ خطأ: "+err.message;
    statusEl.className="receipt-scan-status err";
  }finally{
    fileInput.value="";
    updatePurchaseFormState();
  }
}

// ── جودة العمل — quality checklist workflow ──────────────────────────────
//
// قائمة الجودة defines, per نوع التوصيلة, an ordered list of required shots:
// how many photos max (الصور), max video length in seconds (الفيديو), and
// which of الصور/الفيديو/الكل is mandatory. جودة العمل looks up the client's
// نوع التوصيلة from تصريح بلدي (same permit search as 02 — بيانات الحفرية),
// builds the matching checklist, and only unlocks the next item once the
// current one satisfies its mandatory rule. Files upload into
// NWC/Quality/YYYY/MM/DD/<تصريح بلدي>/<المطلوب تصويره> on the server side
// (YYYY/MM/DD taken from that permit's تاريخ البدء in بيانات الحفرية), and
// only that folder's link is kept, in رابط الملف.

function parseConnTypeList(v){
  return String(v||"").split(",").map(x=>x.trim()).filter(Boolean);
}
function qualityRulesForConnType(connType){
  if(!connType)return [];
  return store.qualityList.filter(r=>parseConnTypeList(r.connType).includes(connType));
}
function qualityWorkRow(permit,stage,item){
  return store.qualityWork.find(r=>
    String(r.permit||"").trim()===String(permit).trim()&&
    r.stage===stage&&r.item===item
  );
}
function mandatoryTypes(mandatory){
  if(mandatory==="الكل")return["photo","video"];
  if(mandatory==="الفيديو")return["video"];
  if(mandatory==="الصور")return["photo"];
  return[];
}

let qwState={permit:"",connType:"",rules:[],activeIndex:-1,photos:0,video:false,folderLink:"",firstCapturedAt:null};
let qwRecorder=null,qwRecordedChunks=[],qwRecordStream=null,qwRecordStopTimer=null,qwRecordTickInterval=null,qwRecordStartTs=null;
let qwSourceVideoEl=null,qwRecordDrawing=false,qwRecordAnimFrame=null;

// ── GPS/location availability guard ───────────────────────────────────
// Every photo/video here needs a location fix to stamp, so if GPS and
// WiFi are both off (no way to get a fix at all) the capture area is
// blocked behind a warning that only disappears once location comes
// back — watchPosition reacts to that automatically, and a periodic
// getCurrentPosition poll backs it up in case a browser doesn't re-fire
// watchPosition's error callback on its own. The records table below and
// the tab menu above stay usable throughout — only the search/permit/
// checklist area is covered by the overlay (qw-locked-wrap in the
// markup), never a page-blocking dialog.
let qwGeoWatchId=null,qwGeoAvailable=null,qwGeoPollTimer=null;
function startQwGeoWatch(){
  if(!navigator.geolocation){
    qwGeoAvailable=false;
    updateQwGeoOverlay();
    return;
  }
  if(qwGeoWatchId!==null)return; // already watching
  qwGeoWatchId=navigator.geolocation.watchPosition(
    ()=>{qwGeoAvailable=true;updateQwGeoOverlay();stopQwGeoPoll();},
    ()=>{qwGeoAvailable=false;updateQwGeoOverlay();startQwGeoPoll();},
    {enableHighAccuracy:true,maximumAge:15000,timeout:10000}
  );
}
function stopQwGeoWatch(){
  if(qwGeoWatchId!==null&&navigator.geolocation){
    navigator.geolocation.clearWatch(qwGeoWatchId);
    qwGeoWatchId=null;
  }
  stopQwGeoPoll();
}
function startQwGeoPoll(){
  if(qwGeoPollTimer)return;
  qwGeoPollTimer=setInterval(()=>{
    navigator.geolocation.getCurrentPosition(
      ()=>{qwGeoAvailable=true;updateQwGeoOverlay();stopQwGeoPoll();},
      ()=>{qwGeoAvailable=false;updateQwGeoOverlay();},
      {enableHighAccuracy:true,maximumAge:0,timeout:8000}
    );
  },6000);
}
function stopQwGeoPoll(){
  if(qwGeoPollTimer){clearInterval(qwGeoPollTimer);qwGeoPollTimer=null;}
}
// qwGeoAvailable stays null (overlay hidden) until we get a definitive
// failure — so opening the tab doesn't flash a false alarm while the
// very first fix is still pending.
function updateQwGeoOverlay(){
  const overlay=document.getElementById("qw-geo-overlay");
  if(overlay)overlay.style.display=(qwGeoAvailable===false)?"flex":"none";
}


// ── timestamp / location / address watermark, burned into every photo
// and video frame taken in جودة العمل — bottom-right, in this order:
// date & time, then latitude/longitude, then address. ─────────────────

function formatStampTime(d){
  const p=n=>String(n).padStart(2,"0");
  return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate())+" "+p(d.getHours())+":"+p(d.getMinutes())+":"+p(d.getSeconds());
}
// 24h HHhMM, used as a sortable prefix on the المطلوب تصويره Drive folder
// name (e.g. "14h32 - الموقع قبل بدء الأعمال") so folders list in capture
// order when sorted by name.
function formatFolderTime(d){
  const p=n=>String(n).padStart(2,"0");
  return p(d.getHours())+"h"+p(d.getMinutes());
}
function getCurrentPosition(options){
  return new Promise((resolve,reject)=>{
    if(!navigator.geolocation){reject(new Error("المتصفح لا يدعم تحديد الموقع"));return;}
    navigator.geolocation.getCurrentPosition(
      pos=>resolve(pos),
      err=>reject(new Error("تعذّر تحديد الموقع: "+err.message)),
      options||{enableHighAccuracy:true,timeout:15000,maximumAge:0}
    );
  });
}
// Address lookups are cached per ~11m grid cell (4 decimal places) for
// the length of the session, so retaking several shots at the same spot
// doesn't re-trigger a billed Geocoding API call each time. Only
// successes are cached — a failure (e.g. API key not set up yet) is
// retried on the next shot rather than remembered as permanently blank.
let qwAddressCache={};
let qwLastGeocodeError="";
async function reverseGeocodeCached(lat,lng){
  const key=lat.toFixed(4)+","+lng.toFixed(4);
  if(qwAddressCache[key]!==undefined){qwLastGeocodeError="";return qwAddressCache[key];}
  try{
    const url=await resolveGsheetsUrl();
    if(!url){qwLastGeocodeError="لم يتم إعداد رابط Google Sheets";return "";}
    const res=await fetch(url,{
      method:"POST",
      body:JSON.stringify({action:"reverseGeocode",idToken:currentUser&&currentUser.idToken,lat:lat,lng:lng})
    });
    const data=await res.json();
    if(data.status==="ok"&&data.address){
      qwLastGeocodeError="";
      qwAddressCache[key]=data.address;
      return data.address;
    }
    qwLastGeocodeError=data.message||"تعذّر تحديد العنوان";
    console.error("reverseGeocode:",qwLastGeocodeError);
    return "";
  }catch(e){
    qwLastGeocodeError="تعذّر الاتصال بخدمة العنوان: "+e.message;
    console.error("reverseGeocode exception:",e);
    return ""; // address is a nice-to-have — never block the capture over it
  }
}
// Gathers the stamp for one capture: timestamp always succeeds; location
// and address are best-effort (a denied permission or offline moment
// still lets the photo/video go out with just the timestamp).
async function captureGeoStamp(){
  qwLastGeocodeError="";
  const stamp={timestampText:formatStampTime(new Date()),lat:null,lng:null,address:""};
  try{
    const pos=await getCurrentPosition();
    stamp.lat=pos.coords.latitude;
    stamp.lng=pos.coords.longitude;
    stamp.address=await reverseGeocodeCached(stamp.lat,stamp.lng);
  }catch(e){
    qwLastGeocodeError="تعذّر تحديد الموقع: "+e.message;
  }
  return stamp;
}
function buildWatermarkLines(stamp){
  const lines=[stamp.timestampText];
  if(stamp.lat!=null&&stamp.lng!=null)lines.push(stamp.lat.toFixed(5)+"°, "+stamp.lng.toFixed(5)+"°");
  if(stamp.address)lines.push(stamp.address);
  return lines;
}
// Draws the semi-transparent bottom-right box + stacked lines onto any
// 2D canvas context — shared by the photo path and the live video path.
function drawWatermark(ctx,canvasW,canvasH,lines){
  if(!lines||!lines.length)return;
  const fontSize=Math.max(14,Math.round(canvasW*0.022));
  const paddingX=10,paddingY=8,lineGap=4,margin=10,maxTextWidth=canvasW*0.55;
  ctx.save();
  ctx.font=fontSize+"px monospace";
  ctx.textAlign="right";
  let maxWidth=0;
  lines.forEach(l=>{const w=Math.min(ctx.measureText(l).width,maxTextWidth);if(w>maxWidth)maxWidth=w;});
  const boxWidth=maxWidth+paddingX*2;
  const lineHeight=fontSize+lineGap;
  const boxHeight=lines.length*lineHeight-lineGap+paddingY*2;
  const boxX=canvasW-margin-boxWidth;
  const boxY=canvasH-margin-boxHeight;
  ctx.fillStyle="rgba(0,0,0,0.55)";
  ctx.fillRect(boxX,boxY,boxWidth,boxHeight);
  ctx.fillStyle="#ffffff";
  const textRightX=canvasW-margin-paddingX;
  lines.forEach((line,i)=>{
    const baselineY=boxY+paddingY+fontSize*0.85+i*lineHeight;
    ctx.fillText(line,textRightX,baselineY,maxTextWidth);
  });
  ctx.restore();
}

// A QR code encoding a Google Maps link to the exact capture coordinates,
// drawn bottom-left (mirroring the text stamp on the right). Rendered once
// per photo — or once per video (location is fixed at recording start
// anyway) and reused every frame, since regenerating a QR code 30x/second
// would be wasted work for a code that never changes mid-clip.
function buildMapsUrl(lat,lng){
  return "https://www.google.com/maps?q="+lat.toFixed(6)+","+lng.toFixed(6);
}
function makeQrCanvas(url){
  if(typeof QRious==="undefined")return null;
  try{
    const c=document.createElement("canvas");
    new QRious({element:c,value:url,size:220,background:"#ffffff",foreground:"#000000",level:"M"});
    return c;
  }catch(e){
    console.error("QR generation failed:",e);
    return null;
  }
}
function drawQrOverlay(ctx,canvasW,canvasH,qrCanvas){
  if(!qrCanvas)return;
  const margin=10,pad=6;
  const qrSize=Math.max(56,Math.min(120,Math.round(canvasW*0.16)));
  const boxSize=qrSize+pad*2;
  ctx.save();
  ctx.fillStyle="#ffffff";
  ctx.fillRect(margin,canvasH-margin-boxSize,boxSize,boxSize);
  ctx.drawImage(qrCanvas,margin+pad,canvasH-margin-boxSize+pad,qrSize,qrSize);
  ctx.restore();
}

// Called from updatePermitDisplay whenever the قائمة العمل permit field
// changes — same trigger path used by 02 — بيانات الحفرية.
function syncQualityChecklist(permit){
  const checklistEl=document.getElementById("qw-checklist");
  if(!checklistEl)return;
  stopQualityVideoRecording();
  permit=String(permit||"").trim();
  qwState={permit,connType:"",rules:[],activeIndex:-1,photos:0,video:false,folderLink:"",firstCapturedAt:null};
  if(!permit){checklistEl.innerHTML="";return;}
  const client=clientForPermit(permit);
  if(!client){checklistEl.innerHTML="";return;} // the permit-banner already shows "not found"
  qwState.connType=client.connType||"";
  const rules=qualityRulesForConnType(qwState.connType);
  qwState.rules=rules;
  if(!rules.length){
    checklistEl.innerHTML=`<div class="empty">⚠ لا توجد بنود جودة معرّفة لنوع التوصيلة «${escapeHtml(qwState.connType||"—")}» في قائمة الجودة.</div>`;
    return;
  }
  qwState.activeIndex=rules.findIndex(r=>!qualityWorkRow(permit,r.stage,r.item));
  renderQualityChecklist();
}

function qwComplianceMet(){
  const rule=qwState.rules[qwState.activeIndex];
  if(!rule)return false;
  const need=mandatoryTypes(rule.mandatory);
  if(need.includes("photo")&&qwState.photos<1)return false;
  if(need.includes("video")&&!qwState.video)return false;
  return true;
}

// Same as renderQualityChecklist(), but preserves whatever status message
// is currently showing (e.g. "✅ تم رفع الصورة" / "⛔ فشل رفع الفيديو...").
// renderQualityChecklist() rebuilds the whole panel's HTML, which recreates
// #qw-capture-status empty — without this, a just-set status message gets
// wiped out in the same synchronous tick, before the browser ever paints
// it, so success/error messages were never actually visible.
function renderQualityChecklistKeepStatus(){
  const oldStatus=document.getElementById("qw-capture-status");
  const savedText=oldStatus?oldStatus.textContent:"";
  const savedClass=oldStatus?oldStatus.className:"";
  renderQualityChecklist();
  const newStatus=document.getElementById("qw-capture-status");
  if(newStatus&&savedText){
    newStatus.textContent=savedText;
    newStatus.className=savedClass;
  }
}

function renderQualityChecklist(){
  const checklistEl=document.getElementById("qw-checklist");
  if(!checklistEl)return;
  let html="";
  let lastStage=null;
  qwState.rules.forEach((rule,idx)=>{
    if(rule.stage!==lastStage){
      html+=`<div class="qw-stage-header">${escapeHtml(rule.stage)}</div>`;
      lastStage=rule.stage;
    }
    const existing=qualityWorkRow(qwState.permit,rule.stage,rule.item);
    const isDone=!!existing;
    const isActive=idx===qwState.activeIndex&&!isDone;
    const isLocked=!isDone&&idx!==qwState.activeIndex;
    const maxPhotos=parseInt(rule.maxPhotos,10)||0;
    const maxVideoSec=parseInt(rule.maxVideoSec,10)||0;
    const badges=[];
    if(maxPhotos>0)badges.push(`📷 حتى ${maxPhotos} صور`);
    if(maxVideoSec>0)badges.push(`🎥 حتى ${maxVideoSec} ث`);
    badges.push(`إلزامي: ${escapeHtml(rule.mandatory||"—")}`);
    html+=`<div class="qw-item ${isDone?"qw-done":isActive?"qw-active":"qw-locked"}">
      <div class="qw-item-head">
        <span class="qw-item-title">${escapeHtml(rule.item)}</span>
        <span class="qw-item-badges">${badges.map(b=>`<span class="qw-badge">${b}</span>`).join("")}</span>
      </div>`;
    if(isDone){
      html+=`<div class="qw-item-done-info">✅ مكتمل — ${escapeHtml(existing.date||"")} ${escapeHtml(existing.time||"")}${existing.photoCount?` — 📷 ${escapeHtml(existing.photoCount)}`:""}${existing.fileLink?` — <a href="${escapeHtml(existing.fileLink)}" target="_blank" rel="noopener noreferrer">📁 فتح المجلد</a>`:""}</div>`;
    }else if(isLocked){
      html+=`<div class="qw-item-locked-info">🔒 يُفتح بعد استيفاء البند السابق</div>`;
    }else if(isActive){
      html+=`<div class="qw-capture" id="qw-capture-${idx}">
        ${maxPhotos>0?`<div class="qw-capture-row">
          <button type="button" class="btn btn-ghost small" id="qw-photobtn" ${qwState.photos>=maxPhotos?"disabled":""}>📷 التقاط صورة (${qwState.photos}/${maxPhotos})</button>
          <input type="file" accept="image/*" capture="environment" id="qw-photofile" style="display:none">
        </div>`:""}
        ${maxVideoSec>0?`<div class="qw-video-recorder">
          <canvas id="qw-video-preview" style="display:none;width:100%;max-width:280px;border-radius:6px;background:#000;"></canvas>
          <div class="qw-capture-row">
            <button type="button" class="btn btn-ghost small" id="qw-video-start" ${qwState.video?"disabled":""}>${qwState.video?"🎥 تم تسجيل الفيديو":"⏺ بدء تسجيل الفيديو (يتوقف تلقائياً عند "+maxVideoSec+" ث)"}</button>
            <button type="button" class="btn btn-ghost small" id="qw-video-stop" style="display:none">⏹ إيقاف الآن</button>
            <span class="qw-badge" id="qw-video-timer" style="display:none;"></span>
          </div>
        </div>`:""}
        <div class="qw-capture-status" id="qw-capture-status"></div>
        <div class="qw-capture-row">
          <button type="button" class="btn btn-primary small" id="qw-confirmbtn" ${qwComplianceMet()?"":"disabled"}>✅ تأكيد والانتقال للبند التالي</button>
        </div>
      </div>`;
    }
    html+=`</div>`;
  });
  if(qwState.activeIndex===-1&&qwState.rules.length){
    html+=`<div class="qw-alldone">🎉 تم استيفاء جميع بنود الجودة لهذا التصريح.</div>`;
  }
  checklistEl.innerHTML=html;
  wireQualityCaptureButtons();
}

function wireQualityCaptureButtons(){
  const photoBtn=document.getElementById("qw-photobtn");
  const photoFile=document.getElementById("qw-photofile");
  if(photoBtn&&photoFile){
    photoBtn.onclick=()=>photoFile.click();
    photoFile.onchange=()=>handleQualityPhotoCapture(photoFile);
  }
  const videoStartBtn=document.getElementById("qw-video-start");
  if(videoStartBtn)videoStartBtn.onclick=()=>startQualityVideoRecording();
  const videoStopBtn=document.getElementById("qw-video-stop");
  if(videoStopBtn)videoStopBtn.onclick=()=>stopQualityVideoRecording();
  const confirmBtn=document.getElementById("qw-confirmbtn");
  if(confirmBtn)confirmBtn.onclick=()=>confirmQualityItem();
}

// Splitting a data URL on the first comma breaks when the MIME type itself
// contains a comma — e.g. video/webm;codecs=vp9,opus — which is a common,
// real value for MediaRecorder.mimeType. Locating the ";base64," marker
// instead is safe regardless of what the type string contains.
function dataUrlToBase64(dataUrl){
  const marker=";base64,";
  const idx=dataUrl.indexOf(marker);
  return idx===-1?dataUrl.split(",").pop():dataUrl.slice(idx+marker.length);
}
// Utilities.base64Decode on the Apps Script side rejects anything that
// isn't clean base64. Checking this client-side first turns a vague
// "فشل الرفع: Could not decode string" (after a full round-trip) into an
// immediate, specific error, and avoids sending known-bad data at all.
function isValidBase64(s){
  return typeof s==="string"&&s.length>0&&s.length%4===0&&/^[A-Za-z0-9+/]+={0,2}$/.test(s);
}
function fileToBase64(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onerror=()=>reject(new Error("تعذّرت قراءة الملف"));
    reader.onload=()=>{
      const b64=dataUrlToBase64(reader.result);
      if(!isValidBase64(b64)){reject(new Error("تعذّر ترميز الصورة بشكل صحيح — أعيدي المحاولة"));return;}
      resolve(b64);
    };
    reader.readAsDataURL(file);
  });
}
function blobToBase64(blob){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onerror=()=>reject(new Error("تعذّر تجهيز الفيديو"));
    reader.onload=()=>{
      const b64=dataUrlToBase64(reader.result);
      if(!isValidBase64(b64)){reject(new Error("تعذّر ترميز الفيديو بشكل صحيح (البيانات: "+b64.length+" محرف) — جرّبي تسجيلاً أقصر أو أعيدي المحاولة"));return;}
      resolve(b64);
    };
    reader.readAsDataURL(blob);
  });
}

async function handleQualityPhotoCapture(fileInput){
  const file=fileInput.files&&fileInput.files[0];
  if(!file)return;
  const rule=qwState.rules[qwState.activeIndex];
  if(!rule){fileInput.value="";return;}
  const maxPhotos=parseInt(rule.maxPhotos,10)||0;
  if(qwState.photos>=maxPhotos){fileInput.value="";return;}
  const statusEl=document.getElementById("qw-capture-status");
  if(qwGeoAvailable===false){
    fileInput.value="";
    statusEl.textContent="⛔ فعّلي خدمة الموقع (GPS) أو الواي فاي أولاً";
    statusEl.className="qw-capture-status err";
    return;
  }
  statusEl.textContent="⏳ جارٍ تحديد الموقع...";
  statusEl.className="qw-capture-status";
  // Fixed once per item (not per file) so every photo/video captured for
  // this item lands in the SAME dated folder, prefixed with the time this
  // item's capture session actually started — not each individual upload.
  if(!qwState.firstCapturedAt)qwState.firstCapturedAt=new Date();
  try{
    const geo=await captureGeoStamp();
    const watermarkLines=buildWatermarkLines(geo);
    const qrCanvas=(geo.lat!=null&&geo.lng!=null)?makeQrCanvas(buildMapsUrl(geo.lat,geo.lng)):null;
    statusEl.textContent="⏳ جارٍ رفع الصورة...";
    const base64=await resizeImageFile(file,1600,0.8,watermarkLines,qrCanvas);
    const url=await resolveGsheetsUrl();
    if(!url)throw new Error("لم يتم إعداد رابط Google Sheets");
    const res=await fetch(url,{
      method:"POST",
      body:JSON.stringify({
        action:"uploadQualityMedia",
        idToken:currentUser&&currentUser.idToken,
        permit:qwState.permit,
        stage:rule.stage,
        item:rule.item,
        itemTime:formatFolderTime(qwState.firstCapturedAt),
        kind:"photo",
        index:qwState.photos+1,
        mimeType:"image/jpeg",
        base64:base64
      })
    });
    const data=await res.json();
    if(data.status==="ok"){
      qwState.photos+=1;
      if(data.folderUrl)qwState.folderLink=data.folderUrl;
      statusEl.textContent="✅ تم رفع الصورة"+(qwLastGeocodeError?" — ⚠ العنوان: "+qwLastGeocodeError:"");
      statusEl.className="qw-capture-status ok";
    }else{
      statusEl.textContent="⛔ "+(data.message||"فشل رفع الصورة");
      statusEl.className="qw-capture-status err";
    }
  }catch(err){
    statusEl.textContent="⛔ خطأ: "+err.message;
    statusEl.className="qw-capture-status err";
  }finally{
    fileInput.value="";
    renderQualityChecklistKeepStatus();
  }
}

// Records via a hidden <video> (raw camera feed) drawn frame-by-frame onto
// the visible <canvas>, with the timestamp/location/address watermark
// burned into every frame (timestamp keeps ticking live; location/address
// are fixed from the moment recording starts). MediaRecorder then records
// the CANVAS's own stream (+ the original audio track), not the raw
// camera stream — that's what gets the watermark into the saved video.
// Stops automatically once the rule's max video length (الفيديو) is
// reached — the person can also stop earlier with "إيقاف الآن".
async function startQualityVideoRecording(){
  const rule=qwState.rules[qwState.activeIndex];
  if(!rule)return;
  const statusEl=document.getElementById("qw-capture-status");
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia||!window.MediaRecorder){
    statusEl.textContent="⛔ متصفحك لا يدعم تسجيل الفيديو مباشرة — جرّبي متصفحاً حديثاً";
    statusEl.className="qw-capture-status err";
    return;
  }
  if(qwGeoAvailable===false){
    statusEl.textContent="⛔ فعّلي خدمة الموقع (GPS) أو الواي فاي أولاً";
    statusEl.className="qw-capture-status err";
    return;
  }
  const maxVideoSec=parseInt(rule.maxVideoSec,10)||0;
  statusEl.textContent="⏳ جارٍ تحديد الموقع...";
  statusEl.className="qw-capture-status";
  // Fixed once per item (not per file) — see handleQualityPhotoCapture.
  if(!qwState.firstCapturedAt)qwState.firstCapturedAt=new Date();
  const geo=await captureGeoStamp(); // lat/lng/address fixed at recording start; timestamp refreshes live per frame
  const qrCanvas=(geo.lat!=null&&geo.lng!=null)?makeQrCanvas(buildMapsUrl(geo.lat,geo.lng)):null;
  try{
    qwRecordStream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:"environment",width:{ideal:1280,max:1280},height:{ideal:720,max:720}},
      audio:true
    });
  }catch(err){
    statusEl.textContent="⛔ تعذّر الوصول إلى الكاميرا: "+err.message;
    statusEl.className="qw-capture-status err";
    return;
  }
  const canvas=document.getElementById("qw-video-preview");
  if(!canvas||!canvas.captureStream){
    qwRecordStream.getTracks().forEach(t=>t.stop());
    qwRecordStream=null;
    statusEl.textContent="⛔ متصفحك لا يدعم تسجيل الفيديو بهذه الطريقة — جرّبي متصفحاً حديثاً";
    statusEl.className="qw-capture-status err";
    return;
  }
  qwSourceVideoEl=document.createElement("video");
  qwSourceVideoEl.muted=true;
  qwSourceVideoEl.playsInline=true;
  qwSourceVideoEl.srcObject=qwRecordStream;
  try{
    await qwSourceVideoEl.play();
  }catch(e){ /* some browsers auto-play muted video fine without this even resolving */ }
  await new Promise(resolve=>{
    if(qwSourceVideoEl.videoWidth){resolve();return;}
    qwSourceVideoEl.onloadedmetadata=()=>resolve();
  });
  canvas.width=qwSourceVideoEl.videoWidth||1280;
  canvas.height=qwSourceVideoEl.videoHeight||720;
  canvas.style.display="";
  const ctx=canvas.getContext("2d");
  qwRecordDrawing=true;
  (function drawFrame(){
    if(!qwRecordDrawing)return;
    ctx.drawImage(qwSourceVideoEl,0,0,canvas.width,canvas.height);
    drawWatermark(ctx,canvas.width,canvas.height,buildWatermarkLines({...geo,timestampText:formatStampTime(new Date())}));
    drawQrOverlay(ctx,canvas.width,canvas.height,qrCanvas);
    qwRecordAnimFrame=requestAnimationFrame(drawFrame);
  })();
  const canvasStream=canvas.captureStream(30);
  const combinedStream=new MediaStream([...canvasStream.getVideoTracks(),...qwRecordStream.getAudioTracks()]);
  qwRecordedChunks=[];
  let options={videoBitsPerSecond:1800000}; // ~1.8Mbps cap — keeps a 30s clip well under a few MB
  if(window.MediaRecorder.isTypeSupported&&MediaRecorder.isTypeSupported("video/mp4")){
    options.mimeType="video/mp4";
  }else if(window.MediaRecorder.isTypeSupported&&MediaRecorder.isTypeSupported("video/webm")){
    options.mimeType="video/webm";
  }
  try{
    qwRecorder=new MediaRecorder(combinedStream,options);
  }catch(e){
    qwRecorder=new MediaRecorder(combinedStream);
  }
  qwRecorder.ondataavailable=(e)=>{if(e.data&&e.data.size>0)qwRecordedChunks.push(e.data);};
  qwRecorder.onstop=()=>finishQualityVideoRecording();
  qwRecorder.start();
  qwRecordStartTs=Date.now();
  const startBtn=document.getElementById("qw-video-start");
  const stopBtn=document.getElementById("qw-video-stop");
  const timerEl=document.getElementById("qw-video-timer");
  if(startBtn)startBtn.style.display="none";
  if(stopBtn)stopBtn.style.display="";
  if(timerEl)timerEl.style.display="";
  qwRecordTickInterval=setInterval(()=>{
    const elapsed=Math.floor((Date.now()-qwRecordStartTs)/1000);
    if(timerEl)timerEl.textContent=`⏱ ${elapsed}${maxVideoSec>0?" / "+maxVideoSec:""} ث`;
  },250);
  if(maxVideoSec>0){
    qwRecordStopTimer=setTimeout(()=>stopQualityVideoRecording(),maxVideoSec*1000);
  }
  statusEl.textContent="🔴 جارٍ التسجيل...";
  statusEl.className="qw-capture-status";
}

// Stops the active recording (auto-triggered at the max length, or by the
// person clicking "إيقاف الآن"). Safe to call even if nothing is recording.
function stopQualityVideoRecording(){
  if(qwRecordStopTimer){clearTimeout(qwRecordStopTimer);qwRecordStopTimer=null;}
  if(qwRecordTickInterval){clearInterval(qwRecordTickInterval);qwRecordTickInterval=null;}
  const timerEl=document.getElementById("qw-video-timer");
  if(timerEl)timerEl.style.display="none";
  qwRecordDrawing=false;
  if(qwRecordAnimFrame){cancelAnimationFrame(qwRecordAnimFrame);qwRecordAnimFrame=null;}
  if(qwRecorder&&qwRecorder.state!=="inactive"){
    qwRecorder.stop();
  }
  if(qwSourceVideoEl){
    qwSourceVideoEl.pause();
    qwSourceVideoEl.srcObject=null;
    qwSourceVideoEl=null;
  }
  if(qwRecordStream){
    qwRecordStream.getTracks().forEach(t=>t.stop());
    qwRecordStream=null;
  }
  const canvas=document.getElementById("qw-video-preview");
  if(canvas)canvas.style.display="none";
}

async function finishQualityVideoRecording(){
  const rule=qwState.rules[qwState.activeIndex];
  const statusEl=document.getElementById("qw-capture-status");
  const startBtn=document.getElementById("qw-video-start");
  const stopBtn=document.getElementById("qw-video-stop");
  if(stopBtn)stopBtn.style.display="none";
  if(!rule||!qwRecordedChunks.length){
    if(startBtn)startBtn.style.display="";
    return;
  }
  const mimeType=(qwRecorder&&qwRecorder.mimeType)||"video/webm";
  const uploadMimeType=mimeType.split(";")[0].trim()||"video/webm"; // strip codec params e.g. ";codecs=vp9,opus" — that comma also breaks naive data-URL parsing, so keep it out of the Blob's type entirely
  const blob=new Blob(qwRecordedChunks,{type:uploadMimeType});
  qwRecordedChunks=[];
  if(statusEl){statusEl.textContent="⏳ جارٍ رفع الفيديو...";statusEl.className="qw-capture-status";}
  try{
    const base64=await blobToBase64(blob);
    const url=await resolveGsheetsUrl();
    if(!url)throw new Error("لم يتم إعداد رابط Google Sheets");
    const res=await fetch(url,{
      method:"POST",
      body:JSON.stringify({
        action:"uploadQualityMedia",
        idToken:currentUser&&currentUser.idToken,
        permit:qwState.permit,
        stage:rule.stage,
        item:rule.item,
        itemTime:formatFolderTime(qwState.firstCapturedAt),
        kind:"video",
        mimeType:uploadMimeType,
        base64:base64
      })
    });
    const data=await res.json();
    if(data.status==="ok"){
      qwState.video=true;
      if(data.folderUrl)qwState.folderLink=data.folderUrl;
      if(statusEl){statusEl.textContent="✅ تم رفع الفيديو"+(qwLastGeocodeError?" — ⚠ العنوان: "+qwLastGeocodeError:"");statusEl.className="qw-capture-status ok";}
    }else{
      if(startBtn)startBtn.style.display="";
      if(statusEl){statusEl.textContent="⛔ "+(data.message||"فشل رفع الفيديو");statusEl.className="qw-capture-status err";}
    }
  }catch(err){
    if(startBtn)startBtn.style.display="";
    if(statusEl){statusEl.textContent="⛔ خطأ: "+err.message;statusEl.className="qw-capture-status err";}
  }finally{
    renderQualityChecklistKeepStatus();
  }
}

// Confirms the active checklist item: saves it as a row in جودة العمل
// (recording the date/time of the FIRST photo or video captured for this
// item, not the confirm-click time), then unlocks the next item.
function confirmQualityItem(){
  if(!qwComplianceMet())return;
  const rule=qwState.rules[qwState.activeIndex];
  if(!rule)return;
  const stamp=qwState.firstCapturedAt||new Date();
  const entry={
    permit:qwState.permit,
    stage:rule.stage,
    item:rule.item,
    photoCount:String(qwState.photos),
    fileLink:qwState.folderLink||"",
    date:stamp.toLocaleDateString("en-CA"),
    time:stamp.toTimeString().slice(0,8)
  };
  store.qualityWork.push(entry);
  logAudit("إضافة","جودة العمل",entry);
  const completedIndex=qwState.activeIndex;
  qwState.photos=0;
  qwState.video=false;
  qwState.folderLink="";
  qwState.firstCapturedAt=null;
  qwState.activeIndex=qwState.rules.findIndex((r,i)=>i>completedIndex&&!qualityWorkRow(qwState.permit,r.stage,r.item));
  refreshDynamicOptions();
  renderTable("qualityWork");
  updateCounts();
  saveStore();
  renderQualityChecklist();
}

const expandedState={};
function renderTable(sheetId){
  const s=SHEETS.find(x=>x.id===sheetId);
  const target=document.getElementById(`table-${sheetId}`);
  if(!target)return;
  const rows=store[sheetId];
  const editable=canCreateEdit(sheetId)&&!s.custom;
  const deletable=canDelete(sheetId);
  if(!rows.length){
    target.innerHTML=`<div class="empty">لا توجد صفوف مضافة بعد.</div>`;
    return;
  }
  const limit=7;
  const showAll=!!expandedState[sheetId];
  const startIdx=showAll?0:Math.max(0,rows.length-limit);
  const visible=rows.slice(startIdx).map((r,i)=>({r,idx:startIdx+i}));
  const cols=s.fields.map(f=>f.label);
  const actCols=(editable?1:0)+(deletable?1:0);
  let html=`<table class="entries"><thead><tr>${"<th></th>".repeat(actCols)}${cols.map(c=>`<th>${c}</th>`).join("")}${s.computedLabel?`<th>${s.computedLabel}</th>`:""}</tr></thead><tbody>`;
  visible.forEach(({r,idx})=>{
    html+="<tr>";
    if(editable)html+=`<td class="act edit" data-sheet="${sheetId}" data-idx="${idx}" title="تعديل">✎</td>`;
    if(deletable)html+=`<td class="act del" data-sheet="${sheetId}" data-idx="${idx}" title="حذف">✕</td>`;
    s.fields.forEach(f=>{html+=`<td>${cellHTML(f,r[f.key])}</td>`;});
    if(s.computed){
      let v=s.computed(r);
      if(typeof v==="number")v=Math.round(v*100)/100;
      html+=`<td>${v}</td>`;
    }
    html+="</tr>";
  });
  html+="</tbody></table>";
  if(rows.length>limit){
    html+=showAll
      ?`<div class="tabletoggle"><button class="toggle-link" data-sheet="${sheetId}" data-mode="less">إخفاء وعرض آخر 7 سجلات فقط</button></div>`
      :`<div class="tabletoggle">يعرض آخر 7 من أصل ${rows.length} سجل — <button class="toggle-link" data-sheet="${sheetId}" data-mode="more">عرض كل السجلات</button></div>`;
  }
  target.innerHTML=html;
  target.querySelectorAll(".del").forEach(d=>{
    d.onclick=()=>deleteEntry(d.dataset.sheet,parseInt(d.dataset.idx));
  });
  target.querySelectorAll(".edit").forEach(d=>{
    d.onclick=()=>editEntry(d.dataset.sheet,parseInt(d.dataset.idx));
  });
  target.querySelectorAll(".toggle-link").forEach(b=>{
    b.onclick=()=>{
      expandedState[b.dataset.sheet]=b.dataset.mode==="more";
      renderTable(b.dataset.sheet);
    };
  });
}

function normDate(v){
  const s=String(v||"").trim();
  if(!s)return "";
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
  if(/^\d{4}-\d{2}-\d{2}T/.test(s)){
    const d=new Date(s);
    if(!isNaN(d))return d.toLocaleDateString("en-CA");
    return s.slice(0,10);
  }
  const d=new Date(s);
  return isNaN(d)?s:d.toLocaleDateString("en-CA");
}
function clientStartDates(permit){
  if(!permit)return [];
  return store.excavation
    .filter(e=>String(e.permit||"").trim()===String(permit).trim())
    .map(e=>normDate(e.startDate))
    .filter(Boolean);
}

function buildExportPayload(){
  const sheets=[];
  SHEETS.forEach(s=>{
    const allRows=store[s.id];
    const header=s.fields.map(f=>f.label);
    const aoa=[["#"].concat(header).concat(s.computedLabel?[s.computedLabel]:[])];
    allRows.forEach((r,i)=>{
      const row=[i+1];
      s.fields.forEach(f=>row.push(r[f.key]||""));
      if(s.computed){
        let v=s.computed(r);
        if(typeof v==="number")v=Math.round(v*100)/100;
        row.push(v);
      }
      aoa.push(row);
    });
    let name=s.title.split(" — ")[0].split(" (")[0];
    if(name.length>31)name=name.slice(0,31);
    sheets.push({name,headers:aoa[0],rows:aoa.slice(1)});
  });
  return sheets;
}

function exportAll(){

}

async function resolveGsheetsUrl(){
  const v=await storageGet("gsheets_webapp_url");
  return v||DEFAULT_GSHEETS_URL||"";
}

async function pullFromGoogleSheets(url){
  try{
    const sep=url.indexOf("?")===-1?"?":"&";
    const tokenParam=currentUser&&currentUser.idToken?sep+"token="+encodeURIComponent(currentUser.idToken):"";
    const res=await fetch(url+tokenParam,{method:"GET"});
    const data=await res.json();
    if(!res.ok||!data){
      return{ok:false,reason:"network",message:(data&&data.message)?data.message:("HTTP "+res.status)};
    }
    if(data.status==="error"){
      return{ok:false,reason:"server",message:data.message||"خطأ غير معروف من الخادم"};
    }
    if(!data.data){
      // Reached the script successfully but got no dataset back — e.g. this
      // account isn't registered in 11 — معلومات الموظفين. This is NOT a
      // success: the sheet is the only source of truth, so we must not
      // silently keep whatever was in local/cached store.
      return{ok:false,reason:"no-data",message:"لم يُرجع الخادم أي بيانات — تحققي من تسجيل بريدك في 11 — معلومات الموظفين، ومن صحة رابط Apps Script."};
    }
    const sheetsData=data.data;
    SHEETS.forEach(s=>{
      let name=s.title.split(" — ")[0].split(" (")[0];
      if(name.length>31)name=name.slice(0,31);
      const rows=sheetsData[name];
      if(!rows||rows.length<1){store[s.id]=[];return;}
      const entries=rows.slice(1).map(row=>{
        const entry={};
        s.fields.forEach((f,i)=>{
          const v=row[i+1];
          entry[f.key]=(v!==undefined&&v!==null)?String(v):"";
        });
        return entry;
      }).filter(e=>Object.values(e).some(v=>v));
      store[s.id]=entries;
    });
    await saveStore(true);
    return{ok:true,hasData:true,role:data.role||null};
  }catch(err){
    console.error("Pull from Google Sheets failed:",err);
    return{ok:false,reason:"exception",message:String(err)};
  }
}

async function performSync(url){
  try{
    const auditBatch=auditQueue.slice();
    const payload={
      sheets:buildExportPayload(),
      idToken:currentUser?currentUser.idToken:null,
      audit:auditBatch
    };
    const res=await fetch(url,{
      method:"POST",
      headers:{"Content-Type":"text/plain;charset=utf-8"},
      body:JSON.stringify(payload)
    });
    let ok=res.ok;
    try{
      const data=await res.json();
      ok=data.status==="ok";
      if(!ok)throw new Error(data.message||"فشل غير معروف");
    }catch(parseErr){
      if(!res.ok)throw parseErr;
    }
    if(auditBatch.length){
      auditQueue=auditQueue.slice(auditBatch.length);
      storageSet("audit_queue",JSON.stringify(auditQueue));
    }
    return{ok:true};
  }catch(err){
    console.error("Google Sheets sync failed:",err);
    const detail=(err&&err.message)?err.message:String(err);
    return{ok:false,detail};
  }
}

  if(!url){if(ind){ind.textContent="";ind.className="gsync-indicator";}return;}
  if(autoSyncTimer)clearTimeout(autoSyncTimer);
  if(ind){ind.textContent="⏳ مزامنة تلقائية خلال ثوانٍ...";ind.className="gsync-indicator pending";}
  autoSyncTimer=setTimeout(runAutoSync,4000);
}
async function runAutoSync(){
  const url=document.getElementById("gsheetsUrl").value.trim();
  const ind=document.getElementById("gsyncIndicator");
  if(!url)return;
  if(ind){ind.textContent="🔄 جارٍ المزامنة التلقائية...";ind.className="gsync-indicator pending";}
  const r=await performSync(url);
  if(ind){
    ind.textContent=r.ok?"✓ مزامنة تلقائية ناجحة":"⚠ فشلت المزامنة التلقائية";
    ind.className="gsync-indicator "+(r.ok?"ok":"err");
    if(!r.ok&&r.detail)ind.title=r.detail;
    setTimeout(()=>{ind.textContent="";ind.className="gsync-indicator";},6000);
  }
}

async function saveGsheetsUrl(){
  const url=document.getElementById("gsheetsUrl").value.trim();
  await storageSet("gsheets_webapp_url",url);
}

async function loadGsheetsUrl(){
  const v=await storageGet("gsheets_webapp_url");
  document.getElementById("gsheetsUrl").value=v||DEFAULT_GSHEETS_URL||"";
}
function activeGsheetsUrl(){
  const v=document.getElementById("gsheetsUrl").value.trim();
  return v||DEFAULT_GSHEETS_URL||"";
}

document.getElementById("exportAllBtn").onclick=()=>{exportAll();closeAllMenus();};

document.getElementById("sheetMenuBtn").onclick=(e)=>{

document.getElementById("gsheetsSaveBtn").onclick=async(e)=>{

document.getElementById("autoSyncToggle").onchange=async(e)=>{

async function loadAutoSyncPref(){
  const v=await storageGet("autosync_enabled");

document.querySelectorAll(".dropdown").forEach(d=>d.addEventListener("click",e=>e.stopPropagation()));
document.addEventListener("click",()=>closeAllMenus());
document.addEventListener("keydown",(e)=>{if(e.key==="Escape")closeAllMenus();});

function decodeJWT(token){
  try{
    const base64Url=token.split(".")[1];
    const base64=base64Url.replace(/-/g,"+").replace(/_/g,"/");
    const json=decodeURIComponent(atob(base64).split("").map(c=>"%"+("00"+c.charCodeAt(0).toString(16)).slice(-2)).join(""));
    return JSON.parse(json);
  }catch(e){return null;}
}

function applyRoleUI(){
  const badge=document.getElementById("roleBadge");
  badge.textContent=currentUser.role;
  badge.className="role-badge "+currentUser.role;
  if(currentUser.role==="Viewer"){
    document.getElementById("settingsMenuWrap").style.display="none";
  }else if(currentUser.role==="Supervisor"){
    document.querySelector(".gsheets-label").style.display="none";
    document.getElementById("gsheetsUrl").style.display="none";
    document.getElementById("gsheetsSaveBtn").style.display="none";
  }
}

async function handleCredentialResponse(response){
  const payload=decodeJWT(response.credential);
  const statusEl=document.getElementById("loginStatus");
  if(!payload||!payload.email){
    statusEl.textContent="⚠ تعذّر قراءة بيانات الحساب";
    statusEl.className="login-status err";
    return;
  }
  statusEl.textContent="جارٍ التحقق...";
  statusEl.className="login-status";
  currentUser={email:payload.email,name:payload.name||payload.email,picture:payload.picture||"",idToken:response.credential,role:"Viewer"};

  const url=await resolveGsheetsUrl();
  if(!url){
    statusEl.textContent="⚠ لم يتم إعداد رابط Google Sheets — راجعي الإعدادات.";
    statusEl.className="login-status err";
    currentUser=null;
    return;
  }

  statusEl.textContent="جارٍ جلب البيانات من الشيت...";
  const pullResult=await pullFromGoogleSheets(url);
  if(!pullResult.ok||!pullResult.hasData){
    // The Google Sheet is the ONLY source of truth — if we can't get real
    // data from it, we do not fall back to any local/cached/seed copy and
    // do not let the person into the app with stale data.
    statusEl.textContent="⛔ تعذّر جلب بيانات حقيقية من الشيت: "+(pullResult.message||"خطأ غير معروف")+" — لن يتم فتح التطبيق ببيانات قديمة أو غير موثوقة.";
    statusEl.className="login-status err";
    currentUser=null;
    return;
  }

  await loadAuditQueue();
  currentUser.role=pullResult.role;
  if(!["Admin","Supervisor","Viewer"].includes(currentUser.role)){
    statusEl.textContent="⛔ هذا البريد ("+currentUser.email+") غير مسجّل في 11 — معلومات الموظفين. تواصلي مع المسؤول لإضافتك.";
    statusEl.className="login-status err";
    if(window.google&&google.accounts&&google.accounts.id)google.accounts.id.disableAutoSelect();
    currentUser=null;
    return;
  }
  document.getElementById("loginGate").style.display="none";
  document.getElementById("appRoot").style.display="";
  document.getElementById("userPic").src=currentUser.picture;
  document.getElementById("userName").textContent=currentUser.name;
  document.getElementById("userEmail").textContent=currentUser.email;
  applyRoleUI();
  renderAll();
  loadGsheetsUrl();
  loadAutoSyncPref();
}

function signOut(){
  currentUser=null;
  document.getElementById("appRoot").style.display="none";
  document.getElementById("loginGate").style.display="flex";
  document.getElementById("loginStatus").textContent="";
  document.getElementById("loginStatus").className="login-status";
  if(window.google&&google.accounts&&google.accounts.id){
    google.accounts.id.disableAutoSelect();
  }
}
document.getElementById("signOutBtn").onclick=signOut;

function initGoogleSignIn(){
  const statusEl=document.getElementById("loginStatus");
  if(GOOGLE_CLIENT_ID.indexOf("PASTE_YOUR_CLIENT_ID_HERE")===0){
    statusEl.textContent="⚠ لم يتم إعداد Google Client ID بعد — راجعي خطوات الإعداد";
    statusEl.className="login-status err";
    return;
  }
  if(!window.google||!google.accounts||!google.accounts.id){
    statusEl.textContent="⚠ تعذّر تحميل خدمة تسجيل الدخول من Google — تأكدي من الاتصال بالإنترنت";
    statusEl.className="login-status err";
    return;
  }
  google.accounts.id.initialize({client_id:GOOGLE_CLIENT_ID,callback:handleCredentialResponse});
  google.accounts.id.renderButton(document.getElementById("googleSignInBtn"),{theme:"outline",size:"large",text:"signin_with",shape:"pill",locale:"ar"});
  google.accounts.id.prompt();
}

window.addEventListener("load",()=>{setTimeout(initGoogleSignIn,400);});
</script>
<script>
/* ============================================================
   Auto Fit-To-Screen  (تكبير تلقائي ليملأ عرض الشاشة بالكامل)
   - Scales the whole app (login screen included) so the 1180px
     design fills the browser window width — no manual zoom needed.
   - Keeps everything perfectly centered.
   - Blocks any horizontal page scrolling / sideways drift.
   ============================================================ */
(function(){
  var DESIGN_W = 1224;            /* 1180px content + 22px padding each side */
  var MAX_SCALE = 3;              /* safety cap for ultra-wide monitors */

  function fit(){
    var vw = window.innerWidth;
    var z  = vw > DESIGN_W ? Math.min(vw / DESIGN_W, MAX_SCALE) : 1;
    document.body.style.zoom = z;
    /* keep vertical sizing correct while scaled */
    document.body.style.minHeight = (window.innerHeight / z) + 'px';
    /* snap back if anything nudged the page sideways */
    if (window.scrollX !== 0) window.scrollTo(0, window.scrollY);
  }

  fit();
  window.addEventListener('resize', fit);
  window.addEventListener('orientationchange', fit);

  /* block accidental horizontal panning (shift+wheel, trackpad swipe, etc.) */
  window.addEventListener('scroll', function(){
    if (window.scrollX !== 0) window.scrollTo(0, window.scrollY);
  }, {passive:true});
})();
</script>
