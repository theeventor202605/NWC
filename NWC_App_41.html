// Splitting a data URL on the first comma breaks when the MIME type itself
// contains a comma — e.g. video/webm;codecs=vp9,opus — which is a common,
// real value for MediaRecorder.mimeType. Locating the ";base64," marker
// instead is safe regardless of what the type string contains.
function dataUrlToBase64(dataUrl){
  const marker=";base64,";
  const idx=dataUrl.indexOf(marker);
  return idx===-1?dataUrl.split(",").pop():dataUrl.slice(idx+marker.length);
}
// Utilities.base64Decode on the Apps Script side rejects anything that
// isn't clean base64. Checking this client-side first turns a vague
// "فشل الرفع: Could not decode string" (after a full round-trip) into an
// immediate, specific error, and avoids sending known-bad data at all.
function isValidBase64(s){
  return typeof s==="string"&&s.length>0&&s.length%4===0&&/^[A-Za-z0-9+/]+={0,2}$/.test(s);
}
function fileToBase64(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onerror=()=>reject(new Error("تعذّرت قراءة الملف"));
    reader.onload=()=>{
      const b64=dataUrlToBase64(reader.result);
      if(!isValidBase64(b64)){reject(new Error("تعذّر ترميز الصورة بشكل صحيح — أعيدي المحاولة"));return;}
      resolve(b64);
    };
    reader.readAsDataURL(file);
  });
}
function blobToBase64(blob){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onerror=()=>reject(new Error("تعذّر تجهيز الفيديو"));
    reader.onload=()=>{
      const b64=dataUrlToBase64(reader.result);
      if(!isValidBase64(b64)){reject(new Error("تعذّر ترميز الفيديو بشكل صحيح (البيانات: "+b64.length+" محرف) — جرّبي تسجيلاً أقصر أو أعيدي المحاولة"));return;}
      resolve(b64);
    };
    reader.readAsDataURL(blob);
  });
}

async function handleQualityPhotoCapture(fileInput){
  const file=fileInput.files&&fileInput.files[0];
  if(!file)return;
  const rule=qwState.rules[qwState.activeIndex];
  if(!rule){fileInput.value="";return;}
  const maxPhotos=parseInt(rule.maxPhotos,10)||0;
  if(qwState.photos>=maxPhotos){fileInput.value="";return;}
  const statusEl=document.getElementById("qw-capture-status");
  if(qwGeoAvailable===false){
    fileInput.value="";
    statusEl.textContent="⛔ فعّلي خدمة الموقع (GPS) أو الواي فاي أولاً";
    statusEl.className="qw-capture-status err";
    return;
  }
  statusEl.textContent="⏳ جارٍ تحديد الموقع...";
  statusEl.className="qw-capture-status";
  // Fixed once per item (not per file) so every photo/video captured for
  // this item lands in the SAME dated folder, prefixed with the time this
  // item's capture session actually started — not each individual upload.
  if(!qwState.firstCapturedAt)qwState.firstCapturedAt=new Date();
  try{
    const geo=await captureGeoStamp();
    const watermarkLines=buildWatermarkLines(geo);
    const qrCanvas=(geo.lat!=null&&geo.lng!=null)?makeQrCanvas(buildMapsUrl(geo.lat,geo.lng)):null;
    statusEl.textContent="⏳ جارٍ تجهيز الصورة...";
    const photoPreset=QW_PHOTO_QUALITY_PRESETS[qwPhotoQualityKey]||QW_PHOTO_QUALITY_PRESETS.high;
    const blob=await resizeImageFileToBlob(file,photoPreset.maxDim,photoPreset.quality,watermarkLines,qrCanvas);
    await qwQueueAdd({
      permit:qwState.permit,
      stage:rule.stage,
      item:rule.item,
      itemTime:formatFolderTime(qwState.firstCapturedAt),
      fileTime:formatFolderTime(new Date()), // this specific photo's own moment — used for the filename itself
      kind:"photo",
      index:qwState.photos+1,
      mimeType:"image/jpeg",
      blob:blob,
      attempts:0,
      createdAt:Date.now()
    });
    qwState.photos+=1;
    const warnings=[];
    if(qwLastGeocodeError)warnings.push("العنوان: "+qwLastGeocodeError);
    statusEl.textContent="✅ تم الحفظ محلياً — جارٍ الرفع في الخلفية"+(warnings.length?" — ⚠ "+warnings.join(" | "):"");
    statusEl.className="qw-capture-status ok";
    processQwUploadQueue(); // fire-and-forget — don't block the UI on this
    refreshQwQueueBadge();
  }catch(err){
    statusEl.textContent="⛔ خطأ: "+err.message;
    statusEl.className="qw-capture-status err";
  }finally{
    fileInput.value="";
    renderQualityChecklistKeepStatus();
  }
}

// Records via a hidden <video> (raw camera feed) drawn frame-by-frame onto
// the visible <canvas>, with the timestamp/location/address watermark
// burned into every frame (timestamp keeps ticking live; location/address
// are fixed from the moment recording starts). MediaRecorder then records
// the CANVAS's own stream (video-only, no audio) — that's what gets the
// watermark into the saved video.
// Stops automatically once the rule's max video length (الفيديو) is
// reached — the person can also stop earlier with "إيقاف الآن".
async function startQualityVideoRecording(){
  const rule=qwState.rules[qwState.activeIndex];
  if(!rule)return;
  const statusEl=document.getElementById("qw-capture-status");
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia||!window.MediaRecorder){
    statusEl.textContent="⛔ متصفحك لا يدعم تسجيل الفيديو مباشرة — جرّبي متصفحاً حديثاً";
    statusEl.className="qw-capture-status err";
    return;
  }
  if(qwGeoAvailable===false){
    statusEl.textContent="⛔ فعّلي خدمة الموقع (GPS) أو الواي فاي أولاً";
    statusEl.className="qw-capture-status err";
    return;
  }
  const maxVideoSec=parseInt(rule.maxVideoSec,10)||0;
  statusEl.textContent="⏳ جارٍ تحديد الموقع...";
  statusEl.className="qw-capture-status";
  // Fixed once per item (not per file) — see handleQualityPhotoCapture.
  if(!qwState.firstCapturedAt)qwState.firstCapturedAt=new Date();
  const geo=await captureGeoStamp(); // lat/lng/address fixed at recording start; timestamp refreshes live per frame
  const qrCanvas=(geo.lat!=null&&geo.lng!=null)?makeQrCanvas(buildMapsUrl(geo.lat,geo.lng)):null;
  const videoPreset=QW_VIDEO_QUALITY_PRESETS[qwVideoQualityKey]||QW_VIDEO_QUALITY_PRESETS.high;
  try{
    qwRecordStream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:"environment",width:{ideal:videoPreset.width,max:videoPreset.width},height:{ideal:videoPreset.height,max:videoPreset.height}}
      // no audio — these are quality-inspection clips, not needed, and
      // dropping the mic track both skips the microphone permission
      // prompt and shrinks the upload.
    });
  }catch(err){
    statusEl.textContent="⛔ تعذّر الوصول إلى الكاميرا: "+err.message;
    statusEl.className="qw-capture-status err";
    return;
  }
  const canvas=document.getElementById("qw-video-preview");
  if(!canvas||!canvas.captureStream){
    qwRecordStream.getTracks().forEach(t=>t.stop());
    qwRecordStream=null;
    statusEl.textContent="⛔ متصفحك لا يدعم تسجيل الفيديو بهذه الطريقة — جرّبي متصفحاً حديثاً";
    statusEl.className="qw-capture-status err";
    return;
  }
  qwSourceVideoEl=document.createElement("video");
  qwSourceVideoEl.muted=true;
  qwSourceVideoEl.playsInline=true;
  qwSourceVideoEl.srcObject=qwRecordStream;
  try{
    await qwSourceVideoEl.play();
  }catch(e){ /* some browsers auto-play muted video fine without this even resolving */ }
  await new Promise(resolve=>{
    if(qwSourceVideoEl.videoWidth){resolve();return;}
    qwSourceVideoEl.onloadedmetadata=()=>resolve();
  });
  canvas.width=qwSourceVideoEl.videoWidth||videoPreset.width;
  canvas.height=qwSourceVideoEl.videoHeight||videoPreset.height;
  canvas.style.display="";
  const ctx=canvas.getContext("2d");
  qwRecordDrawing=true;
  (function drawFrame(){
    if(!qwRecordDrawing)return;
    ctx.drawImage(qwSourceVideoEl,0,0,canvas.width,canvas.height);
    drawWatermark(ctx,canvas.width,canvas.height,buildWatermarkLines({...geo,timestampText:formatStampTime(new Date())}));
    drawQrOverlay(ctx,canvas.width,canvas.height,qrCanvas);
    qwRecordAnimFrame=requestAnimationFrame(drawFrame);
  })();
  const canvasStream=canvas.captureStream(30); // video-only — no audio track to merge in
  qwRecordedChunks=[];
  let options={videoBitsPerSecond:videoPreset.bitrate};
  if(window.MediaRecorder.isTypeSupported&&MediaRecorder.isTypeSupported("video/mp4")){
    options.mimeType="video/mp4";
  }else if(window.MediaRecorder.isTypeSupported&&MediaRecorder.isTypeSupported("video/webm")){
    options.mimeType="video/webm";
  }
  try{
    qwRecorder=new MediaRecorder(canvasStream,options);
  }catch(e){
    qwRecorder=new MediaRecorder(canvasStream);
  }
  qwRecorder.ondataavailable=(e)=>{if(e.data&&e.data.size>0)qwRecordedChunks.push(e.data);};
  qwRecorder.onstop=()=>finishQualityVideoRecording();
  qwRecorder.start();
  qwRecordStartTs=Date.now();
  const startBtn=document.getElementById("qw-video-start");
  const stopBtn=document.getElementById("qw-video-stop");
  const timerEl=document.getElementById("qw-video-timer");
  if(startBtn)startBtn.style.display="none";
  if(stopBtn)stopBtn.style.display="";
  if(timerEl)timerEl.style.display="";
  qwRecordTickInterval=setInterval(()=>{
    const elapsed=Math.floor((Date.now()-qwRecordStartTs)/1000);
    if(timerEl)timerEl.textContent=`⏱ ${elapsed}${maxVideoSec>0?" / "+maxVideoSec:""} ث`;
  },250);
  if(maxVideoSec>0){
    qwRecordStopTimer=setTimeout(()=>stopQualityVideoRecording(),maxVideoSec*1000);
  }
  statusEl.textContent="🔴 جارٍ التسجيل...";
  statusEl.className="qw-capture-status";
}

// Stops the active recording (auto-triggered at the max length, or by the
// person clicking "إيقاف الآن"). Safe to call even if nothing is recording.
function stopQualityVideoRecording(){
  if(qwRecordStopTimer){clearTimeout(qwRecordStopTimer);qwRecordStopTimer=null;}
  if(qwRecordTickInterval){clearInterval(qwRecordTickInterval);qwRecordTickInterval=null;}
  const timerEl=document.getElementById("qw-video-timer");
  if(timerEl)timerEl.style.display="none";
  qwRecordDrawing=false;
  if(qwRecordAnimFrame){cancelAnimationFrame(qwRecordAnimFrame);qwRecordAnimFrame=null;}
  if(qwRecorder&&qwRecorder.state!=="inactive"){
    qwRecorder.stop();
  }
  if(qwSourceVideoEl){
    qwSourceVideoEl.pause();
    qwSourceVideoEl.srcObject=null;
    qwSourceVideoEl=null;
  }
  if(qwRecordStream){
    qwRecordStream.getTracks().forEach(t=>t.stop());
    qwRecordStream=null;
  }
  const canvas=document.getElementById("qw-video-preview");
  if(canvas)canvas.style.display="none";
}

async function finishQualityVideoRecording(){
  const rule=qwState.rules[qwState.activeIndex];
  const statusEl=document.getElementById("qw-capture-status");
  const startBtn=document.getElementById("qw-video-start");
  const stopBtn=document.getElementById("qw-video-stop");
  if(stopBtn)stopBtn.style.display="none";
  if(!rule||!qwRecordedChunks.length){
    if(startBtn)startBtn.style.display="";
    return;
  }
  const mimeType=(qwRecorder&&qwRecorder.mimeType)||"video/webm";
  const uploadMimeType=mimeType.split(";")[0].trim()||"video/webm"; // strip codec params e.g. ";codecs=vp9,opus" — that comma also breaks naive data-URL parsing, so keep it out of the Blob's type entirely
  const blob=new Blob(qwRecordedChunks,{type:uploadMimeType});
  qwRecordedChunks=[];
  if(statusEl){statusEl.textContent="⏳ جارٍ الحفظ محلياً...";statusEl.className="qw-capture-status";}
  try{
    await qwQueueAdd({
      permit:qwState.permit,
      stage:rule.stage,
      item:rule.item,
      itemTime:formatFolderTime(qwState.firstCapturedAt),
      fileTime:formatFolderTime(qwRecordStartTs?new Date(qwRecordStartTs):new Date()), // when THIS recording started — used for the filename itself
      kind:"video",
      mimeType:uploadMimeType,
      blob:blob,
      attempts:0,
      createdAt:Date.now()
    });
    qwState.video=true;
    const warnings=[];
    if(qwLastGeocodeError)warnings.push("العنوان: "+qwLastGeocodeError);
    if(statusEl){statusEl.textContent="✅ تم الحفظ محلياً — جارٍ الرفع في الخلفية"+(warnings.length?" — ⚠ "+warnings.join(" | "):"");statusEl.className="qw-capture-status ok";}
    processQwUploadQueue(); // fire-and-forget — don't block the UI on this
    refreshQwQueueBadge();
  }catch(err){
    if(startBtn)startBtn.style.display="";
    if(statusEl){statusEl.textContent="⛔ خطأ: "+err.message;statusEl.className="qw-capture-status err";}
  }finally{
    renderQualityChecklistKeepStatus();
  }
}

// Confirms the active checklist item: saves it as a row in جودة العمل
// (recording the date/time of the FIRST photo or video captured for this
// item, not the confirm-click time), then unlocks the next item. رابط
// الملف may still be empty at this point — uploads happen in the
// background now, so it fills in automatically (via qwKnownFolderLinks →
// applyQwUploadResult) whenever the underlying upload actually finishes,
// possibly after this row is already saved.
function confirmQualityItem(){
  if(!qwComplianceMet())return;
  const rule=qwState.rules[qwState.activeIndex];
  if(!rule)return;
  const stamp=qwState.firstCapturedAt||new Date();
  const knownLink=qwKnownFolderLinks[qwState.permit+"|"+rule.stage+"|"+rule.item]||"";
  const client=clientForPermit(qwState.permit);
  const entry={
    _id:genRowId(),
    permit:qwState.permit,
    clientName:client?(client.name||""):"",
    stage:rule.stage,
    item:rule.item,
    photoCount:String(qwState.photos),
    fileLink:knownLink,
    date:stamp.toLocaleDateString("en-CA"),
    time:stamp.toTimeString().slice(0,8)
  };
  store.qualityWork.push(entry);
  logAudit("إضافة","جودة العمل",entry);
  const completedIndex=qwState.activeIndex;
  qwState.photos=0;
  qwState.video=false;
  qwState.firstCapturedAt=null;
  qwState.activeIndex=qwState.rules.findIndex((r,i)=>i>completedIndex&&!qualityWorkRow(qwState.permit,r.stage,r.item));
  refreshDynamicOptions();
  renderTable("qualityWork");
  updateCounts();
  saveStore();
  renderQualityChecklist();
}

function refreshDynamicOptions(){
  const clientDl=document.getElementById("dl-clientnames");
  if(clientDl)clientDl.innerHTML=clientSearchOptions().map(o=>`<option value="${escapeHtml(o.label)}">`).join("");
  const excDl=document.getElementById("dl-excstarts");
  if(excDl)excDl.innerHTML=excStartOptions().map(d=>`<option value="${d}">`).join("");
  SHEETS.forEach(s=>{
    if(!canView(s.id)||!canCreateEdit(s.id))return;
    s.fields.forEach(f=>{
      if(f.optionsFrom){
        const el=document.getElementById(`f-${s.id}-${f.key}`);
        if(!el)return;
        const opts=dynOptions(f.optionsFrom);
        const cur=el.value;
        el.innerHTML=`<option value="">—</option>${opts.map(o=>`<option value="${o}">${o}</option>`).join("")}`;
        el.value=cur;
      }
      if(f.list==="permits"){
        const dl=document.getElementById("dl-permits");
        if(dl)dl.innerHTML=permitOptions().map(p=>`<option value="${p}">`).join("");
        updatePermitDisplay(s.id);
      }
    });
  });
}

const expandedState={};
let openRowMenuEl=null;
function closeRowMenu(){
  if(openRowMenuEl){openRowMenuEl.remove();openRowMenuEl=null;}
}
function openRowMenu(btn,sheetId,idx,editable,deletable){
  const wasOpen=!!openRowMenuEl;
  closeRowMenu();
  if(wasOpen)return; // clicking the same ⋮ again just closes it
  const wrap=btn.closest(".row-menu-wrap")||btn.parentElement;
  const pop=document.createElement("div");
  pop.className="row-menu-popover";
  let html="";
  if(editable)html+=`<div class="row-menu-item" data-action="edit">✎ تعديل</div>`;
  if(deletable)html+=`<div class="row-menu-item danger" data-action="delete">✕ حذف</div>`;
  pop.innerHTML=html;
  wrap.appendChild(pop);
  pop.querySelectorAll(".row-menu-item").forEach(item=>{
    item.onclick=(e)=>{
      e.stopPropagation();
      closeRowMenu();
      if(item.dataset.action==="edit")editEntry(sheetId,idx);
      else deleteEntry(sheetId,idx);
    };
  });
  openRowMenuEl=pop;
  setTimeout(()=>document.addEventListener("click",closeRowMenu,{once:true}),0);
}
function renderTable(sheetId){
  const s=SHEETS.find(x=>x.id===sheetId);
  const target=document.getElementById(`table-${sheetId}`);
  if(!target)return;
  const rows=store[sheetId];
  const editable=canCreateEdit(sheetId)&&!s.custom;
  const deletable=canDelete(sheetId);
  const hasActions=editable||deletable;
  if(!rows.length){
    target.innerHTML=`<div class="empty">لا توجد صفوف مضافة بعد.</div>`;
    return;
  }
  const limit=7;
  const showAll=!!expandedState[sheetId];
  const startIdx=showAll?0:Math.max(0,rows.length-limit);
  const visible=rows.slice(startIdx).map((r,i)=>({r,idx:startIdx+i}));
  const cols=s.fields.map(f=>f.label);
  let html=`<table class="entries"><thead><tr>${hasActions?"<th></th>":""}${cols.map(c=>`<th>${c}</th>`).join("")}${s.computedLabel?`<th>${s.computedLabel}</th>`:""}</tr></thead><tbody>`;
  visible.forEach(({r,idx})=>{
    html+="<tr>";
    if(hasActions)html+=`<td class="act-menu-cell"><span class="row-menu-wrap"><button type="button" class="row-menu-btn" data-sheet="${sheetId}" data-idx="${idx}" title="خيارات">⋮</button></span></td>`;
    s.fields.forEach(f=>{html+=`<td>${cellHTML(f,r[f.key])}</td>`;});
    if(s.computed){
      let v=s.computed(r);
      if(typeof v==="number")v=Math.round(v*100)/100;
      html+=`<td>${v}</td>`;
    }
    html+="</tr>";
  });
  html+="</tbody></table>";
  if(rows.length>limit){
    html+=showAll
      ?`<div class="tabletoggle"><button class="toggle-link" data-sheet="${sheetId}" data-mode="less">إخفاء وعرض آخر 7 سجلات فقط</button></div>`
      :`<div class="tabletoggle">يعرض آخر 7 من أصل ${rows.length} سجل — <button class="toggle-link" data-sheet="${sheetId}" data-mode="more">عرض كل السجلات</button></div>`;
  }
  target.innerHTML=html;
  target.querySelectorAll(".row-menu-btn").forEach(btn=>{
    btn.onclick=(e)=>{
      e.stopPropagation();
      openRowMenu(btn,btn.dataset.sheet,parseInt(btn.dataset.idx),editable,deletable);
    };
  });
  target.querySelectorAll(".toggle-link").forEach(b=>{
    b.onclick=()=>{
      expandedState[b.dataset.sheet]=b.dataset.mode==="more";
      renderTable(b.dataset.sheet);
    };
  });
}

function normDate(v){
  const s=String(v||"").trim();
  if(!s)return "";
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
  if(/^\d{4}-\d{2}-\d{2}T/.test(s)){
    const d=new Date(s);
    if(!isNaN(d))return d.toLocaleDateString("en-CA");
    return s.slice(0,10);
  }
  const d=new Date(s);
  return isNaN(d)?s:d.toLocaleDateString("en-CA");
}

async function loadQualityFolderPhotos(btn){
  const folderUrl=btn.dataset.folder;
  const target=document.getElementById(btn.dataset.target);
  if(!target)return;
  if(target.dataset.loaded==="1"){
    const nowHidden=target.style.display==="none";
    target.style.display=nowHidden?"":"none";
    btn.textContent=nowHidden?"🔽 إخفاء الصور":"🖼 عرض الصور";
    return;
  }
  btn.disabled=true;
  const origText=btn.textContent;
  btn.textContent="⏳ جارٍ التحميل...";
  try{
    const url=await resolveGsheetsUrl();
    if(!url)throw new Error("لم يتم إعداد رابط Google Sheets");
    const res=await fetch(url,{
      method:"POST",
      body:JSON.stringify({action:"listQualityFolderFiles",idToken:currentUser&&currentUser.idToken,folderUrl:folderUrl})
    });
    const data=await res.json();
    if(data.status==="ok"){
      const files=data.files||[];
      target.innerHTML=files.length?files.map(f=>f.isVideo
        ?`<a href="${escapeHtml(f.url)}" target="_blank" rel="noopener noreferrer" class="qw-photo-thumb qw-video-thumb" title="${escapeHtml(f.name)}">🎥</a>`
        :`<a href="${escapeHtml(f.url)}" target="_blank" rel="noopener noreferrer" class="qw-photo-thumb"><img src="https://drive.google.com/thumbnail?id=${encodeURIComponent(f.id)}&sz=w300" alt="${escapeHtml(f.name)}" loading="lazy"></a>`
      ).join(""):`<div class="empty">المجلد فارغ.</div>`;
      target.dataset.loaded="1";
      btn.textContent="🔽 إخفاء الصور";
    }else{
      target.innerHTML=`<div class="empty">⛔ ${escapeHtml(data.message||"تعذّر تحميل الصور")}</div>`;
      btn.textContent=origText;
    }
  }catch(err){
    target.innerHTML=`<div class="empty">⛔ خطأ: ${escapeHtml(err.message)}</div>`;
    btn.textContent=origText;
  }finally{
    btn.disabled=false;
  }
}

function buildExportPayload(){
  const sheets=[];
  SHEETS.forEach(s=>{
    const allRows=store[s.id];
    const header=s.fields.map(f=>f.label);
    const aoa=[["ID","#"].concat(header).concat(s.computedLabel?[s.computedLabel]:[])];
    allRows.forEach((r,i)=>{
      if(!r._id)r._id=genRowId(); // safety net for any row that somehow never got one (e.g. very old cached data)
      const row=[r._id,i+1];
      s.fields.forEach(f=>row.push(r[f.key]||""));
      if(s.computed){
        let v=s.computed(r);
        if(typeof v==="number")v=Math.round(v*100)/100;
        row.push(v);
      }
      aoa.push(row);
    });
    const name=sheetSyncName(s);
    sheets.push({name,headers:aoa[0],rows:aoa.slice(1)});
  });
  return sheets;
}

}

async function pullFromGoogleSheets(url){
  try{
    const sep=url.indexOf("?")===-1?"?":"&";
    const tokenParam=currentUser&&currentUser.idToken?sep+"token="+encodeURIComponent(currentUser.idToken):"";
    const res=await fetch(url+tokenParam,{method:"GET"});
    const data=await res.json();
    if(!res.ok||!data){
      return{ok:false,reason:"network",message:(data&&data.message)?data.message:("HTTP "+res.status)};
    }
    if(data.status==="error"){
      return{ok:false,reason:"server",message:data.message||"خطأ غير معروف من الخادم"};
    }
    if(!data.data){
      // Reached the script successfully but got no dataset back — e.g. this
      // account isn't registered in 11 — معلومات الموظفين. This is NOT a
      // success: the sheet is the only source of truth, so we must not
      // silently keep whatever was in local/cached store.
      return{ok:false,reason:"no-data",message:"لم يُرجع الخادم أي بيانات — تحققي من تسجيل بريدك في 11 — معلومات الموظفين، ومن صحة رابط Apps Script."};
    }
    const sheetsData=data.data;
    SHEETS.forEach(s=>{
      const name=sheetSyncName(s);
      const rows=sheetsData[name];
      if(!rows||rows.length<1){store[s.id]=[];return;}
      const entries=rows.slice(1).map(row=>{
        const entry={_id:row[0]?String(row[0]):genRowId()}; // legacy rows with no ID yet get one now — see backend auto-migration too
        s.fields.forEach((f,i)=>{
          const v=row[i+2];
          entry[f.key]=(v!==undefined&&v!==null)?String(v):"";
        });
        return entry;
      }).filter(e=>Object.keys(e).some(k=>k!=="_id"&&e[k]));
      store[s.id]=entries;
    });
    await saveStore(true);
    return{ok:true,hasData:true,role:data.role||null};
  }catch(err){
    console.error("Pull from Google Sheets failed:",err);
    return{ok:false,reason:"exception",message:String(err)};
  }
}

async function performSync(url){
  try{
    const auditBatch=auditQueue.slice();
    const deletionBatch=pendingDeletions.slice();
    const payload={
      sheets:buildExportPayload(),
      idToken:currentUser?currentUser.idToken:null,
      audit:auditBatch,
      deletions:deletionBatch
    };
    const res=await fetch(url,{
      method:"POST",
      headers:{"Content-Type":"text/plain;charset=utf-8"},
      body:JSON.stringify(payload)
    });
    let ok=res.ok;
    try{
      const data=await res.json();
      ok=data.status==="ok";
      if(!ok)throw new Error(data.message||"فشل غير معروف");
    }catch(parseErr){
      if(!res.ok)throw parseErr;
    }
    if(auditBatch.length){
      auditQueue=auditQueue.slice(auditBatch.length);
      storageSet("audit_queue",JSON.stringify(auditQueue));
    }
    if(deletionBatch.length){
      pendingDeletions=pendingDeletions.slice(deletionBatch.length);
      storageSet("pending_deletions",JSON.stringify(pendingDeletions));
    }
    return{ok:true};
  }catch(err){
    console.error("Google Sheets sync failed:",err);
    const detail=(err&&err.message)?err.message:String(err);
    return{ok:false,detail};
  }
}

function decodeJWT(token){
  try{
    const base64Url=token.split(".")[1];
    const base64=base64Url.replace(/-/g,"+").replace(/_/g,"/");

    return JSON.parse(json);
  }catch(e){return null;}
}

// ── Session persistence ───────────────────────────────────────────────
// currentUser previously lived ONLY in a JS variable — fine as long as
// the page keeps running, but mobile browsers (iOS Safari, Android
// Chrome) routinely discard a backgrounded tab's memory to save
// resources. Switching back then isn't a resume, it's a silent full
// reload — which wiped currentUser and dropped back to the login
// screen, looking exactly like a logout. Saving the session (same
// storage mechanism the app already uses elsewhere) lets a fresh load
// restore it silently instead. Google's ID token is short-lived (~1h
// from issuance), so this only ever helps for a reasonably recent
// session — a genuinely stale one just falls through to the normal
// interactive sign-in below, same as before this existed.
const SESSION_STORAGE_KEY="qw_session_v1";
const SESSION_MAX_AGE_MS=55*60*1000; // stay safely under the ID token's ~1h lifetime

async function saveSession(){
  if(!currentUser)return;
  try{
    const ok=await storageSet(SESSION_STORAGE_KEY,JSON.stringify({
      email:currentUser.email,name:currentUser.name,picture:currentUser.picture,
      idToken:currentUser.idToken,role:currentUser.role,savedAt:Date.now()
    }));
    console.log(ok?"[session] saved for "+currentUser.email:"[session] storageSet returned falsy — session may not have been saved");
  }catch(e){console.warn("[session] saveSession threw — session NOT saved:",e);}
}
async function clearSession(){
  try{await storageSet(SESSION_STORAGE_KEY,"");}catch(e){}
}
async function tryRestoreSession(){
  let raw;
  try{raw=await storageGet(SESSION_STORAGE_KEY);}catch(e){console.warn("[session] storageGet threw:",e);return false;}
  if(!raw){console.log("[session] no saved session found — normal for a first visit or after signing out.");return false;}
  let saved;
  try{saved=JSON.parse(raw);}catch(e){console.warn("[session] saved session was not valid JSON:",e);return false;}
  if(!saved||!saved.idToken||!saved.email){console.warn("[session] saved session missing idToken/email — discarding.");return false;}
  if(!saved.savedAt||(Date.now()-saved.savedAt)>SESSION_MAX_AGE_MS){
    console.log("[session] saved session is older than",SESSION_MAX_AGE_MS/60000,"minutes — needs a fresh interactive login. Age (min):",saved.savedAt?Math.round((Date.now()-saved.savedAt)/60000):"unknown");
    return false;
  }
  currentUser={email:saved.email,name:saved.name,picture:saved.picture,idToken:saved.idToken,role:saved.role||"Viewer"};
  const ok=await completeLogin({silent:true});
  if(!ok){console.warn("[session] restore found a recent saved session but completeLogin() rejected it (expired token, network issue, or role no longer valid) — falling back to normal sign-in.");currentUser=null;await clearSession();}
  else{console.log("[session] restored session silently for",saved.email);}
  return ok;
}

// Shared by both the interactive Google Sign-In callback and the silent
// restore path. silent:true suppresses the loginStatus text (nothing to
// show the person if this is happening invisibly on page load) but keeps
// the exact same validation — a restored session still gets its token
// and role re-checked against the sheet every time, same as a fresh login.
async function completeLogin(opts){
  opts=opts||{};
  const statusEl=document.getElementById("loginStatus");
  if(!opts.silent){statusEl.textContent="جارٍ التحقق...";statusEl.className="login-status";}

  const url=await resolveGsheetsUrl();
  if(!url){
    if(!opts.silent){
      statusEl.textContent="⚠ لم يتم إعداد رابط Google Sheets — راجعي الإعدادات.";
      statusEl.className="login-status err";
    }
    currentUser=null;
    return false;
  }

  if(!opts.silent){statusEl.textContent="جارٍ جلب البيانات من الشيت...";}
  const pullResult=await pullFromGoogleSheets(url);
  if(!pullResult.ok||!pullResult.hasData){
    // The Google Sheet is the ONLY source of truth — if we can't get real
    // data from it, we do not fall back to any local/cached/seed copy and
    // do not let the person into the app with stale data.
    if(!opts.silent){
      statusEl.textContent="⛔ تعذّر جلب بيانات حقيقية من الشيت: "+(pullResult.message||"خطأ غير معروف")+" — لن يتم فتح التطبيق ببيانات قديمة أو غير موثوقة.";
      statusEl.className="login-status err";
    }
    currentUser=null;
    return false;
  }

  await loadAuditQueue();
  await loadPendingDeletions();
  await loadQwQualitySettings();
  backfillClientNames();
  recomputeStockTable();
  currentUser.role=pullResult.role;
  if(!["Admin","Supervisor","Viewer"].includes(currentUser.role)){
    if(!opts.silent){
      statusEl.textContent="⛔ هذا البريد ("+currentUser.email+") غير مسجّل في 11 — معلومات الموظفين. تواصلي مع المسؤول لإضافتك.";
      statusEl.className="login-status err";
      if(window.google&&google.accounts&&google.accounts.id)google.accounts.id.disableAutoSelect();
    }
    currentUser=null;
    return false;
  }
  document.getElementById("loginGate").style.display="none";
  document.getElementById("appRoot").style.display="";
  document.getElementById("userPic").src=currentUser.picture;
  document.getElementById("userName").textContent=currentUser.name;
  document.getElementById("userEmail").textContent=currentUser.email;
  applyRoleUI();
  renderAll();
  loadGsheetsUrl();
  loadAutoSyncPref();
  await saveSession();
  processQwUploadQueue(); // resume anything left queued from a previous session (e.g. app was closed mid-upload)
  return true;
}

async function handleCredentialResponse(response){
  const payload=decodeJWT(response.credential);
  const statusEl=document.getElementById("loginStatus");
  if(!payload||!payload.email){
    statusEl.textContent="⚠ تعذّر قراءة بيانات الحساب";
    statusEl.className="login-status err";
    return;
  }
  currentUser={email:payload.email,name:payload.name||payload.email,picture:payload.picture||"",idToken:response.credential,role:"Viewer"};
  await completeLogin({silent:false});
}

function signOut(){
  currentUser=null;
  clearSession();
  document.getElementById("appRoot").style.display="none";
  document.getElementById("loginGate").style.display="flex";
  document.getElementById("loginStatus").textContent="";
  document.getElementById("loginStatus").className="login-status";
  if(window.google&&google.accounts&&google.accounts.id){
    google.accounts.id.disableAutoSelect();
  }
}
document.getElementById("signOutBtn").onclick=signOut;

function initGoogleSignIn(skipPrompt){
  const statusEl=document.getElementById("loginStatus");
  if(GOOGLE_CLIENT_ID.indexOf("PASTE_YOUR_CLIENT_ID_HERE")===0){
    statusEl.textContent="⚠ لم يتم إعداد Google Client ID بعد — راجعي خطوات الإعداد";
    statusEl.className="login-status err";
    return;
  }
  if(!window.google||!google.accounts||!google.accounts.id){
    statusEl.textContent="⚠ تعذّر تحميل خدمة تسجيل الدخول من Google — تأكدي من الاتصال بالإنترنت";
    statusEl.className="login-status err";
    return;
  }
  google.accounts.id.initialize({client_id:GOOGLE_CLIENT_ID,callback:handleCredentialResponse});
  google.accounts.id.renderButton(document.getElementById("googleSignInBtn"),{theme:"outline",size:"large",text:"signin_with",shape:"pill",locale:"ar"});
  if(!skipPrompt)google.accounts.id.prompt();
}

window.addEventListener("load",async()=>{
  const restored=await tryRestoreSession();
  // Still initialize Google Sign-In even after a successful silent
  // restore — the sign-out button needs it wired up, and it's what a
  // later genuinely-expired session falls back to. skipPrompt just keeps
  // Google's One-Tap UI from popping up on top of an already-restored app.
  setTimeout(()=>initGoogleSignIn(restored),400);
});
</script>
<script>
/* ============================================================
   Auto Fit-To-Screen  (تكبير تلقائي ليملأ عرض الشاشة بالكامل)
   - Scales the whole app (login screen included) so the 1180px
     design fills the browser window width — no manual zoom needed.
   - Keeps everything perfectly centered.
   - Blocks any horizontal page scrolling / sideways drift.
   ============================================================ */
(function(){
  var DESIGN_W = 1224;            /* 1180px content + 22px padding each side */
  var MAX_SCALE = 3;              /* safety cap for ultra-wide monitors */

  function fit(){
    var vw = window.innerWidth;
    if (vw > DESIGN_W) {
      var z = Math.min(vw / DESIGN_W, MAX_SCALE);
      document.body.style.zoom = z;
      /* keep vertical sizing correct while scaled */
      document.body.style.minHeight = (window.innerHeight / z) + 'px';
    } else {
      /* Below the design width (this covers every phone AND every tablet,
         portrait or landscape) — no scaling needed at all, since .wrap's
         own responsive width:100%/max-width already fits any of these
         sizes correctly. Fully clearing zoom (not just setting it to 1)
         matters: zoom is a non-standard property, and on some tablet/
         in-app-browser rendering engines even an explicit "1" can create
         a new zoom containing block with its own quirks — which is
         exactly the kind of thing that could produce a squeezed,
         off-center layout on a tablet. Never touching it at all for the
         vast majority of screens sidesteps that risk entirely. */
      document.body.style.zoom = '';
      document.body.style.minHeight = '';
    }
    /* snap back if anything nudged the page sideways */
    if (window.scrollX !== 0) window.scrollTo(0, window.scrollY);
  }

  fit();
  window.addEventListener('resize', fit);
  window.addEventListener('orientationchange', fit);
  window.addEventListener('load', fit);
  setTimeout(fit, 300); /* catch late layout shifts, e.g. web fonts finishing */

  /* block accidental horizontal panning (shift+wheel, trackpad swipe, etc.) */
  window.addEventListener('scroll', function(){
    if (window.scrollX !== 0) window.scrollTo(0, window.scrollY);
  }, {passive:true});
})();
</script>
