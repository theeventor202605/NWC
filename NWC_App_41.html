<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>صانع الحدث</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;700;800&family=Tajawal:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root{
  --navy:#F6F5FB;
  --navy-deep:#FFFFFF;
  --grid-line:rgba(0,0,0,0);
  --paper:#FFFFFF;
  --paper-dim:#F1F0FA;
  --ink:#2B2B36;
  --ink-soft:#6B6B7D;
  --orange:#7B68EE;
  --orange-dark:#6552D0;
  --amber:#F5A623;
  --steel:#8C8CA1;
  --teal:#127A5E;
  --red:#C23B22;
  --blue:#1D5FA0;
  --line:#E4E3ED;
  --border-soft:#ECEBF5;
  --hover-tint:#F1EFFC;
  --sidebar-bg:#FFFFFF;
  --sidebar-text:#4B4B5A;
  --sidebar-muted:#9A99AC;
}
*{box-sizing:border-box;}
html{overflow-x:hidden;overflow-x:clip;width:100%;overscroll-behavior-x:none;}
html,body{margin:0;padding:0;max-width:100%;}
body{overflow-x:hidden;overflow-x:clip;}
body{
  background:var(--navy);
  font-family:'Tajawal',sans-serif;
  color:var(--ink);
  min-height:100vh;
  padding:22px;
  overflow-x:hidden;
  overscroll-behavior-x:none;
  width:100%;
}
.wrap{max-width:1180px;width:100%;margin:0 auto;}
#sheets{max-width:100%;overflow-x:hidden;}
.app-shell{display:flex;max-width:1400px;margin:0 auto;align-items:flex-start;gap:0;}
.sidebar{
  width:230px;flex-shrink:0;background:var(--sidebar-bg);border:1px solid var(--line);
  border-radius:8px;padding:16px 12px;display:flex;flex-direction:column;gap:2px;
  position:sticky;top:22px;max-height:calc(100vh - 44px);
  transition:width .15s ease,opacity .15s ease;overflow:hidden;
  user-select:none;-webkit-user-select:none;
}
.sidebar-brand{padding:2px 4px 16px 8px;display:flex;align-items:flex-start;justify-content:space-between;gap:6px;flex-shrink:0;}
.sidebar-brand h1{font-family:'Cairo',sans-serif;font-weight:800;font-size:18px;margin:0 0 2px;color:var(--ink);white-space:nowrap;}
.sidebar-brand .sub{font-size:11.5px;color:var(--sidebar-muted);white-space:nowrap;}
.sidebar-collapse-btn{
  background:transparent;border:none;font-size:13px;color:var(--sidebar-muted);cursor:pointer;
  padding:5px 7px;border-radius:4px;flex-shrink:0;user-select:none;-webkit-user-select:none;
}
.sidebar-collapse-btn:hover{background:var(--hover-tint);color:var(--ink);}
.sidebar-menu{flex:1;overflow-y:auto;min-height:0;}
.sidebar-divider{border:none;border-top:1px solid var(--line);margin:8px 4px;flex-shrink:0;}
.sidebar-settings-wrap{flex-shrink:0;}
.sidebar-settings-btn{width:100%;justify-content:flex-start;}
.sidebar-menu .menu-category-head{color:var(--sidebar-muted);}
.sidebar-menu .dropdown-item{color:var(--sidebar-text);}
.app-main{flex:1;min-width:0;padding-inline-start:20px;}
.app-topbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;user-select:none;-webkit-user-select:none;}
.active-sheet-title{font-family:'Cairo',sans-serif;font-weight:800;font-size:17px;margin:0;color:var(--ink);}
.sidebar-toggle-btn{
  display:inline-flex;align-items:center;justify-content:center;
  background:var(--paper);border:1px solid var(--line);border-radius:6px;
  font-size:17px;padding:6px 12px;cursor:pointer;color:var(--ink);
  user-select:none;-webkit-user-select:none;
}
.sidebar-backdrop{display:none;position:fixed;inset:0;background:rgba(43,43,54,.35);z-index:240;}
.sidebar-backdrop.show{display:block;}
.app-shell.sidebar-collapsed .sidebar{width:0;min-width:0;padding:0;border:none;opacity:0;pointer-events:none;}
@media (max-width:900px){
  .app-shell{display:block;}
  .app-main{padding-inline-start:0;}
  .sidebar{
    position:fixed;top:0;bottom:0;right:0;width:260px;max-width:80vw;
    border-radius:0;z-index:250;display:none;box-shadow:-8px 0 24px rgba(43,43,54,.18);
  }
  .sidebar.open{display:flex;}
  .sidebar-collapse-btn{display:none;}
}
.login-gate{
  position:fixed;inset:0;background:var(--navy);
  display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;
}
.login-box{
  background:var(--paper);border-radius:10px;padding:38px 34px;max-width:380px;width:100%;text-align:center;
  box-shadow:0 8px 32px rgba(43,43,54,.12);border:1px solid var(--line);
}
.login-title{font-family:'Cairo',sans-serif;font-weight:800;font-size:19px;color:var(--ink);margin:0 0 6px;}
.login-sub{color:var(--ink-soft);font-size:13px;margin:0 0 20px;}
#googleSignInBtn{display:flex;justify-content:center;margin-bottom:14px;}
.login-status{font-size:12.5px;font-weight:600;min-height:16px;margin-bottom:10px;overflow-wrap:anywhere;}
.login-status.err{color:var(--red);}
.login-status.ok{color:var(--teal);}
.login-note{font-size:11px;color:var(--steel);margin:14px 0 0;}
.userbar{
  display:flex;align-items:center;gap:10px;background:var(--paper);border:1px solid var(--line);
  border-radius:6px;padding:8px 14px;margin-bottom:14px;
}
.userbar-pic{width:30px;height:30px;border-radius:50%;background:var(--paper-dim);}
.userbar-info{flex:1;min-width:0;}
.userbar-name{font-size:13px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.userbar-email{font-size:11px;color:var(--ink-soft);font-family:'JetBrains Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.role-badge{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;padding:3px 10px;border-radius:9px;white-space:nowrap;}
.role-badge.Admin{background:var(--orange);color:#fff;}
.role-badge.Supervisor{background:var(--amber);color:#3A2A00;}
.role-badge.Viewer{background:var(--paper-dim);color:var(--ink-soft);}
.btn.small{padding:7px 12px;font-size:12.5px;}
.titleblock{
  background:var(--paper);
  border:1px solid var(--line);
  border-radius:6px;
  padding:18px 22px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:14px;
  margin-bottom:16px;
}
.titleblock h1{
  font-family:'Cairo',sans-serif;
  font-weight:800;
  font-size:22px;
  color:var(--ink);
  margin:0 0 4px;
}
.titleblock .sub{
  color:var(--ink-soft);
  font-size:13px;
  font-family:'JetBrains Mono',monospace;
  letter-spacing:.3px;
}
.stamp{
  border:2px solid var(--orange);
  border-radius:4px;
  padding:8px 16px;
  text-align:center;
  color:var(--orange);
  font-family:'JetBrains Mono',monospace;
}
.stamp .n{font-size:20px;font-weight:600;line-height:1;}
.stamp .l{font-size:10px;letter-spacing:1px;color:var(--orange-dark);margin-top:3px;}
.toolbar{
  display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center;position:relative;
}
.btn{
  font-family:'Tajawal',sans-serif;
  font-weight:700;
  font-size:14px;
  border-radius:5px;
  padding:10px 18px;
  border:none;
  cursor:pointer;
  transition:transform .08s ease;
  user-select:none;-webkit-user-select:none;
}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--orange);color:#fff;}
.btn-primary:hover{background:var(--orange-dark);}
.btn-ghost{background:var(--paper);color:var(--ink-soft);border:1px solid var(--line);}
.btn-ghost:hover{background:var(--hover-tint);}
.receipt-scan-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
.receipt-scan-row input[type="url"]{flex:1 1 220px;min-width:0;}
.receipt-scan-status{font-size:12.5px;flex-basis:100%;}
.receipt-scan-status.ok{color:#2A9D5C;}
.receipt-scan-status.err{color:#D9463A;}
.qw-stage-header{font-family:'Cairo',sans-serif;font-weight:800;font-size:13px;color:var(--steel);text-transform:uppercase;letter-spacing:.4px;margin:18px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--line);}
.qw-item{border:1px solid var(--line);border-radius:8px;padding:12px 14px;margin-bottom:10px;background:#fff;}
.qw-item.qw-done{border-color:#bfe3d3;background:#F3FBF8;}
.qw-item.qw-active{border-color:var(--orange);box-shadow:0 0 0 1px var(--orange) inset;}
.qw-item.qw-locked{opacity:.55;}
.qw-item-head{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
.qw-item-title{font-weight:700;font-size:13.5px;}
.qw-item-badges{display:flex;gap:6px;flex-wrap:wrap;}
.qw-badge{font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--paper-dim);color:var(--ink-soft);border-radius:9px;padding:2px 9px;}
.qw-item-done-info{margin-top:6px;font-size:12.5px;color:var(--teal);font-family:'JetBrains Mono',monospace;overflow-wrap:anywhere;}
.qw-item-locked-info{margin-top:6px;font-size:12.5px;color:var(--ink-soft);}
.qw-capture{margin-top:10px;display:flex;flex-direction:column;gap:8px;}
.qw-capture-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
.qw-capture-status{font-size:12.5px;}
.qw-capture-status.ok{color:#2A9D5C;}
.qw-capture-status.err{color:#D9463A;}
.qw-alldone{text-align:center;font-weight:700;color:var(--teal);padding:16px;}
.qw-item.qw-uploading{border-color:var(--amber);background:#FFF8ED;}
.qw-queue-status{
  display:none;margin-bottom:10px;padding:8px 12px;background:#FFF8ED;border:1px solid var(--amber);
  border-radius:6px;font-size:12.5px;color:var(--ink);align-items:center;gap:8px;flex-wrap:wrap;
}
.qw-queue-summary{width:100%;cursor:pointer;}
.qw-queue-summary-row{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:5px;}
.qw-queue-caret{margin-inline-start:6px;font-size:10px;}
.qw-progress-track{height:6px;background:#F3E4C6;border-radius:4px;overflow:hidden;}
.qw-progress-fill{height:100%;background:var(--amber);transition:width .25s ease;}
.qw-queue-stuck{width:100%;}
.qw-queue-filelist{width:100%;margin-top:6px;border-top:1px solid #F0DCB0;padding-top:6px;display:flex;flex-direction:column;gap:4px;}
.qw-queue-file-row{display:flex;justify-content:space-between;font-size:11.5px;}
.qw-queue-file-status{color:var(--ink-soft);}
.qw-photo-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.qw-photo-thumb{display:block;width:76px;height:76px;border-radius:6px;overflow:hidden;border:1px solid var(--line);background:var(--paper-dim);}
.qw-photo-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.qw-video-thumb{display:flex;align-items:center;justify-content:center;font-size:24px;}
.qw-locked-wrap{position:relative;}
.qw-geo-overlay{
  position:absolute;inset:0;z-index:60;
  background:rgba(255,255,255,.97);
  border:1px solid var(--red);border-radius:8px;
  display:none;align-items:center;justify-content:center;text-align:center;padding:22px;
}
.qw-geo-overlay-box{max-width:360px;}
.qw-geo-overlay-icon{font-size:32px;margin-bottom:8px;}
.qw-geo-overlay-title{font-family:'Cairo',sans-serif;font-weight:800;font-size:15px;color:var(--red);margin-bottom:8px;}
.qw-geo-overlay-text{font-size:13px;color:var(--ink-soft);line-height:1.65;}
.siw-wrap{display:flex;flex-direction:column;gap:10px;}
.si-info{display:flex;flex-wrap:wrap;gap:6px;}
button:disabled{opacity:.45;cursor:not-allowed;}
input[readonly]{opacity:.8;background:var(--paper-dim);}
.savenote{color:var(--ink-soft);font-size:12px;font-family:'JetBrains Mono',monospace;overflow-wrap:anywhere;}
.menu-wrap{position:relative;}
.menubtn{
  background:var(--paper);
  color:var(--ink-soft);
  border:1px solid var(--line);
  font-family:'Tajawal',sans-serif;
  font-weight:700;
  font-size:14px;
  border-radius:5px;
  padding:10px 16px;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:6px;
  white-space:nowrap;
}
.menubtn:hover{background:var(--hover-tint);}
.dropdown{
  position:absolute;
  top:calc(100% + 6px);
  right:0;
  background:var(--paper);
  border:1px solid var(--line);
  border-radius:8px;
  box-shadow:0 12px 32px rgba(43,43,54,.15);
  width:270px;
  max-width:calc(100vw - 24px);
  max-height:70vh;
  overflow-y:auto;
  display:none;
  z-index:60;
  padding:6px;
}
.dropdown.open{display:block;}
.dropdown-item{
  display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:5px;cursor:pointer;
  font-size:13px;color:var(--ink);
}
.dropdown-item:hover{background:var(--hover-tint);}
.dropdown-item.active{background:var(--orange);color:#fff;}
.dropdown-item .num{
  background:var(--paper-dim);color:var(--orange-dark);border-radius:3px;padding:1px 7px;
  font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;
}
.dropdown-item.active .num{background:#fff;color:var(--orange-dark);}
.dropdown-item .cnt{
  margin-inline-start:auto;background:var(--paper-dim);color:var(--ink-soft);border-radius:9px;padding:0 7px;
  font-size:11px;min-width:16px;text-align:center;font-family:'JetBrains Mono',monospace;
}
.dropdown-item.active .cnt{background:rgba(255,255,255,.35);color:#fff;}
.menu-category+.menu-category{margin-top:2px;}
.menu-category-head{
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  padding:9px 10px;border-radius:5px;cursor:pointer;
  font-family:'Cairo',sans-serif;font-weight:800;font-size:12px;
  color:var(--steel);text-transform:uppercase;letter-spacing:.3px;
}
.menu-category-head:hover{background:var(--hover-tint);}
.menu-category-arrow{font-size:11px;color:var(--ink-soft);transition:transform .15s;}
.menu-category.open .menu-category-arrow{transform:rotate(180deg);}
.menu-category-body{display:none;padding-inline-start:6px;}
.menu-category.open .menu-category-body{display:block;}
.dropdown.settings-dropdown.open{display:flex;flex-direction:column;gap:8px;width:290px;max-width:calc(100vw - 24px);}
.dropdown-action{width:100%;text-align:center;}
.dropdown-action.small{padding:8px 10px;font-size:12.5px;}
.gsheets-box{border-top:1px solid var(--line);margin-top:4px;padding-top:10px;display:flex;flex-direction:column;gap:7px;}
.gsheets-label{font-size:11.5px;color:var(--ink-soft);font-weight:600;}
.gsheets-box input{
  width:100%;height:34px;border:1px solid var(--line);border-radius:5px;padding:0 9px;
  font-family:'JetBrains Mono',monospace;font-size:11.5px;background:#fff;color:var(--ink);direction:ltr;text-align:left;
}
.gsheets-box input:focus{outline:2px solid var(--orange);outline-offset:1px;border-color:var(--orange);}
.gsheets-btnrow{display:flex;gap:6px;}
.gsheets-btnrow .dropdown-action{flex:1;}
.gsheets-status{font-size:11.5px;min-height:14px;font-weight:600;overflow-wrap:anywhere;}
.gsheets-status.ok{color:var(--teal);}
.gsheets-status.err{color:var(--red);}
.gsync-indicator{font-size:11.5px;font-family:'JetBrains Mono',monospace;min-height:14px;overflow-wrap:anywhere;}
.gsync-indicator.ok{color:var(--teal);}
.gsync-indicator.err{color:var(--red);}
.gsync-indicator.pending{color:var(--amber);}
.autosync-row{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--ink-soft);font-weight:600;}
.autosync-row input{width:auto;height:auto;}
.qw-quality-row{display:flex;flex-direction:column;gap:3px;}
.qw-quality-row label{font-size:11.5px;color:var(--ink-soft);font-weight:600;}
.qw-quality-row select{
  width:100%;height:34px;border:1px solid var(--line);border-radius:5px;padding:0 9px;
  font-size:12px;background:#fff;color:var(--ink);
}
.qw-quality-row select:focus{outline:2px solid var(--orange);outline-offset:1px;border-color:var(--orange);}
.qw-quality-hint{font-size:11px;color:var(--ink-soft);line-height:1.5;}
.sheet{
  background:var(--paper);
  border-radius:8px;
  padding:22px;
  display:none;
  max-width:100%;
  overflow-x:hidden;
}
.sheet.active{display:block;}
.sheet h2{
  font-family:'Cairo',sans-serif;
  font-weight:700;
  font-size:18px;
  margin:0 0 3px;
  color:var(--ink);
}
.sheet .hint{color:var(--ink-soft);font-size:13px;margin:0 0 18px;}
.form-toggle-row{margin-bottom:14px;}
.form-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
  gap:12px;
  margin-bottom:14px;
}
.client-search-field{
  background:#EFF6FF;
  border:1px dashed var(--blue);
  border-radius:6px;
  padding:10px 12px;
  margin-bottom:12px;
}
.client-search-field label{color:var(--blue);font-weight:700;}
.client-search-field input{background:#fff;}
.field label{
  display:block;font-size:12px;color:var(--ink-soft);margin-bottom:5px;font-weight:500;
}
.field input,.field select{
  width:100%;height:38px;border:1px solid var(--line);border-radius:5px;
  padding:0 10px;font-family:'Tajawal',sans-serif;font-size:14px;background:#fff;color:var(--ink);
}
.field input:focus,.field select:focus{outline:2px solid var(--orange);outline-offset:1px;border-color:var(--orange);}
.field input[type=number],.field input[list]{font-family:'JetBrains Mono',monospace;font-size:13px;}
.field input.auto-filled{background:#EDF3F0;color:var(--teal);font-family:'JetBrains Mono',monospace;font-weight:700;cursor:not-allowed;}
.ac-wrap{position:relative;}
.ac-list{
  position:absolute;top:100%;right:0;left:0;z-index:80;margin-top:4px;
  background:#fff;border:1px solid var(--line);border-radius:6px;
  max-height:220px;overflow-y:auto;box-shadow:0 10px 28px rgba(0,0,0,.18);
}
.ac-item{padding:10px 12px;font-size:13.5px;color:var(--ink);cursor:pointer;border-bottom:1px solid var(--paper-dim);}
.ac-item:last-child{border-bottom:none;}
.ac-item:hover,.ac-item:active{background:var(--paper-dim);}
.permit-banner{
  display:none;
  font-size:14px;
  font-weight:700;
  padding:11px 16px;
  border-radius:6px;
  margin-bottom:14px;
  border-inline-start:4px solid var(--teal);
  overflow-wrap:anywhere;
}
.permit-banner.show{display:block;}
.permit-banner.found{background:#E4F4EE;color:var(--teal);}
.permit-banner.notfound{background:#FBEAE6;color:var(--red);border-inline-start-color:var(--red);}
.autocalc-note{font-size:11px;color:var(--steel);margin-top:5px;}
.addrow{display:flex;justify-content:flex-start;gap:10px;margin-bottom:22px;align-items:center;}
.addbtn{background:var(--teal);color:#fff;font-family:'Tajawal',sans-serif;font-weight:700;font-size:14px;border:none;border-radius:5px;padding:10px 22px;cursor:pointer;}
.addbtn:hover{background:#0D6249;}
.addbtn.editing{background:var(--blue);}
.cancelbtn{background:transparent;color:var(--ink-soft);font-family:'Tajawal',sans-serif;font-size:13px;border:1px solid var(--line);border-radius:5px;padding:9px 16px;cursor:pointer;display:none;}
.cancelbtn.show{display:inline-block;}
.editnote{font-size:12px;color:var(--blue);display:none;margin-bottom:10px;font-weight:500;}
.editnote.show{display:block;}
.sectionlabel{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-soft);margin:22px 0 8px;letter-spacing:.4px;border-top:2px solid var(--ink);padding-top:14px;}
table.entries{width:100%;border-collapse:collapse;font-size:12.5px;display:block;overflow-x:auto;overflow-y:visible;overscroll-behavior-x:contain;}
table.entries th{
  background:var(--paper-dim);color:var(--ink);text-align:right;padding:7px 8px;font-weight:700;font-size:11.5px;position:sticky;top:0;
}
table.entries td{padding:7px 8px;border-bottom:1px solid var(--paper-dim);color:var(--ink);white-space:nowrap;}
table.entries tr:nth-child(even) td{background:#EDF1EF;}
table.entries a.linkcell{color:var(--blue);text-decoration:none;font-weight:600;white-space:nowrap;}
table.entries a.linkcell:hover{text-decoration:underline;color:var(--orange-dark);}
table.entries td.act{cursor:pointer;text-align:center;width:26px;font-weight:700;}
table.entries td.act.del{color:var(--red);}
table.entries td.act.edit{color:var(--blue);}
.act-menu-cell{width:30px;text-align:center;padding:0;}

function monthOptions(){
  const names=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const out=[];
  let y=26,m=4;
  for(let i=0;i<24;i++){
    out.push(names[m]+"-"+String(y));
    m++; if(m>11){m=0;y++;}
  }
  return out;
}
const MONTHS=monthOptions();

function escapeHtml(s){
  return String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// Native <datalist> suggestions are unreliable on mobile Chrome — tapping
// an option often fails to commit the value (no input/change event fires).
// This is a small custom dropdown that behaves the same everywhere: type
// to filter, tap/click an item to select it. getOptions() is called fresh
// each time the list opens/filters, so it always reflects current data
// with no separate refresh step needed. onSelect(value) fires after the
// input's value is set, so callers can run their existing "value changed"
// logic (e.g. updatePermitDisplay).
function attachAutocomplete(inputEl,getOptions,onSelect){
  if(!inputEl||inputEl.dataset.acAttached)return;
  inputEl.dataset.acAttached="1";
  let wrap=inputEl.parentNode;
  if(!wrap.classList.contains("ac-wrap")){
    wrap=document.createElement("div");
    wrap.className="ac-wrap";
    inputEl.parentNode.insertBefore(wrap,inputEl);
    wrap.appendChild(inputEl);
  }
  const listEl=document.createElement("div");
  listEl.className="ac-list";
  listEl.style.display="none";
  wrap.appendChild(listEl);
  function renderList(){
    const q=inputEl.value.trim().toLowerCase();
    const opts=(getOptions()||[]).filter(o=>o&&(!q||String(o).toLowerCase().includes(q)));
    if(!opts.length){listEl.style.display="none";listEl.innerHTML="";return;}
    listEl.innerHTML=opts.slice(0,30).map(o=>`<div class="ac-item">${escapeHtml(o)}</div>`).join("");
    listEl.style.display="";
    listEl.querySelectorAll(".ac-item").forEach(item=>{
      // mousedown (not click) fires BEFORE the input's blur — using it and
      // preventing default keeps focus in the input so the dropdown is
      // still open and the tap actually registers. This also fires for
      // touch taps on mobile Chrome/Safari, so no separate touch handler
      // is needed.
      item.addEventListener("mousedown",(e)=>{
        e.preventDefault();
        inputEl.value=item.textContent;
        listEl.style.display="none";
        onSelect(item.textContent);
      });
    });
  }
  inputEl.addEventListener("focus",renderList);
  inputEl.addEventListener("input",renderList);
  inputEl.addEventListener("blur",()=>{
    setTimeout(()=>{listEl.style.display="none";},150);
  });
}

function cellHTML(f,val){

    return `<a href="${safe}" target="_blank" rel="noopener noreferrer" class="linkcell" title="${safe}">🔗 فتح الرابط</a>`;
  }
  return escapeHtml(val);
}

// missing from what I'm syncing" — a device with a slightly stale local

async function storageGet(key){
  if(typeof window.storage!=="undefined"&&window.storage){
    try{
      const r=await window.storage.get(key,false);
      return (r&&r.value!==undefined)?r.value:null;
    }catch(e){}
  }
  try{return localStorage.getItem(key);}catch(e){return null;}
}
async function storageSet(key,value){
  if(typeof window.storage!=="undefined"&&window.storage){
    try{await window.storage.set(key,value,false);return true;}catch(e){}
  }
  try{localStorage.setItem(key,value);return true;}catch(e){return false;}
}

function dynOptions(kind){
  if(kind==="employees"){
    return Array.from(new Set(store.employees.map(e=>e.name).filter(Boolean)));
  }
  if(kind==="teams"){
    return Array.from(new Set(store.teamsList.map(t=>t.team).filter(Boolean)));
  }
  return [];
}
function permitOptions(){
  const permits=store.client.map(c=>c.permit).filter(Boolean);
  const seen=new Set();
  const latestFirst=[];
  for(let i=permits.length-1;i>=0&&latestFirst.length<5;i--){
    const p=permits[i];
    if(!seen.has(p)){
      seen.add(p);
      latestFirst.push(p);
    }
  }
  return latestFirst;
}
function clientSearchOptions(){
  const seen=new Set();
  const out=[];
  // آخر 7 عملاء فقط — الأحدث أولاً
  for(let i=store.client.length-1;i>=0&&out.length<7;i--){
    const c=store.client[i];
    if(!c.permit)continue;
    const label=(c.name||"—")+" — "+c.permit;
    if(seen.has(label))continue;
    seen.add(label);
    out.push({label,permit:c.permit});
  }
  return out;
}

// Permanent row ID — generated client-side (timestamp + random suffix) so
// rows added while offline never collide with each other, the way a
// server-assigned incrementing counter could if two devices were both
// offline at once. This is what makes merge-based sync (as opposed to
// today's whole-sheet overwrite) possible: every row can be identified
// and updated/deleted individually, regardless of its position.
function genRowId(){
  return Date.now().toString(36)+Math.random().toString(36).slice(2,8);
}
// Google Sheets tab names can't exceed 31 chars and this app's titles
// sometimes carry a " — English" or " (note)" suffix not meant for the
// actual tab name — this is the one place that derivation happens, used
// by every function that needs to match a sheet config to its live tab.
function sheetSyncName(s){
  let name=s.title.split(" — ")[0].split(" (")[0];
  if(name.length>31)name=name.slice(0,31);
  return name;
}
function todayISO(){
  return new Date().toLocaleDateString("en-CA");
}

function timestampYMDHM(){
  const d=new Date();
  const p=n=>String(n).padStart(2,"0");
  return ""+d.getFullYear()+p(d.getMonth()+1)+p(d.getDate())+p(d.getHours())+p(d.getMinutes());
}

function applyClientPermitMode(regenerate){
  const connEl=document.getElementById("f-client-connType");
  const permitEl=document.getElementById("f-client-permit");
  if(!connEl||!permitEl)return;
  const isMeter=connEl.value==="تركيب عداد";
  permitEl.readOnly=isMeter;
  permitEl.classList.toggle("auto-filled",isMeter);
  if(regenerate){
    if(isMeter){
      permitEl.value=timestampYMDHM();
    }else if(/^\d{12}$/.test(permitEl.value.trim())){
      permitEl.value="";
    }
  }
}

function handleClientSearchInput(sheetId){
  const searchEl=document.getElementById(`cs-${sheetId}`);
  if(!searchEl)return;
  const val=searchEl.value.trim();
  if(!val)return;
  const match=clientSearchOptions().find(o=>o.label===val);
  if(!match)return;
  const s=SHEETS.find(x=>x.id===sheetId);
  if(sheetId==="purchases"){
    // تعبئة تاريخ الشراء من آخر تاريخ بدء في بيانات الحفرية لهذا العميل
    const starts=clientStartDates(match.permit);
    const dateEl=document.getElementById("f-purchases-date");
    const banner=document.getElementById("pc-purchases");
    if(starts.length&&dateEl){
      dateEl.value=starts[starts.length-1];
      const dayEl=document.getElementById("f-purchases-day");
      if(dayEl)dayEl.value=dayNameFromDate(dateEl.value);
      if(banner)banner.innerHTML=`📅 تاريخ البدء من بيانات الحفرية: <strong>${starts[starts.length-1]}</strong>`;
    }else if(banner){
      banner.innerHTML=`⚠️ لا يوجد تاريخ بدء مسجّل في بيانات الحفرية لهذا العميل.`;
    }
    searchEl.value="";
    return;
  }
  const f=s.fields.find(fl=>fl.list==="permits");
  if(!f)return;
  const permitEl=document.getElementById(`f-${sheetId}-${f.key}`);
  if(!permitEl)return;
  permitEl.value=match.permit;
  searchEl.value="";
  updatePermitDisplay(sheetId);
}

function clientForPermit(permit){
  if(!permit)return null;
  const match=store.client.slice().reverse().find(c=>String(c.permit).trim()===String(permit).trim());
  return match||null;
}

// Fills in اسم العميل for rows that existed before this column did (pulled
// from the sheet with permit but no client name yet) — runs once after
// every successful pull, silently, and syncs the fix back if anything
// changed. New rows already get this at entry time (updatePermitDisplay /
// confirmQualityItem), so this only ever needs to catch old leftovers.
function backfillClientNames(){
  let changed=false;
  SHEETS.forEach(s=>{
    if(!s.fields.some(f=>f.key==="clientName")||!s.fields.some(f=>f.key==="permit"))return;
    (store[s.id]||[]).forEach(row=>{
      if(row.permit&&!row.clientName){
        const client=clientForPermit(row.permit);
        if(client&&client.name){row.clientName=client.name;changed=true;}
      }
    });
  });
  if(changed)saveStore();
}

function excavationForPermit(permit){
  if(!permit)return null;
  const match=store.excavation.slice().reverse().find(c=>String(c.permit).trim()===String(permit).trim());
  return match||null;
}

function computeAsphaltTon(permit){
  const exc=excavationForPermit(permit);
  if(!exc)return null;
  const len=parseFloat(exc.excLen);
  const width=parseFloat(exc.width);
  const thickness=parseFloat(exc.asphaltThickness);
  if(isNaN(len)||isNaN(width)||isNaN(thickness))return null;
  return Math.round((len*width*thickness/100*2.1)*100)/100;
}

function updatePermitDisplay(sheetId,autoFillDefaults){
  if(autoFillDefaults===undefined)autoFillDefaults=true;
  const s=SHEETS.find(x=>x.id===sheetId);
  const f=s.fields.find(f=>f.list==="permits");
  if(!f)return;
  const el=document.getElementById(`f-${sheetId}-${f.key}`);
  const disp=document.getElementById(`pc-${sheetId}`);
  if(!el||!disp)return;
  const val=el.value.trim();
  const clientNameEl=s.fields.some(fl=>fl.key==="clientName")?document.getElementById(`f-${sheetId}-clientName`):null;
  if(sheetId==="dailyCosts"){
    const tonEl=document.getElementById("f-dailyCosts-asphaltTon");
    if(tonEl){
      const computed=computeAsphaltTon(val);
      if(computed!==null)tonEl.value=computed;
    }
  }
  const client=val?clientForPermit(val):null;
  if(clientNameEl)clientNameEl.value=client?(client.name||""):"";
  if(sheetId==="excavation"){
    applyExcavationVisibility(client?client.connType:null);
    if(autoFillDefaults){
      const diamEl=document.getElementById("f-excavation-diam");
      if(diamEl&&client){
        if(client.connType==="مياه")diamEl.value="25";
        else if(client.connType==="صرف")diamEl.value="150";
      }
    }
  }
  if(!val){
    disp.textContent="";disp.className="permit-banner";
    if(sheetId==="qualityWork")syncQualityChecklist("");
    return;
  }
  if(client){
    const parts=["👤 اسم العميل: "+(client.name||"—")];
    if(client.connType)parts.push("🔧 نوع التوصيلة: "+client.connType);
    disp.textContent=parts.join("   —   ");
    disp.className="permit-banner show found";
  }else{
    disp.textContent="⚠ لا يوجد عميل بهذا التصريح في بيانات العميل";
    disp.className="permit-banner show notfound";
  }
  if(sheetId==="qualityWork")syncQualityChecklist(val);
}

const EXCAVATION_HIDE_RULES={
  "مياه":["inspectionRooms","cleanOut"],
  "صرف":["single","tree","connCount","remaining"]
};
const EXCAVATION_ALWAYS_VISIBLE=["permit","startDate","endDate"];
function applyExcavationVisibility(connType){
  const s=SHEETS.find(x=>x.id==="excavation");
  let hiddenKeys=[];
  if(connType==="مياه"||connType==="صرف"){
    hiddenKeys=EXCAVATION_HIDE_RULES[connType];
  }else if(connType==="تركيب عداد"){
    hiddenKeys=s.fields.map(fl=>fl.key).filter(k=>!EXCAVATION_ALWAYS_VISIBLE.includes(k));
  }
  s.fields.forEach(fl=>{
    const wrap=document.getElementById(`field-excavation-${fl.key}`);
    if(!wrap)return;
    const hide=hiddenKeys.includes(fl.key);
    wrap.style.display=hide?"none":"";
    if(hide){
      const input=document.getElementById(`f-excavation-${fl.key}`);
      if(input)input.value="";
    }
  });
}

function readFormValues(sheetId){
  const s=SHEETS.find(x=>x.id===sheetId);
  const entry={};
  let hasValue=false;
  s.fields.forEach(f=>{
    const el=document.getElementById(`f-${sheetId}-${f.key}`);
    let v=el.value.trim();
    if(f.type==="integer"&&v!=="")v=String(Math.round(parseFloat(v)));
    entry[f.key]=v;
    if(v)hasValue=true;
  });
  return {entry,hasValue};
}
function nextEmployeeId(){
  const nums=store.employeeInfo.map(e=>parseInt(e.empId,10)).filter(n=>!isNaN(n));
  const max=nums.length?Math.max.apply(null,nums):0;
  return String(max+1);
}

function clearForm(sheetId){
  const s=SHEETS.find(x=>x.id===sheetId);
  s.fields.forEach(f=>{
    let v="";
    if(sheetId==="employeeInfo"&&f.key==="endDate")v="";
    else if(sheetId==="employeeInfo"&&f.key==="empId")v=nextEmployeeId();
    else if(f.type==="date")v=todayISO();
    else if(f.default!==undefined)v=f.default;
    document.getElementById(`f-${sheetId}-${f.key}`).value=v;
  });
  const searchEl=document.getElementById(`cs-${sheetId}`);
  if(searchEl)searchEl.value="";
  updatePermitDisplay(sheetId);
  if(sheetId==="client")applyClientPermitMode(false);
  if(sheetId==="purchases"){
    purchaseScanCompleted=false;
    updatePurchaseCategoryFromType();
    updatePurchaseTaxReturns();
    updatePurchaseFormState();
  }
}

function saveEntry(sheetId){
  if(!canCreateEdit(sheetId))return;
  const {entry,hasValue}=readFormValues(sheetId);
  if(!hasValue){
    document.getElementById("saveNote").textContent="أدخل بيانات قبل الإضافة";
    return;
  }
  const s=SHEETS.find(x=>x.id===sheetId);
  const isUpdate=editState[sheetId]!==null;
  if(isUpdate){
    entry._id=store[sheetId][editState[sheetId]]._id||genRowId(); // keep the same permanent ID across edits
    store[sheetId][editState[sheetId]]=entry;
    cancelEdit(sheetId,true);
  }else{
    entry._id=genRowId();
    store[sheetId].push(entry);
  }
  logAudit(isUpdate?"تعديل":"إضافة",s.title,entry);
  clearForm(sheetId);
  refreshDynamicOptions();
  renderTable(sheetId);
  updateCounts();
  saveStore();
  if(sheetId==="items")recomputeStockTable();
}

function hideFormFor(sheetId){

function editEntry(sheetId,idx){
  if(!canCreateEdit(sheetId))return;
  const s=SHEETS.find(x=>x.id===sheetId);
  const entry=store[sheetId][idx];
  s.fields.forEach(f=>{
    document.getElementById(`f-${sheetId}-${f.key}`).value=entry[f.key]||"";
  });
  editState[sheetId]=idx;
  updatePermitDisplay(sheetId,false);
  if(sheetId==="client")applyClientPermitMode(false);

  document.getElementById(`editnote-${sheetId}`).classList.add("show");

function cancelEdit(sheetId,skipClear){
  editState[sheetId]=null;
  const btn=document.querySelector(`.addbtn[data-sheet="${sheetId}"]`);
  btn.textContent="+ إضافة الصف";
  btn.classList.remove("editing");
  document.querySelector(`.cancelbtn[data-sheet="${sheetId}"]`).classList.remove("show");
  document.getElementById(`editnote-${sheetId}`).classList.remove("show");
  if(!skipClear)clearForm(sheetId);
  hideFormFor(sheetId);

function deleteEntry(sheetId,idx){
  if(!canDelete(sheetId))return;
  const input=prompt("للتأكيد على حذف هذا السجل، اكتبي الحرف d ثم اضغطي موافق:");
  if(input===null)return;
  if(input.trim().toLowerCase()!=="d"){
    alert("لم يتم الحذف — لازم تكتبين الحرف d بالضبط للتأكيد.");
    return;
  }
  const s=SHEETS.find(x=>x.id===sheetId);
  const removed=store[sheetId][idx];
  store[sheetId].splice(idx,1);
  queueDeletion(sheetId,removed._id);
  logAudit("حذف",s.title,removed);
  if(editState[sheetId]===idx)cancelEdit(sheetId);
  refreshDynamicOptions();
  renderTable(sheetId);
  updateCounts();
  saveStore();
  if(sheetId==="items"||sheetId==="stockIn"||sheetId==="stockOut")recomputeStockTable();
}

function excStartOptions(){
  const seen=new Set();
  const out=[];
  for(let i=store.excavation.length-1;i>=0&&out.length<7;i--){
    const d=normDate(store.excavation[i].startDate);
    if(!d||seen.has(d))continue;
    seen.add(d);
    out.push(d);
  }
  return out;
}
function dayNameFromDate(v){
  const d=new Date(v);
  if(isNaN(d))return "";
  return ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"][d.getDay()];
}

// Resizes an image file down to a reasonable max dimension and re-encodes
// as JPEG, so phone-camera photos (often several MB) upload quickly and
// reliably. This is a plain resize/compress only — no cropping or
// perspective correction. watermarkLines (optional) draws a bottom-right
// timestamp/location box, qrCanvas (optional) draws a bottom-left Maps QR
// code — both for جودة العمل photos, omitted entirely for other callers
// (e.g. receipt scans).
function resizeImageFile(file,maxDim,quality,watermarkLines,qrCanvas){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    const reader=new FileReader();
    reader.onerror=()=>reject(new Error("تعذّرت قراءة الملف"));
    reader.onload=()=>{
      img.onerror=()=>reject(new Error("تعذّر فتح الصورة"));
      img.onload=()=>{
        let w=img.width,h=img.height;
        if(w>maxDim||h>maxDim){
          if(w>=h){h=Math.round(h*maxDim/w);w=maxDim;}
          else{w=Math.round(w*maxDim/h);h=maxDim;}
        }
        const canvas=document.createElement("canvas");
        canvas.width=w;canvas.height=h;
        const ctx=canvas.getContext("2d");
        ctx.drawImage(img,0,0,w,h);
        if(watermarkLines&&watermarkLines.length)drawWatermark(ctx,w,h,watermarkLines);
        if(qrCanvas)drawQrOverlay(ctx,w,h,qrCanvas);
        const dataUrl=canvas.toDataURL("image/jpeg",quality);
        resolve(dataUrlToBase64(dataUrl));
      };
      img.src=reader.result;
    };
    reader.readAsDataURL(file);
  });
}
// Same processing as resizeImageFile, but resolves a Blob instead of a
// base64 string — used for جودة العمل captures, which save to the local
// upload queue (IndexedDB stores Blobs natively and far more efficiently
// than a base64 string) rather than uploading immediately.
function resizeImageFileToBlob(file,maxDim,quality,watermarkLines,qrCanvas){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    const reader=new FileReader();
    reader.onerror=()=>reject(new Error("تعذّرت قراءة الملف"));
    reader.onload=()=>{
      img.onerror=()=>reject(new Error("تعذّر فتح الصورة"));
      img.onload=()=>{
        let w=img.width,h=img.height;
        if(w>maxDim||h>maxDim){
          if(w>=h){h=Math.round(h*maxDim/w);w=maxDim;}
          else{w=Math.round(w*maxDim/h);h=maxDim;}
        }
        const canvas=document.createElement("canvas");
        canvas.width=w;canvas.height=h;
        const ctx=canvas.getContext("2d");
        ctx.drawImage(img,0,0,w,h);
        if(watermarkLines&&watermarkLines.length)drawWatermark(ctx,w,h,watermarkLines);
        if(qrCanvas)drawQrOverlay(ctx,w,h,qrCanvas);
        canvas.toBlob(blob=>{
          if(blob)resolve(blob);else reject(new Error("تعذّر إنشاء الصورة"));
        },"image/jpeg",quality);
      };
      img.src=reader.result;
    };
    reader.readAsDataURL(file);
  });
}

async function handleReceiptScan(fileInput){
  const file=fileInput.files&&fileInput.files[0];
  if(!file)return;
  const statusEl=document.getElementById("scanstatus-purchases-folderLink");
  const linkInput=document.getElementById("f-purchases-folderLink");
  const dateEl=document.getElementById("f-purchases-date");
  const amountEl=document.getElementById("f-purchases-amount");
  const purchaseDate=dateEl?dateEl.value:"";
  const amount=amountEl?amountEl.value.trim():"";
  purchaseScanCompleted=false;
  updatePurchaseFormState();
  statusEl.textContent="⏳ جارٍ تجهيز الصورة...";
  statusEl.className="receipt-scan-status";
  try{
    const base64=await resizeImageFile(file,1600,0.8);
    const url=await resolveGsheetsUrl();
    if(!url){statusEl.textContent="⛔ لم يتم إعداد رابط Google Sheets";statusEl.className="receipt-scan-status err";return;}
    statusEl.textContent="⏳ جارٍ رفع الإيصال...";
    const res=await fetch(url,{
      method:"POST",
      body:JSON.stringify({
        action:"uploadReceipt",
        idToken:currentUser&&currentUser.idToken,
        purchaseDate:purchaseDate,
        amount:amount,
        mimeType:"image/jpeg",
        base64:base64
      })
    });
    const data=await res.json();
    if(data.status==="ok"&&data.url){
      linkInput.value=data.url;
      purchaseScanCompleted=true;
      statusEl.textContent="✅ تم رفع الإيصال";
      statusEl.className="receipt-scan-status ok";
    }else{
      statusEl.textContent="⛔ "+(data.message||"فشل رفع الإيصال");
      statusEl.className="receipt-scan-status err";
    }
  }catch(err){

// ── جودة العمل — quality checklist workflow ──────────────────────────────
//
// قائمة الجودة defines, per نوع التوصيلة, an ordered list of required shots:
// how many photos max (الصور), max video length in seconds (الفيديو), and
// which of الصور/الفيديو/الكل is mandatory. جودة العمل looks up the client's
// نوع التوصيلة from تصريح بلدي (same permit search as 02 — بيانات الحفرية),
// builds the matching checklist, and only unlocks the next item once the
// current one satisfies its mandatory rule. Files upload into
// NWC/Quality/YYYY/MM/DD/<تصريح بلدي>/<المطلوب تصويره> on the server side
// (YYYY/MM/DD taken from that permit's تاريخ البدء in بيانات الحفرية), and
// only that folder's link is kept, in رابط الملف.

function parseConnTypeList(v){
  return String(v||"").split(",").map(x=>x.trim()).filter(Boolean);
}
function qualityRulesForConnType(connType){
  if(!connType)return [];
  return store.qualityList.filter(r=>parseConnTypeList(r.connType).includes(connType));
}
function qualityWorkRow(permit,stage,item){
  return store.qualityWork.find(r=>
    String(r.permit||"").trim()===String(permit).trim()&&
    r.stage===stage&&r.item===item
  );
}

// ── إدارة المخزون (inventory) ─────────────────────────────────────────
// كود الصنف is the join key everywhere here — the same اسم الصنف can have
// several كود الصنف rows in الاصناف over time as السعر changes (price
// history, nothing overwritten), so "the item" for a given name always
// means "pick a specific كود الصنف", disambiguated by المورد when more
// than one applies.
function itemsByName(name){
  return store.items.filter(it=>String(it.itemName||"").trim()===String(name||"").trim());
}
function uniqueItemNames(){
  return Array.from(new Set(store.items.map(it=>it.itemName).filter(Boolean)));
}
// Latest-priced الاصناف row for a name (+ optional supplier) — "current price" for display purposes.
function latestItemForNameSupplier(name,supplier){
  const matches=store.items.filter(it=>it.itemName===name&&(!supplier||it.supplier===supplier));
  if(!matches.length)return null;
  return matches.slice().sort((a,b)=>String(a.priceDate||"").localeCompare(String(b.priceDate||""))).pop();
}
function remainingForItemCode(itemCode){
  const inSum=store.stockIn.filter(r=>r.itemCode===itemCode).reduce((a,r)=>a+(parseFloat(r.qty)||0),0);
  const outSum=store.stockOut.filter(r=>r.itemCode===itemCode).reduce((a,r)=>a+(parseFloat(r.qty)||0),0);
  return inSum-outSum;
}

// Recomputes المخزون from الاصناف + المخزون الداخل + المخزون الخارج —
// one row per كود الصنف, only writing/re-stamping تاريخ التحديث on rows
// that actually changed. Called after any of those three sheets change,
// and once after every pull (to catch changes made by other people).
function recomputeStockTable(){
  let changed=false;
  const byCode={};
  store.stock.forEach(r=>{byCode[r.itemCode]=r;});
  const seen=new Set();
  store.items.forEach(it=>{
    if(!it.itemCode||seen.has(it.itemCode))return; // one row per كود الصنف — appears here only once
    seen.add(it.itemCode);
    const inSum=store.stockIn.filter(r=>r.itemCode===it.itemCode).reduce((a,r)=>a+(parseFloat(r.qty)||0),0);
    const outSum=store.stockOut.filter(r=>r.itemCode===it.itemCode).reduce((a,r)=>a+(parseFloat(r.qty)||0),0);
    const remaining=inSum-outSum;
    const price=parseFloat(it.price)||0;
    const totalValue=Math.round(price*remaining*100)/100;
    const newVals={itemCode:it.itemCode,itemName:it.itemName,unit:it.unit,supplier:it.supplier,
      price:String(price),stockIn:String(inSum),stockOut:String(outSum),remaining:String(remaining),totalValue:String(totalValue)};
    let row=byCode[it.itemCode];
    if(!row){
      row={_id:genRowId(),...newVals,updatedAt:new Date().toLocaleString("sv-SE")};
      store.stock.push(row);
      changed=true;
    }else if(Object.keys(newVals).some(k=>String(row[k]||"")!==String(newVals[k]))){
      Object.assign(row,newVals);
      row.updatedAt=new Date().toLocaleString("sv-SE");
      changed=true;
    }
  });
  if(changed){renderTable("stock");updateCounts();saveStore();}
}

let qwState={permit:"",connType:"",rules:[],activeIndex:-1,photos:0,video:false,firstCapturedAt:null};
let qwRecorder=null,qwRecordedChunks=[],qwRecordStream=null,qwRecordStopTimer=null,qwRecordTickInterval=null,qwRecordStartTs=null;

// ── Local-first upload queue ─────────────────────────────────────────
// Photos/videos save to IndexedDB the instant they're captured — no
// network wait — and a background processor uploads them to Drive
// afterward, retrying on failure. This is what actually fixes "uploads
// take a long time": the person is never blocked waiting for the network,
// and the queue survives page reloads (a tab getting discarded and
// reopened just resumes where it left off, nothing is lost).
const QW_IDB_NAME="nwc_qw_uploads",QW_IDB_VERSION=1,QW_IDB_STORE="queue";
function openQwUploadDB(){
  return new Promise((resolve,reject)=>{
    if(!window.indexedDB){reject(new Error("المتصفح لا يدعم التخزين المحلي (IndexedDB)"));return;}
    const req=indexedDB.open(QW_IDB_NAME,QW_IDB_VERSION);
    req.onupgradeneeded=()=>{
      const db=req.result;
      if(!db.objectStoreNames.contains(QW_IDB_STORE))db.createObjectStore(QW_IDB_STORE,{keyPath:"id",autoIncrement:true});
    };
    req.onsuccess=()=>resolve(req.result);
    req.onerror=()=>reject(req.error||new Error("تعذّر فتح التخزين المحلي"));
  });
}
async function qwQueueAdd(record){
  const db=await openQwUploadDB();
  return new Promise((resolve,reject)=>{
    const tx=db.transaction(QW_IDB_STORE,"readwrite");
    const req=tx.objectStore(QW_IDB_STORE).add(record);
    req.onsuccess=()=>{qwBatch.total++;resolve(req.result);};
    req.onerror=()=>reject(req.error);
  });
}
async function qwQueueGetAll(){
  const db=await openQwUploadDB();
  return new Promise((resolve,reject)=>{
    const tx=db.transaction(QW_IDB_STORE,"readonly");
    const req=tx.objectStore(QW_IDB_STORE).getAll();
    req.onsuccess=()=>resolve(req.result||[]);
    req.onerror=()=>reject(req.error);
  });
}
async function qwQueueUpdate(record){
  const db=await openQwUploadDB();
  return new Promise((resolve,reject)=>{
    const tx=db.transaction(QW_IDB_STORE,"readwrite");
    const req=tx.objectStore(QW_IDB_STORE).put(record);
    req.onsuccess=()=>resolve();
    req.onerror=()=>reject(req.error);
  });
}
async function qwQueueDelete(id){
  const db=await openQwUploadDB();
  return new Promise((resolve,reject)=>{
    const tx=db.transaction(QW_IDB_STORE,"readwrite");
    const req=tx.objectStore(QW_IDB_STORE).delete(id);
    req.onsuccess=()=>resolve();
    req.onerror=()=>reject(req.error);
  });
}

// Maps "permit|stage|item" -> folder URL as soon as it's known, even if
// the upload finished in the background BEFORE the person tapped "✅
// تأكيد" for that item — confirmQualityItem() checks this so رابط الملف
// is never stuck empty just because of ordering.
let qwKnownFolderLinks={};
let qwQueueProcessing=false;

let qwBatch={total:0,done:0};
let qwQueueExpanded=false;
async function refreshQwQueueBadge(){
  const el=document.getElementById("qw-queue-status");
  if(!el)return;
  let items=[];
  try{items=await qwQueueGetAll();}catch(e){items=[];}
  if(!items.length){
    el.style.display="none";el.innerHTML="";
    qwBatch={total:0,done:0}; // batch finished — next enqueue starts a fresh one
    return;
  }
  el.style.display="flex";
  const stuck=items.filter(it=>(it.attempts||0)>=3).length;
  const totalKnown=Math.max(qwBatch.total,qwBatch.done+items.length);
  const pct=totalKnown?Math.round((qwBatch.done/totalKnown)*100):0;
  const kindLabel={photo:"📷 صورة",video:"🎥 فيديو",stockIn:"📥 مخزون داخل",stockOut:"📤 مخزون خارج"};
  el.innerHTML=`
    <div class="qw-queue-summary" id="qw-queue-summary">
      <div class="qw-queue-summary-row">
        <span>📤 جارٍ الرفع في الخلفية — ${qwBatch.done} من ${totalKnown}</span>
        <span>${pct}% <span class="qw-queue-caret">${qwQueueExpanded?"▲":"▼"}</span></span>
      </div>
      <div class="qw-progress-track"><div class="qw-progress-fill" style="width:${pct}%;"></div></div>
    </div>
    ${stuck?`<div class="qw-queue-stuck">⚠ ${stuck} تواجه صعوبة <button type="button" class="btn btn-ghost small" id="qw-queue-retry-btn">إعادة المحاولة الآن</button></div>`:""}
    ${qwQueueExpanded?`<div class="qw-queue-filelist">${items.map(it=>{
      const status=(it.attempts||0)>=3?("⚠ "+escapeHtml(it.lastError||"فشل متكرر")):"⏳ قيد الانتظار...";
      return `<div class="qw-queue-file-row"><span>${kindLabel[it.kind]||it.kind}</span><span class="qw-queue-file-status">${status}</span></div>`;
    }).join("")}</div>`:""}
  `;
  const summaryEl=document.getElementById("qw-queue-summary");
  if(summaryEl)summaryEl.onclick=()=>{qwQueueExpanded=!qwQueueExpanded;refreshQwQueueBadge();};
  const retryBtn=document.getElementById("qw-queue-retry-btn");
  if(retryBtn)retryBtn.onclick=(e)=>{
    e.stopPropagation();
    retryBtn.disabled=true;
    retryBtn.textContent="⏳ جارٍ إعادة المحاولة...";
    processQwUploadQueue();
  };
}

// Applies a finished upload's result to whichever جودة العمل row it
// belongs to — works whether that row already exists (confirmed before
// the upload finished) or doesn't yet (upload finished first — the link
// is remembered in qwKnownFolderLinks for confirmQualityItem to pick up).
function applyQwUploadResult(queueItem,data){
  if(queueItem.kind==="stockIn"){
    const row=store.stockIn.find(r=>r._id===queueItem.linkRowId);
    if(row&&!row.receiptLink&&(data.url||data.folderUrl)){
      row.receiptLink=data.url||data.folderUrl;
      saveStore();
      renderTable("stockIn");
    }
    return;
  }
  if(queueItem.kind==="stockOut"){
    const row=store.stockOut.find(r=>r._id===queueItem.linkRowId);
    if(row&&!row.photoLink&&(data.url||data.folderUrl)){
      row.photoLink=data.url||data.folderUrl;
      saveStore();
      renderTable("stockOut");
    }
    return;
  }
  const key=queueItem.permit+"|"+queueItem.stage+"|"+queueItem.item;
  if(data.folderUrl)qwKnownFolderLinks[key]=data.folderUrl;
  if(data.dateFallback)console.warn("[qw-upload] excavation date not found for permit",queueItem.permit,"— filed under today's date instead.");
  if(data.clientNameFallback)console.warn("[qw-upload] client name not found for permit",queueItem.permit,"— filed under the permit number instead.");
  const row=qualityWorkRow(queueItem.permit,queueItem.stage,queueItem.item);
  if(row&&!row.fileLink&&data.folderUrl){
    row.fileLink=data.folderUrl;
    saveStore();
    renderTable("qualityWork");
    if(document.getElementById("qw-checklist")&&queueItem.permit===qwState.permit)renderQualityChecklist();
    if(document.getElementById("cs-results"))renderClientSearch();
  }
}

// Processes the queue one file at a time (deliberately sequential, not
// parallel — parallel uploads over an already-weak connection tend to
// make everything slower, not faster). Safe to call anytime; re-entrant
// calls while already running are ignored. Leaves failed items in the
// queue with an incremented attempt count for the next pass to retry.
// Shared by جودة العمل (photo/video) and inventory (stockIn/stockOut) —
// same local-first save, background-upload, auto-resume infrastructure.
//
// The fetch has an explicit timeout: on a weak connection a request can
// sometimes hang indefinitely (neither resolving nor rejecting) rather
// than failing outright — without a timeout that would leave
// qwQueueProcessing stuck true forever, silently no-op'ing every future
// trigger (the periodic timer, coming back online, the manual "إعادة
// المحاولة الآن" button — all of them just return immediately and do
// nothing). QW_UPLOAD_TIMEOUT_MS is generous enough for a real slow-but-
// working upload to still complete.
const QW_UPLOAD_TIMEOUT_MS=120000;
async function processQwUploadQueue(){
  if(qwQueueProcessing)return;
  qwQueueProcessing=true;
  try{
    let items;
    try{items=await qwQueueGetAll();}catch(e){return;}
    for(const it of items){
      if(navigator.onLine===false)break; // don't burn retries while definitely offline
      const controller=new AbortController();
      const timeoutTimer=setTimeout(()=>controller.abort(),QW_UPLOAD_TIMEOUT_MS);
      try{
        const base64=await blobToBase64(it.blob);
        const url=await resolveGsheetsUrl();
        if(!url)throw new Error("لم يتم إعداد رابط Google Sheets");
        let body;
        if(it.kind==="stockIn"){
          body={action:"uploadInventoryMedia",idToken:currentUser&&currentUser.idToken,direction:"in",
            dateY:it.dateY,dateM:it.dateM,dateD:it.dateD,fileTime:it.fileTime,mimeType:it.mimeType,base64:base64};
        }else if(it.kind==="stockOut"){
          body={action:"uploadInventoryMedia",idToken:currentUser&&currentUser.idToken,direction:"out",
            dateY:it.dateY,dateM:it.dateM,dateD:it.dateD,clientName:it.clientName,ccb:it.ccb,mimeType:it.mimeType,base64:base64};
        }else{
          body={action:"uploadQualityMedia",idToken:currentUser&&currentUser.idToken,
            permit:it.permit,stage:it.stage,item:it.item,itemTime:it.itemTime,fileTime:it.fileTime,
            kind:it.kind,index:it.index,mimeType:it.mimeType,base64:base64};
        }
        const res=await fetch(url,{method:"POST",signal:controller.signal,body:JSON.stringify(body)});
        const data=await res.json();
        if(data.status==="ok"){
          await qwQueueDelete(it.id);
          qwBatch.done++;
          applyQwUploadResult(it,data);
        }else{
          it.attempts=(it.attempts||0)+1;
          it.lastError=data.message||"فشل الرفع";
          await qwQueueUpdate(it);
        }
      }catch(err){
        it.attempts=(it.attempts||0)+1;
        it.lastError=(err&&err.name==="AbortError")?"انتهت مهلة الرفع — الاتصال بطيء جداً أو معلّق":err.message;
        try{await qwQueueUpdate(it);}catch(e){}
      }finally{
        clearTimeout(timeoutTimer);
      }
      await refreshQwQueueBadge();
    }
  }finally{
    qwQueueProcessing=false;
    refreshQwQueueBadge();
  }
}
window.addEventListener("online",()=>processQwUploadQueue());
setInterval(()=>{if(navigator.onLine!==false)processQwUploadQueue();},20000);
// Browsers throttle setInterval heavily in backgrounded tabs, so coming
// back from another app could otherwise sit for a while before the next
// (delayed) periodic tick — this resumes the moment the tab is visible
// again instead of waiting on that.
document.addEventListener("visibilitychange",()=>{
  if(document.visibilityState==="visible")processQwUploadQueue();
});

// ── GPS/location availability guard ───────────────────────────────────
// Every photo/video here needs a location fix to stamp, so if GPS and
// WiFi are both off (no way to get a fix at all) the capture area is
// blocked behind a warning that only disappears once location comes
// back — watchPosition reacts to that automatically, and a periodic
// getCurrentPosition poll backs it up in case a browser doesn't re-fire
// watchPosition's error callback on its own. The records table below and
// the tab menu above stay usable throughout — only the search/permit/
// checklist area is covered by the overlay (qw-locked-wrap in the
// markup), never a page-blocking dialog.
let qwGeoWatchId=null,qwGeoAvailable=null,qwGeoPollTimer=null;
function startQwGeoWatch(){
  if(!navigator.geolocation){
    qwGeoAvailable=false;
    updateQwGeoOverlay();
    return;
  }
  if(qwGeoWatchId!==null)return; // already watching
  qwGeoWatchId=navigator.geolocation.watchPosition(
    ()=>{qwGeoAvailable=true;updateQwGeoOverlay();stopQwGeoPoll();},
    ()=>{qwGeoAvailable=false;updateQwGeoOverlay();startQwGeoPoll();},
    {enableHighAccuracy:true,maximumAge:15000,timeout:10000}
  );
}
function stopQwGeoWatch(){
  if(qwGeoWatchId!==null&&navigator.geolocation){
    navigator.geolocation.clearWatch(qwGeoWatchId);
    qwGeoWatchId=null;
  }
  stopQwGeoPoll();
}
function startQwGeoPoll(){
  if(qwGeoPollTimer)return;
  qwGeoPollTimer=setInterval(()=>{
    navigator.geolocation.getCurrentPosition(
      ()=>{qwGeoAvailable=true;updateQwGeoOverlay();stopQwGeoPoll();},
      ()=>{qwGeoAvailable=false;updateQwGeoOverlay();},
      {enableHighAccuracy:true,maximumAge:0,timeout:8000}
    );
  },6000);
}
function stopQwGeoPoll(){
  if(qwGeoPollTimer){clearInterval(qwGeoPollTimer);qwGeoPollTimer=null;}
}
// qwGeoAvailable stays null (overlay hidden) until we get a definitive
// failure — so opening the tab doesn't flash a false alarm while the
// very first fix is still pending.
function updateQwGeoOverlay(){
  ["qw-geo-overlay","sow-geo-overlay"].forEach(id=>{
    const overlay=document.getElementById(id);
    if(overlay)overlay.style.display=(qwGeoAvailable===false)?"flex":"none";
  });
}


// ── timestamp / location / address watermark, burned into every photo
// and video frame taken in جودة العمل — bottom-right, in this order:
// date & time, then latitude/longitude, then address. ─────────────────

function formatStampTime(d){
  const p=n=>String(n).padStart(2,"0");
  return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate())+" "+p(d.getHours())+":"+p(d.getMinutes())+":"+p(d.getSeconds());
}
// 24h HHhMMmSS, used as a sortable prefix on the المطلوب تصويره Drive
// folder name (e.g. "14h32m07 - الموقع قبل بدء الأعمال") so folders list
// in exact capture order when sorted by name — seconds included so two
// items captured in the same minute still sort distinctly.
function formatFolderTime(d){
  const p=n=>String(n).padStart(2,"0");
  return p(d.getHours())+"h"+p(d.getMinutes())+"m"+p(d.getSeconds());
}
function getCurrentPosition(options){
  return new Promise((resolve,reject)=>{
    if(!navigator.geolocation){reject(new Error("المتصفح لا يدعم تحديد الموقع"));return;}
    navigator.geolocation.getCurrentPosition(
      pos=>resolve(pos),
      err=>reject(new Error("تعذّر تحديد الموقع: "+err.message)),
      options||{enableHighAccuracy:true,timeout:15000,maximumAge:0}
    );
  });
}
// Address lookups are cached per ~11m grid cell (4 decimal places) for
// the length of the session, so retaking several shots at the same spot
// doesn't re-trigger a billed Geocoding API call each time. Only
// successes are cached — a failure (e.g. API key not set up yet) is
// retried on the next shot rather than remembered as permanently blank.
let qwAddressCache={};
let qwLastGeocodeError="";
async function reverseGeocodeCached(lat,lng){
  const key=lat.toFixed(4)+","+lng.toFixed(4);
  if(qwAddressCache[key]!==undefined){qwLastGeocodeError="";return qwAddressCache[key];}
  try{
    const url=await resolveGsheetsUrl();
    if(!url){qwLastGeocodeError="لم يتم إعداد رابط Google Sheets";return "";}
    const res=await fetch(url,{
      method:"POST",
      body:JSON.stringify({action:"reverseGeocode",idToken:currentUser&&currentUser.idToken,lat:lat,lng:lng})
    });
    const data=await res.json();
    if(data.status==="ok"&&data.address){
      qwLastGeocodeError="";
      qwAddressCache[key]=data.address;
      return data.address;
    }
    qwLastGeocodeError=data.message||"تعذّر تحديد العنوان";
    console.error("reverseGeocode:",qwLastGeocodeError);
    return "";
  }catch(e){
    qwLastGeocodeError="تعذّر الاتصال بخدمة العنوان: "+e.message;
    console.error("reverseGeocode exception:",e);
    return ""; // address is a nice-to-have — never block the capture over it
  }
}
// Gathers the stamp for one capture: timestamp always succeeds; location
// and address are best-effort (a denied permission or offline moment
// still lets the photo/video go out with just the timestamp).
async function captureGeoStamp(){
  qwLastGeocodeError="";
  const stamp={timestampText:formatStampTime(new Date()),lat:null,lng:null,address:""};
  try{
    const pos=await getCurrentPosition();
    stamp.lat=pos.coords.latitude;
    stamp.lng=pos.coords.longitude;
    stamp.address=await reverseGeocodeCached(stamp.lat,stamp.lng);
  }catch(e){
    qwLastGeocodeError="تعذّر تحديد الموقع: "+e.message;
  }
  return stamp;
}
function buildWatermarkLines(stamp){
  const lines=[stamp.timestampText];
  if(stamp.lat!=null&&stamp.lng!=null)lines.push(stamp.lat.toFixed(5)+"°, "+stamp.lng.toFixed(5)+"°");
  if(stamp.address)lines.push(stamp.address);
  return lines;
}
// Draws the semi-transparent bottom-right box + stacked lines onto any
// 2D canvas context — shared by the photo path and the live video path.
function drawWatermark(ctx,canvasW,canvasH,lines){
  if(!lines||!lines.length)return;
  const fontSize=Math.max(14,Math.round(canvasW*0.022));
  const paddingX=10,paddingY=8,lineGap=4,margin=10,maxTextWidth=canvasW*0.55;
  ctx.save();
  ctx.font=fontSize+"px monospace";
  ctx.textAlign="right";
  let maxWidth=0;
  lines.forEach(l=>{const w=Math.min(ctx.measureText(l).width,maxTextWidth);if(w>maxWidth)maxWidth=w;});
  const boxWidth=maxWidth+paddingX*2;
  const lineHeight=fontSize+lineGap;
  const boxHeight=lines.length*lineHeight-lineGap+paddingY*2;
  const boxX=canvasW-margin-boxWidth;
  const boxY=canvasH-margin-boxHeight;
  ctx.fillStyle="rgba(0,0,0,0.55)";
  ctx.fillRect(boxX,boxY,boxWidth,boxHeight);
  ctx.fillStyle="#ffffff";
  const textRightX=canvasW-margin-paddingX;
  lines.forEach((line,i)=>{
    const baselineY=boxY+paddingY+fontSize*0.85+i*lineHeight;
    ctx.fillText(line,textRightX,baselineY,maxTextWidth);
  });
  ctx.restore();
}

// A QR code encoding a Google Maps link to the exact capture coordinates,
// drawn bottom-left (mirroring the text stamp on the right). Rendered once
// per photo — or once per video (location is fixed at recording start
// anyway) and reused every frame, since regenerating a QR code 30x/second
// would be wasted work for a code that never changes mid-clip.
function buildMapsUrl(lat,lng){
  return "https://www.google.com/maps?q="+lat.toFixed(6)+","+lng.toFixed(6);
}
function makeQrCanvas(url){
  if(typeof QRious==="undefined")return null;
  try{
    const c=document.createElement("canvas");
    new QRious({element:c,value:url,size:220,background:"#ffffff",foreground:"#000000",level:"M"});
    return c;
  }catch(e){
    console.error("QR generation failed:",e);
    return null;
  }
}
function drawQrOverlay(ctx,canvasW,canvasH,qrCanvas){
  if(!qrCanvas)return;
  const margin=10,pad=6;
  const qrSize=Math.max(56,Math.min(120,Math.round(canvasW*0.16)));
  const boxSize=qrSize+pad*2;
  ctx.save();
  ctx.fillStyle="#ffffff";
  ctx.fillRect(margin,canvasH-margin-boxSize,boxSize,boxSize);
  ctx.drawImage(qrCanvas,margin+pad,canvasH-margin-boxSize+pad,qrSize,qrSize);
  ctx.restore();
}

// Called from updatePermitDisplay whenever the قائمة العمل permit field
// changes — same trigger path used by 02 — بيانات الحفرية.
function syncQualityChecklist(permit){
  const checklistEl=document.getElementById("qw-checklist");
  if(!checklistEl)return;
  stopQualityVideoRecording();
  permit=String(permit||"").trim();
  qwState={permit,connType:"",rules:[],activeIndex:-1,photos:0,video:false,firstCapturedAt:null};
  if(!permit){checklistEl.innerHTML="";return;}
  const client=clientForPermit(permit);
  if(!client){checklistEl.innerHTML="";return;} // the permit-banner already shows "not found"
  qwState.connType=client.connType||"";
  const rules=qualityRulesForConnType(qwState.connType);
  qwState.rules=rules;
  if(!rules.length){
    checklistEl.innerHTML=`<div class="empty">⚠ لا توجد بنود جودة معرّفة لنوع التوصيلة «${escapeHtml(qwState.connType||"—")}» في قائمة الجودة.</div>`;
    return;
  }
  qwState.activeIndex=rules.findIndex(r=>!qualityWorkRow(permit,r.stage,r.item));
  renderQualityChecklist();
  restoreActiveItemProgressFromQueue();
}

// If the tab reloaded mid-item (photos/video already saved to the local
// queue but not yet confirmed — e.g. a mobile browser discarded the tab
// before "✅ تأكيد" was tapped), the files themselves are safe and will
// still upload, but qwState would otherwise show 0/max and let the person
// unknowingly retake photos already sitting in the queue. This looks up
// what's already queued for the currently active item and restores the
// counts so the checklist reflects reality.
async function restoreActiveItemProgressFromQueue(){
  if(qwState.activeIndex===-1)return;
  const rule=qwState.rules[qwState.activeIndex];
  if(!rule)return;
  const permitAtCall=qwState.permit,ruleAtCall=rule;
  let items;
  try{items=await qwQueueGetAll();}catch(e){return;}
  // the permit/active item may have changed while this was in flight — bail rather than apply stale counts
  if(qwState.permit!==permitAtCall||qwState.rules[qwState.activeIndex]!==ruleAtCall)return;
  const matching=items.filter(it=>it.permit===permitAtCall&&it.stage===ruleAtCall.stage&&it.item===ruleAtCall.item);
  if(!matching.length)return;
  let photos=0,hasVideo=false,earliest=null;
  matching.forEach(it=>{
    if(it.kind==="photo")photos++;
    if(it.kind==="video")hasVideo=true;
    if(it.createdAt&&(!earliest||it.createdAt<earliest))earliest=it.createdAt;
  });
  if(photos>qwState.photos)qwState.photos=photos;
  if(hasVideo)qwState.video=true;
  if(earliest&&!qwState.firstCapturedAt)qwState.firstCapturedAt=new Date(earliest);
  renderQualityChecklist();
}

function qwComplianceMet(){
  const rule=qwState.rules[qwState.activeIndex];
  if(!rule)return false;
  const need=mandatoryTypes(rule.mandatory);
  if(need.includes("photo")&&qwState.photos<1)return false;
  if(need.includes("video")&&!qwState.video)return false;
  return true;
}

// Same as renderQualityChecklist(), but preserves whatever status message
// is currently showing (e.g. "✅ تم رفع الصورة" / "⛔ فشل رفع الفيديو...").
// renderQualityChecklist() rebuilds the whole panel's HTML, which recreates
// #qw-capture-status empty — without this, a just-set status message gets
// wiped out in the same synchronous tick, before the browser ever paints
// it, so success/error messages were never actually visible.
function renderQualityChecklistKeepStatus(){
  const oldStatus=document.getElementById("qw-capture-status");
  const savedText=oldStatus?oldStatus.textContent:"";
  const savedClass=oldStatus?oldStatus.className:"";
  renderQualityChecklist();
  const newStatus=document.getElementById("qw-capture-status");
  if(newStatus&&savedText){
    newStatus.textContent=savedText;
    newStatus.className=savedClass;
  }
}

function renderQualityChecklist(){
  const checklistEl=document.getElementById("qw-checklist");
  if(!checklistEl)return;
  let html="";
  let lastStage=null;
  qwState.rules.forEach((rule,idx)=>{
    if(rule.stage!==lastStage){
      html+=`<div class="qw-stage-header">${escapeHtml(rule.stage)}</div>`;
      lastStage=rule.stage;
    }
    const existing=qualityWorkRow(qwState.permit,rule.stage,rule.item);
    const isDone=!!existing;
    const stillUploading=isDone&&!existing.fileLink;
    const isActive=idx===qwState.activeIndex&&!isDone;
    const isLocked=!isDone&&idx!==qwState.activeIndex;
    const maxPhotos=parseInt(rule.maxPhotos,10)||0;
    const maxVideoSec=parseInt(rule.maxVideoSec,10)||0;
    const badges=[];
    if(maxPhotos>0)badges.push(`📷 حتى ${maxPhotos} صور`);
    if(maxVideoSec>0)badges.push(`🎥 حتى ${maxVideoSec} ث`);
    badges.push(`إلزامي: ${escapeHtml(rule.mandatory||"—")}`);
    html+=`<div class="qw-item ${isDone?(stillUploading?"qw-uploading":"qw-done"):isActive?"qw-active":"qw-locked"}">
      <div class="qw-item-head">
        <span class="qw-item-title">${escapeHtml(rule.item)}</span>
        <span class="qw-item-badges">${badges.map(b=>`<span class="qw-badge">${b}</span>`).join("")}</span>
      </div>`;
    if(isDone){
      html+=`<div class="qw-item-done-info">${stillUploading?"⏳":"✅"} ${escapeHtml(existing.date||"")} ${escapeHtml(existing.time||"")}${existing.photoCount?` — 📷 ${escapeHtml(existing.photoCount)}`:""}${existing.fileLink?` — <a href="${escapeHtml(existing.fileLink)}" target="_blank" rel="noopener noreferrer">📁 فتح المجلد</a>`:` — <span style="color:var(--ink-soft);">جارٍ الرفع في الخلفية...</span>`}</div>`;
    }else if(isLocked){
      html+=`<div class="qw-item-locked-info">🔒 يُفتح بعد استيفاء البند السابق</div>`;
    }else if(isActive){
      html+=`<div class="qw-capture" id="qw-capture-${idx}">
        ${maxPhotos>0?`<div class="qw-capture-row">

          <input type="file" accept="image/*" capture="environment" id="qw-photofile" style="display:none">
        </div>`:""}
        ${maxVideoSec>0?`<div class="qw-video-recorder">
          <canvas id="qw-video-preview" style="display:none;width:100%;max-width:280px;border-radius:6px;background:#000;"></canvas>
          <div class="qw-capture-row">
            <button type="button" class="btn btn-ghost small" id="qw-video-start" ${qwState.video?"disabled":""}>${qwState.video?"🎥 تم تسجيل الفيديو":"⏺ بدء تسجيل الفيديو (يتوقف تلقائياً عند "+maxVideoSec+" ث)"}</button>
            <button type="button" class="btn btn-ghost small" id="qw-video-stop" style="display:none">⏹ إيقاف الآن</button>
            <span class="qw-badge" id="qw-video-timer" style="display:none;"></span>
          </div>
        </div>`:""}
        <div class="qw-capture-status" id="qw-capture-status"></div>
        <div class="qw-capture-row">
          <button type="button" class="btn btn-primary small" id="qw-confirmbtn" ${qwComplianceMet()?"":"disabled"}>✅ تأكيد والانتقال للبند التالي</button>
        </div>

    }
    html+=`</div>`;
  });
  if(qwState.activeIndex===-1&&qwState.rules.length){
    html+=`<div class="qw-alldone">🎉 تم استيفاء جميع بنود الجودة لهذا التصريح.</div>`;
  }
  checklistEl.innerHTML=html;
  wireQualityCaptureButtons();
}
