<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>نموذج إدخال البيانات — التقرير الشهري</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;700;800&family=Tajawal:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root{
  --navy:#0E2A47;
  --navy-deep:#081B30;
  --grid-line:rgba(255,255,255,.07);
  --paper:#F4F7F5;
  --paper-dim:#E7ECEA;
  --ink:#16232F;
  --ink-soft:#4B5C6B;
  --orange:#E8590C;
  --orange-dark:#B8460A;
  --amber:#F5A623;
  --steel:#5C7A99;
  --teal:#127A5E;
  --red:#C23B22;
  --blue:#1D5FA0;
  --line:#D3DAD8;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--navy);
  background-image:
    linear-gradient(var(--grid-line) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
  background-size:28px 28px;
  font-family:'Tajawal',sans-serif;
  color:var(--ink);
  min-height:100vh;
  padding:22px;
}
.wrap{max-width:1180px;margin:0 auto;}
.login-gate{
  position:fixed;inset:0;background:var(--navy);
  background-image:linear-gradient(var(--grid-line) 1px, transparent 1px),linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
  background-size:28px 28px;
  display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;
}
.login-box{
  background:var(--paper);border-radius:10px;padding:38px 34px;max-width:380px;width:100%;text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.5);
}
.login-title{font-family:'Cairo',sans-serif;font-weight:800;font-size:19px;color:var(--ink);margin:0 0 6px;}
.login-sub{color:var(--ink-soft);font-size:13px;margin:0 0 20px;}
#googleSignInBtn{display:flex;justify-content:center;margin-bottom:14px;}
.login-status{font-size:12.5px;font-weight:600;min-height:16px;margin-bottom:10px;}
.login-status.err{color:var(--red);}
.login-status.ok{color:var(--teal);}
.login-note{font-size:11px;color:var(--steel);margin:14px 0 0;}
.userbar{
  display:flex;align-items:center;gap:10px;background:var(--navy-deep);border:1px solid #1D3F5E;
  border-radius:6px;padding:8px 14px;margin-bottom:14px;
}
.userbar-pic{width:30px;height:30px;border-radius:50%;background:#1D3F5E;}
.userbar-info{flex:1;min-width:0;}
.userbar-name{font-size:13px;font-weight:700;color:#EAF2FF;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.userbar-email{font-size:11px;color:#8FB0CC;font-family:'JetBrains Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.role-badge{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;padding:3px 10px;border-radius:9px;white-space:nowrap;}
.role-badge.Admin{background:var(--orange);color:#fff;}
.role-badge.Supervisor{background:var(--amber);color:#3A2A00;}
.role-badge.Viewer{background:#1D3F5E;color:#CFE0EF;}
.btn.small{padding:7px 12px;font-size:12.5px;}
.titleblock{
  background:var(--navy-deep);
  border:1px solid #1D3F5E;
  border-radius:6px;
  padding:18px 22px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:14px;
  margin-bottom:16px;
}
.titleblock h1{
  font-family:'Cairo',sans-serif;
  font-weight:800;
  font-size:22px;
  color:#EAF2FF;
  margin:0 0 4px;
}
.titleblock .sub{
  color:#8FB0CC;
  font-size:13px;
  font-family:'JetBrains Mono',monospace;
  letter-spacing:.3px;
}
.stamp{
  border:2px solid var(--orange);
  border-radius:4px;
  padding:8px 16px;
  text-align:center;
  color:var(--orange);
  font-family:'JetBrains Mono',monospace;
}
.stamp .n{font-size:20px;font-weight:600;line-height:1;}
.stamp .l{font-size:10px;letter-spacing:1px;color:#F0A67C;margin-top:3px;}
.toolbar{
  display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center;position:relative;
}
.btn{
  font-family:'Tajawal',sans-serif;
  font-weight:700;
  font-size:14px;
  border-radius:5px;
  padding:10px 18px;
  border:none;
  cursor:pointer;
  transition:transform .08s ease;
}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--orange);color:#fff;}
.btn-primary:hover{background:var(--orange-dark);}
.btn-ghost{background:var(--navy-deep);color:#CFE0EF;border:1px solid #244A6B;}
.btn-ghost:hover{background:#12324C;}
.savenote{color:#7C93A6;font-size:12px;font-family:'JetBrains Mono',monospace;}
.menu-wrap{position:relative;}
.menubtn{
  background:var(--navy-deep);
  color:#CFE0EF;
  border:1px solid #244A6B;
  font-family:'Tajawal',sans-serif;
  font-weight:700;
  font-size:14px;
  border-radius:5px;
  padding:10px 16px;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:6px;
  white-space:nowrap;
}
.menubtn:hover{background:#12324C;}
.dropdown{
  position:absolute;
  top:calc(100% + 6px);
  right:0;
  background:var(--paper);
  border:1px solid var(--line);
  border-radius:8px;
  box-shadow:0 12px 32px rgba(0,0,0,.4);
  min-width:270px;
  max-height:70vh;
  overflow-y:auto;
  display:none;
  z-index:60;
  padding:6px;
}
.dropdown.open{display:block;}
.dropdown-item{
  display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:5px;cursor:pointer;
  font-size:13px;color:var(--ink);
}
.dropdown-item:hover{background:var(--paper-dim);}
.dropdown-item.active{background:var(--orange);color:#fff;}
.dropdown-item .num{
  background:#12324C;color:var(--amber);border-radius:3px;padding:1px 7px;
  font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;
}
.dropdown-item.active .num{background:#fff;color:var(--orange-dark);}
.dropdown-item .cnt{
  margin-inline-start:auto;background:#1D3F5E;color:#EAF2FF;border-radius:9px;padding:0 7px;
  font-size:11px;min-width:16px;text-align:center;font-family:'JetBrains Mono',monospace;
}
.dropdown-item.active .cnt{background:rgba(255,255,255,.35);color:#fff;}
.dropdown.settings-dropdown.open{display:flex;flex-direction:column;gap:8px;min-width:290px;}
.dropdown-action{width:100%;text-align:center;}
.dropdown-action.small{padding:8px 10px;font-size:12.5px;}
.gsheets-box{border-top:1px solid var(--line);margin-top:4px;padding-top:10px;display:flex;flex-direction:column;gap:7px;}
.gsheets-label{font-size:11.5px;color:var(--ink-soft);font-weight:600;}
.gsheets-box input{
  width:100%;height:34px;border:1px solid var(--line);border-radius:5px;padding:0 9px;
  font-family:'JetBrains Mono',monospace;font-size:11.5px;background:#fff;color:var(--ink);direction:ltr;text-align:left;
}
.gsheets-box input:focus{outline:2px solid var(--orange);outline-offset:1px;border-color:var(--orange);}
.gsheets-btnrow{display:flex;gap:6px;}
.gsheets-btnrow .dropdown-action{flex:1;}
.gsheets-status{font-size:11.5px;min-height:14px;font-weight:600;}
.gsheets-status.ok{color:var(--teal);}
.gsheets-status.err{color:var(--red);}
.gsync-indicator{font-size:11.5px;font-family:'JetBrains Mono',monospace;min-height:14px;}
.gsync-indicator.ok{color:var(--teal);}
.gsync-indicator.err{color:var(--red);}
.gsync-indicator.pending{color:var(--amber);}
.autosync-row{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--ink-soft);font-weight:600;}
.autosync-row input{width:auto;height:auto;}
.sheet{
  background:var(--paper);
  border-radius:8px;
  padding:22px;
  display:none;
}
.sheet.active{display:block;}
.sheet h2{
  font-family:'Cairo',sans-serif;
  font-weight:700;
  font-size:18px;
  margin:0 0 3px;
  color:var(--ink);
}
.sheet .hint{color:var(--ink-soft);font-size:13px;margin:0 0 18px;}
.form-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
  gap:12px;
  margin-bottom:14px;
}
.field label{
  display:block;font-size:12px;color:var(--ink-soft);margin-bottom:5px;font-weight:500;
}
.field input,.field select{
  width:100%;height:38px;border:1px solid var(--line);border-radius:5px;
  padding:0 10px;font-family:'Tajawal',sans-serif;font-size:14px;background:#fff;color:var(--ink);
}
.field input:focus,.field select:focus{outline:2px solid var(--orange);outline-offset:1px;border-color:var(--orange);}
.field input[type=number],.field input[list]{font-family:'JetBrains Mono',monospace;font-size:13px;}
.field input.auto-filled{background:#EDF3F0;color:var(--teal);font-family:'JetBrains Mono',monospace;font-weight:700;cursor:not-allowed;}
.permit-client{font-size:11.5px;margin-top:5px;min-height:14px;font-weight:500;}
.permit-client.found{color:var(--teal);}
.permit-client.notfound{color:var(--red);}
.autocalc-note{font-size:11px;color:var(--steel);margin-top:5px;}
.addrow{display:flex;justify-content:flex-start;gap:10px;margin-bottom:22px;align-items:center;}
.addbtn{background:var(--teal);color:#fff;font-family:'Tajawal',sans-serif;font-weight:700;font-size:14px;border:none;border-radius:5px;padding:10px 22px;cursor:pointer;}
.addbtn:hover{background:#0D6249;}
.addbtn.editing{background:var(--blue);}
.cancelbtn{background:transparent;color:var(--ink-soft);font-family:'Tajawal',sans-serif;font-size:13px;border:1px solid var(--line);border-radius:5px;padding:9px 16px;cursor:pointer;display:none;}
.cancelbtn.show{display:inline-block;}
.editnote{font-size:12px;color:var(--blue);display:none;margin-bottom:10px;font-weight:500;}
.editnote.show{display:block;}
.sectionlabel{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-soft);margin:22px 0 8px;letter-spacing:.4px;border-top:2px solid var(--ink);padding-top:14px;}
table.entries{width:100%;border-collapse:collapse;font-size:12.5px;display:block;overflow-x:auto;}
table.entries th{
  background:var(--navy);color:#D9E6F0;text-align:right;padding:7px 8px;font-weight:600;font-size:11.5px;position:sticky;top:0;
}
table.entries td{padding:7px 8px;border-bottom:1px solid var(--paper-dim);color:var(--ink);white-space:nowrap;}
table.entries tr:nth-child(even) td{background:#EDF1EF;}
table.entries a.linkcell{color:var(--blue);text-decoration:none;font-weight:600;white-space:nowrap;}
table.entries a.linkcell:hover{text-decoration:underline;color:var(--orange-dark);}
table.entries td.act{cursor:pointer;text-align:center;width:26px;font-weight:700;}
table.entries td.act.del{color:var(--red);}
table.entries td.act.edit{color:var(--blue);}
.empty{color:var(--ink-soft);font-size:13px;padding:14px 0;}
.tabletoggle{font-size:12px;color:var(--ink-soft);padding:10px 2px 0;}
.toggle-link{background:none;border:none;color:var(--blue);font-family:'Tajawal',sans-serif;font-weight:700;font-size:12.5px;cursor:pointer;padding:0;text-decoration:underline;}
.toggle-link:hover{color:var(--orange-dark);}
details.existing{border:1px solid var(--line);border-radius:6px;background:#fff;}
details.existing summary{
  cursor:pointer;padding:10px 14px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink-soft);font-weight:600;list-style:none;display:flex;align-items:center;gap:8px;
}
details.existing summary::-webkit-details-marker{display:none;}
details.existing summary::before{content:"▸";color:var(--steel);}
details.existing[open] summary::before{content:"▾";}
details.existing .inner{padding:0 14px 14px;}
@media (max-width:640px){
  body{padding:10px;}
  .sheet{padding:14px;}
}
</style>
</head>
<body>

<div class="login-gate" id="loginGate">
  <div class="login-box">
    <h1 class="login-title">نموذج إدخال البيانات</h1>
    <p class="login-sub">سجّل دخولك بحساب Google المسجّل بريده في 11 — معلومات الموظفين</p>
    <div id="googleSignInBtn"></div>
    <div class="login-status" id="loginStatus"></div>
    <p class="login-note">إعداد الدخول يحتاج Client ID من Google Cloud — راجعي المطوّر إذا ما ظهر زر الدخول.</p>
  </div>
</div>

<div class="wrap" id="appRoot" style="display:none;">

  <div class="titleblock">
    <div>
      <h1>نموذج إدخال البيانات — التقرير الشهري / تطوير</h1>
      <div class="sub">14 جدول بيانات · فريق عضماية · إضافة وتعديل وعرض السجلات</div>
    </div>
    <div class="stamp">
      <div class="n" id="stampCount">0</div>
      <div class="l">إجمالي السجلات</div>
    </div>
  </div>

  <div class="userbar" id="userBar">
    <img class="userbar-pic" id="userPic" src="" alt="">
    <div class="userbar-info">
      <div class="userbar-name" id="userName"></div>
      <div class="userbar-email" id="userEmail"></div>
    </div>
    <span class="role-badge" id="roleBadge"></span>
    <button class="btn btn-ghost small" id="signOutBtn">تسجيل الخروج</button>
  </div>

  <div class="toolbar">
    <div class="menu-wrap">
      <button class="menubtn" id="sheetMenuBtn">☰ الجداول</button>
      <div class="dropdown" id="sheetMenu"></div>
    </div>
    <div class="menu-wrap" id="settingsMenuWrap">
      <button class="menubtn" id="settingsMenuBtn">⚙ الإعدادات</button>
      <div class="dropdown settings-dropdown" id="settingsMenu">
        <button class="btn btn-primary dropdown-action" id="exportAllBtn">تصدير كل الجداول إلى Excel</button>
        <button class="btn btn-ghost dropdown-action" id="clearBtn">استعادة النسخة الأصلية من الملف (تراجع عن كل التعديلات)</button>
        <div class="gsheets-box" id="gsheetsBox">
          <label class="gsheets-label">ربط Google Sheets (رابط Apps Script Web App)</label>
          <input type="url" id="gsheetsUrl" placeholder="https://script.google.com/macros/s/.../exec" autocomplete="off">
          <div class="gsheets-btnrow">
            <button class="btn btn-ghost dropdown-action small" id="gsheetsSaveBtn">حفظ الرابط</button>
            <button class="btn btn-primary dropdown-action small" id="gsheetsSyncBtn">مزامنة الآن</button>
          </div>
          <div class="gsheets-status" id="gsheetsStatus"></div>
          <label class="autosync-row"><input type="checkbox" id="autoSyncToggle" checked> مزامنة تلقائية بعد كل إضافة / تعديل / حذف</label>
        </div>
      </div>
    </div>
    <span class="savenote" id="saveNote">جاهز</span>
    <span class="gsync-indicator" id="gsyncIndicator"></span>
  </div>

  <div id="sheets"></div>

</div>

const ROLE_PERMISSIONS={
  Admin:{hidden:[],fullAccess:SHEETS.map(s=>s.id),viewOnly:[]},
  Supervisor:{
    hidden:["employeeInfo","loans"],
    fullAccess:["client","excavation","meters","dailyCosts","opCosts"],
    viewOnly:["rentals","contracts","employees","teamAssign","teamsList","attendance","holidays"]
  },
  Viewer:{
    hidden:["employeeInfo","loans"],
    fullAccess:[],
    viewOnly:["client","excavation","meters","dailyCosts","opCosts","rentals","contracts","employees","teamAssign","teamsList","attendance","holidays"]
  }
};
let currentUser=null; // {email,name,picture,role}

function canView(sheetId){
  if(!currentUser)return false;
  const p=ROLE_PERMISSIONS[currentUser.role];
  return !p.hidden.includes(sheetId);
}
function canCreateEdit(sheetId){
  if(!currentUser)return false;
  return ROLE_PERMISSIONS[currentUser.role].fullAccess.includes(sheetId);
}
function canDelete(sheetId){
  if(!currentUser)return false;
  return currentUser.role==="Admin"&&ROLE_PERMISSIONS.Admin.fullAccess.includes(sheetId);
}
function visibleSheets(){
  return SHEETS.filter(s=>canView(s.id));
}

let store={};
let editState={};
let auditQueue=[];

function logAudit(action,sheetTitle,record){
  if(!currentUser)return;
  const summary=Object.entries(record||{}).filter(([k,v])=>v).map(([k,v])=>v).slice(0,4).join(" | ");
  auditQueue.push({
    time:new Date().toLocaleString("sv-SE"),
    email:currentUser.email,
    role:currentUser.role,
    action:action,
    sheet:sheetTitle,
    details:summary
  });
  storageSet("audit_queue",JSON.stringify(auditQueue));
}
async function loadAuditQueue(){
  const v=await storageGet("audit_queue");
  if(v){try{auditQueue=JSON.parse(v)||[];}catch(e){auditQueue=[];}}
}

SHEETS.forEach(s=>{store[s.id]=[];editState[s.id]=null;});

async function storageGet(key){
  if(typeof window.storage!=="undefined"&&window.storage){
    try{
      const r=await window.storage.get(key,false);
      return (r&&r.value!==undefined)?r.value:null;
    }catch(e){}
  }
  try{return localStorage.getItem(key);}catch(e){return null;}
}
async function storageSet(key,value){
  if(typeof window.storage!=="undefined"&&window.storage){
    try{await window.storage.set(key,value,false);return true;}catch(e){}
  }
  try{localStorage.setItem(key,value);return true;}catch(e){return false;}
}

async function loadStore(){
  let savedStore=null;
  try{
    const v=await storageGet("data_entry_store");
    if(v)savedStore=JSON.parse(v);
  }catch(e){}
  if(savedStore){
    SHEETS.forEach(s=>{if(savedStore[s.id])store[s.id]=savedStore[s.id];});
  }else{
    SHEETS.forEach(s=>{store[s.id]=JSON.parse(JSON.stringify(EXISTING[s.id]||[]));});
    await saveStore(true);
  }
}
async function saveStore(skipAutoSync){
  document.getElementById("saveNote").textContent="جارٍ الحفظ...";
  const ok=await storageSet("data_entry_store",JSON.stringify(store));
  document.getElementById("saveNote").textContent=ok?"تم الحفظ محلياً":"تعذّر الحفظ";
  if(!skipAutoSync)scheduleAutoSync();
}

function dynOptions(kind){
  if(kind==="employees"){
    const extra=store.employees.map(e=>e.name).filter(Boolean);
    const fromExisting=EXISTING.employees.map(e=>e.name).filter(Boolean);
    return Array.from(new Set(EMPLOYEES_DEFAULT.concat(fromExisting).concat(extra)));
  }
  if(kind==="teams"){
    const extra=store.teamsList.map(t=>t.team).filter(Boolean);
    const fromExisting=EXISTING.teamsList.map(t=>t.team).filter(Boolean);
    return Array.from(new Set(TEAMS_DEFAULT.concat(fromExisting).concat(extra)));
  }
  return [];
}
function permitOptions(){
  const permits=store.client.map(c=>c.permit).filter(Boolean);
  const seen=new Set();
  const latestFirst=[];
  for(let i=permits.length-1;i>=0&&latestFirst.length<5;i--){
    const p=permits[i];
    if(!seen.has(p)){
      seen.add(p);
      latestFirst.push(p);
    }
  }
  return latestFirst;
}

function todayISO(){
  return new Date().toLocaleDateString("en-CA");
}

function timestampYMDHM(){
  const d=new Date();
  const p=n=>String(n).padStart(2,"0");
  return ""+d.getFullYear()+p(d.getMonth()+1)+p(d.getDate())+p(d.getHours())+p(d.getMinutes());
}

function applyClientPermitMode(regenerate){
  const connEl=document.getElementById("f-client-connType");
  const permitEl=document.getElementById("f-client-permit");
  if(!connEl||!permitEl)return;
  const isMeter=connEl.value==="تركيب عداد";
  permitEl.readOnly=isMeter;
  permitEl.classList.toggle("auto-filled",isMeter);
  if(regenerate){
    if(isMeter){
      permitEl.value=timestampYMDHM();
    }else if(/^\d{12}$/.test(permitEl.value.trim())){
      permitEl.value="";
    }
  }
}

function fieldInputHTML(sheetId,f){
  const inputId=`f-${sheetId}-${f.key}`;
  if(f.type==="select"){
    const opts=f.options?f.options:dynOptions(f.optionsFrom);
    return `<select id="${inputId}"><option value="">—</option>${opts.map(o=>`<option value="${o}"${f.default===o?" selected":""}>${o}</option>`).join("")}</select>`;
  }
  if(f.list==="permits"){
    return `<input id="${inputId}" type="text" list="dl-permits" autocomplete="off">`;
  }
  if(f.type==="integer"){
    return `<input id="${inputId}" type="number" step="1" inputmode="numeric" autocomplete="off">`;
  }
  if(f.type==="date"){
    return `<input id="${inputId}" type="date" value="${todayISO()}" autocomplete="off">`;
  }
  const type=f.type==="url"?"url":(f.type==="number"?"number":"text");
  const defAttr=f.default!==undefined?` value="${f.default}"`:"";
  return `<input id="${inputId}" type="${type}" ${type==="number"?'step="any"':""}${defAttr} autocomplete="off">`;
}

function clientForPermit(permit){
  if(!permit)return null;
  const match=store.client.slice().reverse().find(c=>String(c.permit).trim()===String(permit).trim());
  return match||null;
}

function excavationForPermit(permit){
  if(!permit)return null;
  const match=store.excavation.slice().reverse().find(c=>String(c.permit).trim()===String(permit).trim());
  return match||null;
}

function computeAsphaltTon(permit){
  const exc=excavationForPermit(permit);
  if(!exc)return null;
  const len=parseFloat(exc.excLen);
  const width=parseFloat(exc.width);
  const thickness=parseFloat(exc.asphaltThickness);
  if(isNaN(len)||isNaN(width)||isNaN(thickness))return null;
  return Math.round((len*width*thickness/100*2.1)*100)/100;
}

function updatePermitDisplay(sheetId){
  const s=SHEETS.find(x=>x.id===sheetId);
  const f=s.fields.find(f=>f.list==="permits");
  if(!f)return;
  const el=document.getElementById(`f-${sheetId}-${f.key}`);
  const disp=document.getElementById(`pc-${sheetId}`);
  if(!el||!disp)return;
  const val=el.value.trim();
  if(sheetId==="dailyCosts"){
    const tonEl=document.getElementById("f-dailyCosts-asphaltTon");
    if(tonEl){
      const computed=computeAsphaltTon(val);
      if(computed!==null)tonEl.value=computed;
    }
  }
  const client=val?clientForPermit(val):null;
  if(sheetId==="excavation")applyExcavationVisibility(client?client.connType:null);
  if(!val){disp.textContent="";disp.className="permit-client";return;}
  if(client){
    const parts=["👤 العميل: "+(client.name||"—")];
    if(client.connType)parts.push("🔧 نوع التوصيلة: "+client.connType);
    disp.textContent=parts.join(" · ");
    disp.className="permit-client found";
  }else{
    disp.textContent="⚠ لا يوجد عميل بهذا التصريح في بيانات العميل";
    disp.className="permit-client notfound";
  }
}

const EXCAVATION_HIDE_RULES={
  "مياه":["inspectionRooms","cleanOut"],
  "صرف":["single","tree","connCount","remaining"]
};
const EXCAVATION_ALWAYS_VISIBLE=["permit","startDate","endDate"];
function applyExcavationVisibility(connType){
  const s=SHEETS.find(x=>x.id==="excavation");
  let hiddenKeys=[];
  if(connType==="مياه"||connType==="صرف"){
    hiddenKeys=EXCAVATION_HIDE_RULES[connType];
  }else if(connType==="تركيب عداد"){
    hiddenKeys=s.fields.map(fl=>fl.key).filter(k=>!EXCAVATION_ALWAYS_VISIBLE.includes(k));
  }
  s.fields.forEach(fl=>{
    const wrap=document.getElementById(`field-excavation-${fl.key}`);
    if(!wrap)return;
    const hide=hiddenKeys.includes(fl.key);
    wrap.style.display=hide?"none":"";
    if(hide){
      const input=document.getElementById(`f-excavation-${fl.key}`);
      if(input)input.value="";
    }
  });
}

function readFormValues(sheetId){
  const s=SHEETS.find(x=>x.id===sheetId);
  const entry={};
  let hasValue=false;
  s.fields.forEach(f=>{
    const el=document.getElementById(`f-${sheetId}-${f.key}`);
    let v=el.value.trim();
    if(f.type==="integer"&&v!=="")v=String(Math.round(parseFloat(v)));
    entry[f.key]=v;
    if(v)hasValue=true;
  });
  return {entry,hasValue};
}
function clearForm(sheetId){
  const s=SHEETS.find(x=>x.id===sheetId);
  s.fields.forEach(f=>{
    let v="";
    if(f.type==="date")v=todayISO();
    else if(f.default!==undefined)v=f.default;
    document.getElementById(`f-${sheetId}-${f.key}`).value=v;
  });
  updatePermitDisplay(sheetId);
  if(sheetId==="client")applyClientPermitMode(false);
}

function saveEntry(sheetId){
  if(!canCreateEdit(sheetId))return;
  const {entry,hasValue}=readFormValues(sheetId);
  if(!hasValue){
    document.getElementById("saveNote").textContent="أدخل بيانات قبل الإضافة";
    return;
  }
  const s=SHEETS.find(x=>x.id===sheetId);
  const isUpdate=editState[sheetId]!==null;
  if(isUpdate){
    store[sheetId][editState[sheetId]]=entry;
    cancelEdit(sheetId,true);
  }else{
    store[sheetId].push(entry);
  }
  logAudit(isUpdate?"تعديل":"إضافة",s.title,entry);
  clearForm(sheetId);
  refreshDynamicOptions();
  renderTable(sheetId);
  updateCounts();
  saveStore();
}

function editEntry(sheetId,idx){
  if(!canCreateEdit(sheetId))return;
  const s=SHEETS.find(x=>x.id===sheetId);
  const entry=store[sheetId][idx];
  s.fields.forEach(f=>{
    document.getElementById(`f-${sheetId}-${f.key}`).value=entry[f.key]||"";
  });
  editState[sheetId]=idx;
  updatePermitDisplay(sheetId);
  if(sheetId==="client")applyClientPermitMode(false);
  const btn=document.querySelector(`.addbtn[data-sheet="${sheetId}"]`);
  btn.textContent="تحديث الصف";
  btn.classList.add("editing");
  document.querySelector(`.cancelbtn[data-sheet="${sheetId}"]`).classList.add("show");
  document.getElementById(`editnote-${sheetId}`).classList.add("show");
  document.getElementById("sheet-"+sheetId).scrollIntoView({behavior:"smooth",block:"start"});
}

function cancelEdit(sheetId,skipClear){
  editState[sheetId]=null;
  const btn=document.querySelector(`.addbtn[data-sheet="${sheetId}"]`);
  btn.textContent="+ إضافة الصف";
  btn.classList.remove("editing");
  document.querySelector(`.cancelbtn[data-sheet="${sheetId}"]`).classList.remove("show");
  document.getElementById(`editnote-${sheetId}`).classList.remove("show");
  if(!skipClear)clearForm(sheetId);
}

function deleteEntry(sheetId,idx){
  if(!canDelete(sheetId))return;
  const input=prompt("للتأكيد على حذف هذا السجل، اكتبي الحرف d ثم اضغطي موافق:");
  if(input===null)return;
  if(input.trim().toLowerCase()!=="d"){
    alert("لم يتم الحذف — لازم تكتبين الحرف d بالضبط للتأكيد.");
    return;
  }
  const s=SHEETS.find(x=>x.id===sheetId);
  const removed=store[sheetId][idx];
  store[sheetId].splice(idx,1);
  logAudit("حذف",s.title,removed);
  if(editState[sheetId]===idx)cancelEdit(sheetId);
  refreshDynamicOptions();
  renderTable(sheetId);
  updateCounts();
  saveStore();
}

function refreshDynamicOptions(){
  SHEETS.forEach(s=>{
    if(!canView(s.id)||!canCreateEdit(s.id))return;
    s.fields.forEach(f=>{
      if(f.optionsFrom){
        const el=document.getElementById(`f-${s.id}-${f.key}`);
        if(!el)return;
        const opts=dynOptions(f.optionsFrom);
        const cur=el.value;
        el.innerHTML=`<option value="">—</option>${opts.map(o=>`<option value="${o}">${o}</option>`).join("")}`;
        el.value=cur;
      }
      if(f.list==="permits"){
        const dl=document.getElementById("dl-permits");
        if(dl)dl.innerHTML=permitOptions().map(p=>`<option value="${p}">`).join("");
        updatePermitDisplay(s.id);
      }
    });
  });
}

const expandedState={};
function renderTable(sheetId){
  const s=SHEETS.find(x=>x.id===sheetId);
  const target=document.getElementById(`table-${sheetId}`);
  if(!target)return;
  const rows=store[sheetId];
  const editable=canCreateEdit(sheetId);
  const deletable=canDelete(sheetId);
  if(!rows.length){
    target.innerHTML=`<div class="empty">لا توجد صفوف مضافة بعد.</div>`;
    return;
  }
  const limit=7;
  const showAll=!!expandedState[sheetId];
  const startIdx=showAll?0:Math.max(0,rows.length-limit);
  const visible=rows.slice(startIdx).map((r,i)=>({r,idx:startIdx+i}));
  const cols=s.fields.map(f=>f.label);
  const actCols=(editable?1:0)+(deletable?1:0);
  let html=`<table class="entries"><thead><tr>${"<th></th>".repeat(actCols)}${cols.map(c=>`<th>${c}</th>`).join("")}${s.computedLabel?`<th>${s.computedLabel}</th>`:""}</tr></thead><tbody>`;
  visible.forEach(({r,idx})=>{
    html+="<tr>";
    if(editable)html+=`<td class="act edit" data-sheet="${sheetId}" data-idx="${idx}" title="تعديل">✎</td>`;
    if(deletable)html+=`<td class="act del" data-sheet="${sheetId}" data-idx="${idx}" title="حذف">✕</td>`;
    s.fields.forEach(f=>{html+=`<td>${cellHTML(f,r[f.key])}</td>`;});
    if(s.computed){
      let v=s.computed(r);
      if(typeof v==="number")v=Math.round(v*100)/100;
      html+=`<td>${v}</td>`;
    }
    html+="</tr>";
  });
  html+="</tbody></table>";
  if(rows.length>limit){
    html+=showAll
      ?`<div class="tabletoggle"><button class="toggle-link" data-sheet="${sheetId}" data-mode="less">إخفاء وعرض آخر 7 سجلات فقط</button></div>`
      :`<div class="tabletoggle">يعرض آخر 7 من أصل ${rows.length} سجل — <button class="toggle-link" data-sheet="${sheetId}" data-mode="more">عرض كل السجلات</button></div>`;
  }
  target.innerHTML=html;
  target.querySelectorAll(".del").forEach(d=>{
    d.onclick=()=>deleteEntry(d.dataset.sheet,parseInt(d.dataset.idx));
  });
  target.querySelectorAll(".edit").forEach(d=>{
    d.onclick=()=>editEntry(d.dataset.sheet,parseInt(d.dataset.idx));
  });
  target.querySelectorAll(".toggle-link").forEach(b=>{
    b.onclick=()=>{
      expandedState[b.dataset.sheet]=b.dataset.mode==="more";
      renderTable(b.dataset.sheet);
    };
  });
}

function pivotRows(rows){
  const names=Array.from(new Set(rows.map(r=>r.name).filter(Boolean)));
  const months=MONTHS.filter(m=>rows.some(r=>r.month===m));
  return {names,months};
}

function renderExisting(sheetId){
  const s=SHEETS.find(x=>x.id===sheetId);
  const target=document.getElementById(`existing-${sheetId}`);
  if(!target)return;
  const rows=EXISTING[sheetId]||[];
  if(!rows.length){
    target.innerHTML=`<div class="empty">لا توجد سجلات في الملف الأصلي لهذا الجدول.</div>`;
    return;
  }
  if(s.pivot){
    const {names,months}=pivotRows(rows);
    let html=`<table class="entries"><thead><tr><th>#</th><th>الاسم</th>${months.map(m=>`<th>${m}</th>`).join("")}</tr></thead><tbody>`;
    names.forEach((n,i)=>{
      html+=`<tr><td>${i+1}</td><td>${n}</td>`;
      months.forEach(m=>{
        const match=rows.filter(r=>r.name===n&&r.month===m);
        const sum=match.reduce((a,r)=>a+(parseFloat(r.days)||0),0);
        html+=`<td>${match.length?sum:""}</td>`;
      });
      html+="</tr>";
    });
    html+="</tbody></table>";
    target.innerHTML=html;
    return;
  }
  const cols=s.fields.map(f=>f.label);
  let html=`<table class="entries"><thead><tr><th>#</th>${cols.map(c=>`<th>${c}</th>`).join("")}</tr></thead><tbody>`;
  rows.forEach((r,idx)=>{
    html+=`<tr><td>${idx+1}</td>`;
    s.fields.forEach(f=>{html+=`<td>${cellHTML(f,r[f.key])}</td>`;});
    html+="</tr>";
  });
  html+="</tbody></table>";
  target.innerHTML=html;
}

function updateCounts(){
  let total=0;
  SHEETS.forEach(s=>{
    const c=store[s.id].length;
    total+=c;
    const el=document.getElementById(`mcnt-${s.id}`);
    if(el)el.textContent=c;
  });
  document.getElementById("stampCount").textContent=total;
}

function renderAll(){
  buildMenu();
  buildSheets();
  refreshDynamicOptions();
  SHEETS.forEach(s=>{renderTable(s.id);renderExisting(s.id);});
  updateCounts();
  const active=document.querySelector(".sheet.active");
  const activeId=active?active.id.replace("sheet-",""):SHEETS[0].id;
  selectTab(activeId);
}

function buildExportPayload(){
  const sheets=[];
  SHEETS.forEach(s=>{
    const allRows=store[s.id];
    const header=s.fields.map(f=>f.label);
    const aoa=[["#"].concat(header).concat(s.computedLabel?[s.computedLabel]:[])];
    allRows.forEach((r,i)=>{
      const row=[i+1];
      s.fields.forEach(f=>row.push(r[f.key]||""));
      if(s.computed){
        let v=s.computed(r);
        if(typeof v==="number")v=Math.round(v*100)/100;
        row.push(v);
      }
      aoa.push(row);
    });
    let name=s.title.split(" — ")[0].split(" (")[0];
    if(name.length>31)name=name.slice(0,31);
    sheets.push({name,headers:aoa[0],rows:aoa.slice(1)});
  });
  ["attendance","holidays"].forEach(id=>{
    const rows=store[id];
    if(!rows.length)return;
    const {names,months}=pivotRows(rows);
    const header=["#","الاسم",...months];
    const aoa=[];
    names.forEach((n,i)=>{
      const row=[i+1,n];
      months.forEach(m=>{
        const match=rows.filter(r=>r.name===n&&r.month===m);
        const sum=match.reduce((a,r)=>a+(parseFloat(r.days)||0),0);
        row.push(match.length?sum:"");
      });
      aoa.push(row);
    });
    const sheetName=(id==="attendance"?"Attendance (مصفوفة)":"Holidays (مصفوفة)").slice(0,31);
    sheets.push({name:sheetName,headers:header,rows:aoa});
  });
  return sheets;
}

function exportAll(){
  const payload=buildExportPayload();
  const wb=XLSX.utils.book_new();
  payload.forEach(sh=>{
    const aoa=[sh.headers].concat(sh.rows);
    const ws=XLSX.utils.aoa_to_sheet(aoa);
    XLSX.utils.book_append_sheet(wb,ws,sh.name);
  });
  XLSX.writeFile(wb,"التقرير_الشهري_محدث_"+new Date().toISOString().slice(0,10)+".xlsx");
}

async function resolveGsheetsUrl(){
  const v=await storageGet("gsheets_webapp_url");
  return v||DEFAULT_GSHEETS_URL||"";
}

async function pullFromGoogleSheets(url){
  try{
    const sep=url.indexOf("?")===-1?"?":"&";
    const tokenParam=currentUser&&currentUser.idToken?sep+"token="+encodeURIComponent(currentUser.idToken):"";
    const res=await fetch(url+tokenParam,{method:"GET"});
    const data=await res.json();
    if(!data||!data.data)return{ok:true}; // nothing to merge (e.g. no permission, or empty sheet)
    const sheetsData=data.data;
    SHEETS.forEach(s=>{
      if(s.pivot)return;
      let name=s.title.split(" — ")[0].split(" (")[0];
      if(name.length>31)name=name.slice(0,31);
      const rows=sheetsData[name];
      if(!rows||rows.length<1)return;
      const entries=rows.slice(1).map(row=>{
        const entry={};
        s.fields.forEach((f,i)=>{
          const v=row[i+1];
          entry[f.key]=(v!==undefined&&v!==null)?String(v):"";
        });
        return entry;
      }).filter(e=>Object.values(e).some(v=>v));
      store[s.id]=entries;
    });
    ["attendance","holidays"].forEach(id=>{
      const name=(id==="attendance"?"Attendance (مصفوفة)":"Holidays (مصفوفة)").slice(0,31);
      const rows=sheetsData[name];
      if(!rows||rows.length<1)return;
      const header=rows[0];
      const months=header.slice(2);
      const entries=[];
      rows.slice(1).forEach(row=>{
        const nm=row[1];
        if(!nm)return;
        months.forEach((m,i)=>{
          const v=row[2+i];
          if(v!==undefined&&v!==null&&v!=="")entries.push({name:String(nm),month:String(m),days:String(v)});
        });
      });
      store[id]=entries;
    });
    await saveStore(true);
    return{ok:true};
  }catch(err){
    console.error("Pull from Google Sheets failed:",err);
    return{ok:false};
  }
}

async function performSync(url){
  try{
    const auditBatch=auditQueue.slice();
    const payload={
      sheets:buildExportPayload(),
      idToken:currentUser?currentUser.idToken:null,
      audit:auditBatch
    };
    const res=await fetch(url,{
      method:"POST",
      headers:{"Content-Type":"text/plain;charset=utf-8"},
      body:JSON.stringify(payload)
    });
    let ok=res.ok;
    try{
      const data=await res.json();
      ok=data.status==="ok";
      if(!ok)throw new Error(data.message||"فشل غير معروف");
    }catch(parseErr){
      if(!res.ok)throw parseErr;
    }
    if(auditBatch.length){
      auditQueue=auditQueue.slice(auditBatch.length);
      storageSet("audit_queue",JSON.stringify(auditQueue));
    }
    return{ok:true};
  }catch(err){
    console.error("Google Sheets sync failed:",err);
    const detail=(err&&err.message)?err.message:String(err);
    return{ok:false,detail};
  }
}

async function syncToGoogleSheets(){
  const url=document.getElementById("gsheetsUrl").value.trim();
  const statusEl=document.getElementById("gsheetsStatus");
  if(!url){
    statusEl.textContent="الصقي رابط Web App أولاً";
    statusEl.className="gsheets-status err";
    return;
  }
  statusEl.textContent="جارٍ المزامنة...";
  statusEl.className="gsheets-status";
  const r=await performSync(url);
  if(r.ok){
    statusEl.textContent="✓ تمت المزامنة بنجاح";
    statusEl.className="gsheets-status ok";
  }else{
    statusEl.textContent="⚠ تعذّرت المزامنة: "+r.detail;
    statusEl.title=r.detail;
    statusEl.className="gsheets-status err";
  }
}

let autoSyncTimer=null;
function scheduleAutoSync(){
  const toggle=document.getElementById("autoSyncToggle");
  if(!toggle||!toggle.checked)return;
  const url=document.getElementById("gsheetsUrl").value.trim();
  const ind=document.getElementById("gsyncIndicator");
  if(!url){if(ind){ind.textContent="";ind.className="gsync-indicator";}return;}
  if(autoSyncTimer)clearTimeout(autoSyncTimer);
  if(ind){ind.textContent="⏳ مزامنة تلقائية خلال ثوانٍ...";ind.className="gsync-indicator pending";}
  autoSyncTimer=setTimeout(runAutoSync,4000);
}
async function runAutoSync(){
  const url=document.getElementById("gsheetsUrl").value.trim();
  const ind=document.getElementById("gsyncIndicator");
  if(!url)return;
  if(ind){ind.textContent="🔄 جارٍ المزامنة التلقائية...";ind.className="gsync-indicator pending";}
  const r=await performSync(url);
  if(ind){
    ind.textContent=r.ok?"✓ مزامنة تلقائية ناجحة":"⚠ فشلت المزامنة التلقائية";
    ind.className="gsync-indicator "+(r.ok?"ok":"err");
    if(!r.ok&&r.detail)ind.title=r.detail;
    setTimeout(()=>{ind.textContent="";ind.className="gsync-indicator";},6000);
  }
}

async function saveGsheetsUrl(){
  const url=document.getElementById("gsheetsUrl").value.trim();
  await storageSet("gsheets_webapp_url",url);
}

async function loadGsheetsUrl(){
  const v=await storageGet("gsheets_webapp_url");
  document.getElementById("gsheetsUrl").value=v||DEFAULT_GSHEETS_URL||"";
}
function activeGsheetsUrl(){
  const v=document.getElementById("gsheetsUrl").value.trim();

}

document.getElementById("exportAllBtn").onclick=()=>{exportAll();closeAllMenus();};
document.getElementById("clearBtn").onclick=async()=>{

  SHEETS.forEach(s=>{store[s.id]=JSON.parse(JSON.stringify(EXISTING[s.id]||[]));cancelEdit(s.id);});

function decodeJWT(token){
  try{
    const base64Url=token.split(".")[1];
    const base64=base64Url.replace(/-/g,"+").replace(/_/g,"/");
    const json=decodeURIComponent(atob(base64).split("").map(c=>"%"+("00"+c.charCodeAt(0).toString(16)).slice(-2)).join(""));
    return JSON.parse(json);
  }catch(e){return null;}
}

function resolveRole(email){
  const lower=String(email||"").toLowerCase().trim();
  if(lower&&lower===FALLBACK_ADMIN_EMAIL.toLowerCase().trim())return "Admin";
  const match=store.employeeInfo.slice().reverse().find(e=>String(e.email||"").toLowerCase().trim()===lower);
  if(match&&["Admin","Supervisor","Viewer"].includes(match.role))return match.role;
  return null;
}

function applyRoleUI(){
  const badge=document.getElementById("roleBadge");
  badge.textContent=currentUser.role;
  badge.className="role-badge "+currentUser.role;
  if(currentUser.role==="Viewer"){
    document.getElementById("settingsMenuWrap").style.display="none";
  }else if(currentUser.role==="Supervisor"){
    document.getElementById("clearBtn").style.display="none";
    document.querySelector(".gsheets-label").style.display="none";
    document.getElementById("gsheetsUrl").style.display="none";
    document.getElementById("gsheetsSaveBtn").style.display="none";
  }
}

async function handleCredentialResponse(response){
  const payload=decodeJWT(response.credential);
  const statusEl=document.getElementById("loginStatus");
  if(!payload||!payload.email){
    statusEl.textContent="⚠ تعذّر قراءة بيانات الحساب";
    statusEl.className="login-status err";
    return;
  }
  statusEl.textContent="جارٍ التحقق...";
  statusEl.className="login-status";
  currentUser={email:payload.email,name:payload.name||payload.email,picture:payload.picture||"",idToken:response.credential,role:"Viewer"};
  await loadStore();
  await loadAuditQueue();
  const url=await resolveGsheetsUrl();
  if(url){
    statusEl.textContent="جارٍ جلب أحدث البيانات...";
    const pullResult=await pullFromGoogleSheets(url);
    if(!pullResult.ok){
      statusEl.textContent="⚠ تعذّر جلب البيانات من الشيت — سيتم استخدام آخر نسخة محفوظة على هذا الجهاز";
      statusEl.className="login-status err";
    }
  }
  currentUser.role=resolveRole(currentUser.email);
  if(!currentUser.role){
    statusEl.textContent="⛔ هذا البريد ("+currentUser.email+") غير مسجّل في 11 — معلومات الموظفين. تواصلي مع المسؤول لإضافتك.";
    statusEl.className="login-status err";
    if(window.google&&google.accounts&&google.accounts.id)google.accounts.id.disableAutoSelect();
    currentUser=null;
    return;
  }
  document.getElementById("loginGate").style.display="none";
  document.getElementById("appRoot").style.display="";
  document.getElementById("userPic").src=currentUser.picture;
  document.getElementById("userName").textContent=currentUser.name;
  document.getElementById("userEmail").textContent=currentUser.email;
  applyRoleUI();
  renderAll();
  loadGsheetsUrl();
  loadAutoSyncPref();
}

function signOut(){
  currentUser=null;
  document.getElementById("appRoot").style.display="none";
  document.getElementById("loginGate").style.display="flex";
  document.getElementById("loginStatus").textContent="";
  document.getElementById("loginStatus").className="login-status";
  if(window.google&&google.accounts&&google.accounts.id){
    google.accounts.id.disableAutoSelect();
  }
}
document.getElementById("signOutBtn").onclick=signOut;

function initGoogleSignIn(){
  const statusEl=document.getElementById("loginStatus");
  if(GOOGLE_CLIENT_ID.indexOf("PASTE_YOUR_CLIENT_ID_HERE")===0){
    statusEl.textContent="⚠ لم يتم إعداد Google Client ID بعد — راجعي خطوات الإعداد";
    statusEl.className="login-status err";
    return;
  }
  if(!window.google||!google.accounts||!google.accounts.id){
    statusEl.textContent="⚠ تعذّر تحميل خدمة تسجيل الدخول من Google — تأكدي من الاتصال بالإنترنت";
    statusEl.className="login-status err";
    return;
  }
  google.accounts.id.initialize({client_id:GOOGLE_CLIENT_ID,callback:handleCredentialResponse});
  google.accounts.id.renderButton(document.getElementById("googleSignInBtn"),{theme:"outline",size:"large",text:"signin_with",shape:"pill",locale:"ar"});
  google.accounts.id.prompt();
}

window.addEventListener("load",()=>{setTimeout(initGoogleSignIn,400);});
